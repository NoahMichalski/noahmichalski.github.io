<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Dashboard v3</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0e0e0e;
    color:#fff;
    font-family:system-ui;
    margin:0;
    padding:20px;
}

h1 { text-align:center; }

.container { max-width:1400px; margin:auto; }

.card {
    background:#181818;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

table {
    width:100%;
    border-collapse:collapse;
}

td,th {
    padding:8px;
    border-bottom:1px solid #333;
}

.click { cursor:pointer; }
.good { color:#4caf50; }
.bad { color:#ff5252; }

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-content {
    background:#1c1c1c;
    padding:20px;
    border-radius:10px;
    width:80%;
    max-height:80%;
    overflow:auto;
}

.close {
    float:right;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>VIP Operations Dashboard</h1>

<input type="file" id="upload">

<div class="card">
<h3>Floorplans</h3>
<table id="floorTable"></table>
</div>

<div class="card">
<h3>Outliers</h3>
<div id="outliers"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <div id="modalData"></div>
    </div>
</div>

<script>

let data=[];

document.getElementById('upload').onchange=e=>{
    let r=new FileReader();
    r.onload=evt=>{
        let wb=XLSX.read(evt.target.result,{type:'binary'});
        let sheet=wb.Sheets[wb.SheetNames[0]];
        data=XLSX.utils.sheet_to_json(sheet);
        render();
    };
    r.readAsBinaryString(e.target.files[0]);
};

function avg(a){return a.reduce((x,y)=>x+y,0)/a.length;}

function render(){

    renderFloorplans();
    renderOutliers();
}

function renderFloorplans(){
    let map={};

    data.forEach(d=>{
        if(!map[d.Floorplan]) map[d.Floorplan]=[];
        map[d.Floorplan].push(d);
    });

    let html="<tr><th>Floorplan</th><th>Avg</th><th>Budget</th></tr>";

    for(let f in map){
        let jobs=map[f];
        let avgH=avg(jobs.map(j=>j.Hours));
        let avgB=avg(jobs.map(j=>j["Budgetted Hours"]||0));

        html+=`<tr class="click" onclick="openModal('${f}')">
        <td>${f}</td>
        <td>${avgH.toFixed(2)}</td>
        <td>${avgB.toFixed(2)}</td>
        </tr>`;
    }

    document.getElementById("floorTable").innerHTML=html;
}

function openModal(floor){

    let jobs=data.filter(d=>d.Floorplan===floor);

    let html=`<h2>${floor}</h2>`;

    html+="<table><tr><th>Crew</th><th>Task</th><th>Hours</th><th>Budget</th><th>Diff</th></tr>";

    jobs.forEach(j=>{
        let diff=j.Hours - (j["Budgetted Hours"]||0);
        html+=`<tr>
        <td>${j.Employee}</td>
        <td>${j.Task}</td>
        <td>${j.Hours}</td>
        <td>${j["Budgetted Hours"]||0}</td>
        <td class="${diff>0?'bad':'good'}">${diff.toFixed(2)}</td>
        </tr>`;
    });

    html+="</table>";

    document.getElementById("modalData").innerHTML=html;
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function renderOutliers(){

    let avgH=avg(data.map(d=>d.Hours));

    let html="<h4>Outliers</h4>";

    data.forEach(d=>{
        let diff=d.Hours - (d["Budgetted Hours"]||0);

        if(Math.abs(diff) > 2){
            html+=`
            <div class="${diff>0?'bad':'good'}">
            ${d.Employee} | ${d.Floorplan} | ${d.Task}  
            → ${d.Hours}h (Budget: ${d["Budgetted Hours"]||0})  
            Diff: ${diff.toFixed(2)}
            </div>`;
        }
    });

    document.getElementById("outliers").innerHTML=html;
}

</script>

</body>
</html>
