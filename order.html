<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Formatter v3.1</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
}

.drop-zone {
    border: 2px dashed #444;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.drop-zone.dragover {
    border-color: #4caf50;
    background: #1f1f1f;
}

.file-name {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
}

.status {
    margin-top: 6px;
    font-size: 14px;
    color: #4caf50;
    font-weight: bold;
}

.buttons {
    margin-top: 20px;
    text-align: center;
}

button {
    background: #fff;
    color: #000;
    border: none;
    padding: 10px 18px;
    margin: 5px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ddd;
}

.output-container {
    margin-top: 25px;
    display: flex;
    gap: 20px;
}

.preview {
    flex: 1;
    background: #121212;
    padding: 15px;
    border-radius: 8px;
    overflow-y: auto;
    max-height: 450px;
}

.preview h3 {
    margin: 12px 0 6px;
    border-bottom: 1px solid #333;
    padding-bottom: 3px;
}

textarea {
    flex: 1;
    background: #000;
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    font-family: monospace;
    height: 450px;
    resize: none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Job Formatter v3.1 (AM Enabled)</h1>

<div class="drop-zone" id="dropZone">
    <div id="dropText">Drag & Drop Excel File or Click to Upload</div>
    <div class="file-name" id="fileName"></div>
    <div class="status" id="status"></div>
</div>

<input type="file" id="fileInput" hidden />

<div class="buttons">
    <button onclick="copyOutput()">Copy Output</button>
    <button onclick="clearAll()">Clear</button>
</div>

<div class="output-container">
    <div class="preview" id="preview"></div>
    <textarea id="output"></textarea>
</div>

</div>
</div>

<script>
let file;

const dropZone = document.getElementById("dropZone");
const dropText = document.getElementById("dropText");
const fileName = document.getElementById("fileName");
const status = document.getElementById("status");

// CLICK
dropZone.addEventListener("click", () => {
    document.getElementById("fileInput").click();
});

// FILE PICK
document.getElementById("fileInput").addEventListener("change", e => {
    file = e.target.files[0];
    handleFile();
});

// DRAG EVENTS
dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
    dropText.innerText = "Drop file here";
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
    resetDropText();
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    file = e.dataTransfer.files[0];
    handleFile();
});

function handleFile() {
    if (!file) return;

    fileName.innerText = `Loaded: ${file.name}`;
    dropText.innerText = "File ready";
    status.innerText = "✔ Processing...";

    processFile();
}

function processFile() {
    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let grouped = {};
        let count = 0;

        rows.forEach(row => {
            let subdivision = (row[0] || "").toString().trim();
            let lot = (row[1] || "").toString().trim();
            let job = (row[2] || "").toString().trim();
            let am = (row[3] || "").toString().trim();

            if (!subdivision || !lot || !job) return;

            if (!grouped[subdivision]) grouped[subdivision] = [];

            let entry = `${lot}-${job}`;

            // ✅ AM LOGIC
            if (am) {
                entry = `*AM ${entry}`;
            }

            grouped[subdivision].push(entry);
            count++;
        });

        let output = "";
        let previewHTML = "";

        Object.keys(grouped).forEach(sub => {
            output += `*${sub}\n`;
            previewHTML += `<h3>${sub}</h3>`;

            grouped[sub].forEach(entry => {
                output += entry + "\n";
                previewHTML += `<div>${entry}</div>`;
            });
        });

        document.getElementById("output").value = output.trim();
        document.getElementById("preview").innerHTML = previewHTML;

        status.innerText = `✔ ${count} jobs loaded`;
    };

    reader.readAsArrayBuffer(file);
}

function copyOutput() {
    const textarea = document.getElementById("output");
    textarea.select();
    document.execCommand("copy");
    alert("Copied!");
}

function clearAll() {
    file = null;
    document.getElementById("fileInput").value = "";
    document.getElementById("output").value = "";
    document.getElementById("preview").innerHTML = "";
    fileName.innerText = "";
    status.innerText = "";
    dropText.innerText = "Drag & Drop Excel File or Click to Upload";
}

function resetDropText() {
    dropText.innerText = file ? "File ready" : "Drag & Drop Excel File or Click to Upload";
}
</script>

</body>
</html>
