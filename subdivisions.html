<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subdivision List Builder v1.1</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1 {
  margin-bottom:5px;
}

.version {
  color:#666;
  margin-bottom:15px;
}

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input {
  padding:8px;
  border-radius:5px;
  border:none;
  width:260px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:#2a2a2a;
  color:#fff;
}

button:hover {
  background:#444;
}

.section {
  margin-bottom:20px;
}

.box {
  border:1px solid #333;
  padding:10px;
  border-radius:6px;
  background:#1a1a1a;
}

.table-container {
  max-height:60vh;
  overflow:auto;
  border:1px solid #333;
}

table {
  width:100%;
  border-collapse:collapse;
}

th {
  position:sticky;
  top:0;
  background:#222;
  padding:10px;
  border-bottom:1px solid #444;
}

td {
  padding:8px;
  border-bottom:1px solid #333;
}

.count {
  margin-bottom:10px;
  color:#aaa;
}

.builder-row {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #333;
}

.builder-row:last-child {
  border-bottom:none;
}

</style>
</head>

<body>

<h1>Subdivision List Builder</h1>
<div class="version">v1.1</div>

<div class="topbar">
  <input id="search" placeholder="Search builder or subdivision...">
  <button onclick="copyData()">Copy</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<!-- BUILDER COUNTS -->
<div class="section">
  <h3>Subdivisions Per Builder</h3>
  <div class="box" id="builderCounts"></div>
</div>

<!-- TABLE -->
<div class="section">
  <div class="count" id="count">Loading...</div>

  <div class="table-container">
    <table id="table">
      <thead>
        <tr>
          <th>Builder</th>
          <th>Subdivision</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>

let DATA = [];
let FULL_DATA = [];

// ---------- NORMALIZE ----------
function normalize(str){
  return (str || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g," ");
}

function toTitleCase(str){
  return str.replace(/\w\S*/g, w =>
    w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
  );
}

// ---------- LOAD ----------
async function loadData(){
  try {
    const res = await fetch("lots(1).json");
    const json = await res.json();

    let map = new Map();

    json.forEach(lot => {
      let builderRaw = normalize(lot.builder);
      let subdivisionRaw = normalize(lot.subdivision);

      if(!builderRaw || !subdivisionRaw) return;

      let key = builderRaw + "|" + subdivisionRaw;

      map.set(key, {
        builder: toTitleCase(builderRaw),
        subdivision: toTitleCase(subdivisionRaw)
      });
    });

    FULL_DATA = Array.from(map.values())
      .sort((a,b) => {
        if(a.builder === b.builder){
          return a.subdivision.localeCompare(b.subdivision);
        }
        return a.builder.localeCompare(b.builder);
      });

    DATA = [...FULL_DATA];

    render(DATA);
    renderBuilderCounts(FULL_DATA);

  } catch(err){
    document.getElementById("count").innerText = "Error loading lots(1).json";
    console.error(err);
  }
}

// ---------- RENDER TABLE ----------
function render(data){
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(row => {
    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.builder}</td>
      <td>${row.subdivision}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("count").innerText =
    `Total Unique Subdivisions: ${data.length}`;
}

// ---------- BUILDER COUNTS ----------
function renderBuilderCounts(data){
  let counts = {};

  data.forEach(r => {
    counts[r.builder] = (counts[r.builder] || 0) + 1;
  });

  let container = document.getElementById("builderCounts");
  container.innerHTML = "";

  Object.keys(counts)
    .sort((a,b)=>a.localeCompare(b))
    .forEach(builder => {

      let div = document.createElement("div");
      div.className = "builder-row";

      div.innerHTML = `
        <div>${builder}</div>
        <div><b>${counts[builder]}</b></div>
      `;

      container.appendChild(div);
    });
}

// ---------- SEARCH ----------
document.getElementById("search").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();

  let filtered = FULL_DATA.filter(r =>
    r.builder.toLowerCase().includes(val) ||
    r.subdivision.toLowerCase().includes(val)
  );

  DATA = filtered;
  render(DATA);
});

// ---------- COPY ----------
function copyData(){
  let text = "Builder\tSubdivision\n";

  DATA.forEach(r => {
    text += `${r.builder}\t${r.subdivision}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// ---------- EXPORT ----------
function exportCSV(){
  let csv = "Builder,Subdivision\n";

  DATA.forEach(r => {
    csv += `"${r.builder}","${r.subdivision}"\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "subdivisions.csv";
  a.click();
}

loadData();

</script>

</body>
</html>
