<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Lookup</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f0f0f;
  color: #fff;
}

/* HEADER */
.header {
  padding: 15px;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #222;
}

h1 { margin: 0 0 10px 0; }

/* BUILDER UPDATE BAR */
#builderUpdates {
  padding: 8px 15px;
  background: #0d0d0d;
  border-bottom: 1px solid #222;
  font-size: 0.85rem;
}

.builder-pill {
  margin-right: 12px;
  color: #aaa;
}

/* FILTERS */
.filters {
  display: grid;
  grid-template-columns: 120px auto 1fr 180px 180px auto auto auto;
  gap: 10px;
}

.filters input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e1e1e;
  color: #fff;
}

/* BUTTONS */
.btn {
  background: #222;
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
}

.btn:hover { background: #333; }

/* TABLE */
.table-container {
  height: calc(100vh - 180px);
  overflow-y: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  position: sticky;
  top: 0;
  background: #1a1a1a;
  z-index: 5;
  cursor: pointer;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #222;
}

tr:hover { background: #1c1c1c; }

.highlight {
  color: #4da3ff;
  font-weight: 600;
}

/* 🔥 NEW ROW HIGHLIGHT */
.new-row {
  background: rgba(77,163,255,0.15);
}

.new-row:hover {
  background: rgba(77,163,255,0.25);
}

.sort-indicator { margin-left: 5px; }

/* MODAL */
#newLotsModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  z-index:100;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="header">
  <h1>Lot Lookup</h1>

  <div class="filters">
    <input id="filterLot" placeholder="Lot">
    <button class="btn" onclick="exactLotSearch()">🎯</button>

    <input id="filterSubdivision" placeholder="Subdivision">
    <input id="filterBuilder" placeholder="Builder">
    <input id="filterFloorplan" placeholder="Floorplan">

    <button class="btn" onclick="showNewLots()">🆕</button>
    <button class="btn" onclick="refreshData()">🔄</button>
    <button class="btn" onclick="clearFilters()">Clear</button>
  </div>
</div>

<div id="builderUpdates">
  <strong>Last Updated:</strong>
  <span id="builderUpdateList"></span>
</div>

<!-- NEW LOTS MODAL -->
<div id="newLotsModal">
  <div style="background:#111;padding:20px;border-radius:10px;width:90%;max-width:500px;">
    <h3>New Lots This Week</h3>
    <div id="newLotsList"></div>
    <button class="btn" onclick="closeNewLots()">Close</button>
  </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th onclick="sortTable('lotNumber')">Lot<span id="sort-lotNumber"></span></th>
<th onclick="sortTable('subdivision')">Subdivision</th>
<th onclick="sortTable('builder')">Builder</th>
<th>Address</th>
<th onclick="sortTable('floorplan')">Floorplan</th>
</tr>
</thead>
<tbody id="resultsTable"></tbody>
</table>
</div>

<script>
let lots = [];
let currentSort = { key: null, asc: true };

function loadData() {
  fetch('lots(1).json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      lots = data;
      buildBuilderUpdates();
      filterLots();
    });
}
loadData();

function refreshData() { loadData(); }

/* BUILDER UPDATE */
function buildBuilderUpdates() {
  const latest = {};
  lots.forEach(lot => {
    if (!lot.lastUpdated) return;
    const d = new Date(lot.lastUpdated);
    if (!latest[lot.builder] || d > latest[lot.builder]) {
      latest[lot.builder] = d;
    }
  });

  const el = document.getElementById('builderUpdateList');
  el.innerHTML = '';

  Object.entries(latest).forEach(([builder, date]) => {
    const span = document.createElement('span');
    span.className = 'builder-pill';
    span.textContent = `${builder} – ${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;

    if (Date.now() - date.getTime() > 30*86400000) {
      span.style.color = '#ff6b6b';
    }

    el.appendChild(span);
  });
}

/* SMART LOT SORT */
function smartLotSort(a,b){
  const parse=x=>{
    const m=x.toString().match(/^(\d+)([A-Za-z]*)$/);
    return {num:m?parseInt(m[1]):0,suffix:m?m[2]:''};
  };
  const A=parse(a.lotNumber),B=parse(b.lotNumber);
  return A.num!==B.num?A.num-B.num:A.suffix.localeCompare(B.suffix);
}

/* FILTER */
function filterLots(){
  const lotVal=filterLot.value.toLowerCase();
  const subVal=filterSubdivision.value.toLowerCase();
  const builderVal=filterBuilder.value.toLowerCase();
  const floorVal=filterFloorplan.value.toLowerCase();

  let filtered=lots.filter(l=>
    (!lotVal||l.lotNumber.toLowerCase().includes(lotVal)) &&
    (!subVal||l.subdivision.toLowerCase().includes(subVal)) &&
    (!builderVal||l.builder.toLowerCase().includes(builderVal)) &&
    (!floorVal||(l.floorplan||'').toLowerCase().includes(floorVal))
  );

  if(subVal&&!currentSort.key) filtered.sort(smartLotSort);
  else if(currentSort.key) filtered=sortData(filtered,currentSort.key,currentSort.asc);

  renderTable(filtered);
}

/* EXACT LOT */
function exactLotSearch(){
  const v=filterLot.value.trim().toLowerCase();
  if(!v)return;
  renderTable(lots.filter(l=>l.lotNumber.toLowerCase()===v));
}

/* NEW LOTS */
function showNewLots(){
  const week=new Date(Date.now()-7*86400000);
  const newLots=lots.filter(l=>l.lastUpdated && new Date(l.lastUpdated)>=week);

  const el=document.getElementById('newLotsList');
  el.innerHTML='';

  newLots.forEach(l=>{
    const d=document.createElement('div');
    d.style.padding='8px';
    d.innerHTML=`<strong>${l.lotNumber}</strong> – ${l.subdivision}<br><span style="color:#888">${l.builder}</span>`;
    d.onclick=()=>{
      filterLot.value=l.lotNumber;
      filterLots();
      closeNewLots();
    };
    el.appendChild(d);
  });

  newLotsModal.style.display='flex';
}
function closeNewLots(){ newLotsModal.style.display='none'; }

/* RENDER */
function renderTable(data){
  resultsTable.innerHTML='';

  const week=new Date(Date.now()-7*86400000);

  data.forEach(l=>{
    const row=document.createElement('tr');

    // 🔥 AUTO HIGHLIGHT NEW
    if(l.lastUpdated && new Date(l.lastUpdated)>=week){
      row.classList.add('new-row');
    }

    row.innerHTML=`
      <td>${l.lotNumber}</td>
      <td>${l.subdivision}</td>
      <td>${l.builder}</td>
      <td>${l.address}</td>
      <td>${l.floorplan||'N/A'}</td>
    `;
    resultsTable.appendChild(row);
  });
}

/* SORT */
function sortTable(key){
  currentSort.key===key?currentSort.asc=!currentSort.asc:currentSort={key,asc:true};
  filterLots();
}

function sortData(d,k,a){
  return [...d].sort((x,y)=>{
    let A=x[k]||'',B=y[k]||'';
    if(!isNaN(A)&&!isNaN(B)) return a?A-B:B-A;
    return a?A.localeCompare(B):B.localeCompare(A);
  });
}

/* CLEAR */
function clearFilters(){
  document.querySelectorAll('.filters input').forEach(i=>i.value='');
  currentSort={key:null,asc:true};
  renderTable(lots);
}

document.querySelectorAll('.filters input').forEach(i=>i.addEventListener('input',filterLots));
</script>

</body>
</html>
