<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overtime Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1 { text-align:center; }

.controls { text-align:center; margin-bottom:15px; }

button {
    background:white;
    color:black;
    border:none;
    padding:8px 14px;
    margin:5px;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    border:1px solid #333;
    padding:6px;
    text-align:center;
}

.normal { background:#0f2e0f; }
.warning { background:#5a4b00; }
.overtime { background:#5c0000; font-weight:bold; }

</style>
</head>

<body>

<h1>Overtime Predictor</h1>

<div class="controls">
    <input type="file" id="fileInput" accept=".xlsx,.csv">
    <button onclick="processFile()">Load File</button>
    <button onclick="exportExcel()">Export</button>
</div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
<th>Actual</th>
<th>Projected</th>
<th>OT</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

function processFile() {
    const file = document.getElementById('fileInput').files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(sheet);

        render(data);
    };

    reader.readAsBinaryString(file);
}

function clean(val) {
    if (val === " " || val === "" || val == null) return 0;
    return parseFloat(val) || 0;
}

function render(data) {
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    let today = new Date().getDay();
    let map = {1:0,2:1,3:2,4:3,5:4};
    let todayIndex = map[today] ?? 4;

    data.forEach(row => {

        let name = row["Name"];
        if (!name) return;

        let days = [
            clean(row["Monday"]),
            clean(row["Tuesday"]),
            clean(row["Wednesday"]),
            clean(row["Thursday"]),
            clean(row["Friday"])
        ];

        let actual = days.reduce((a,b)=>a+b,0);

        let projected = 0;

        days.forEach((h, i) => {
            if (i <= todayIndex) projected += h;
            else projected += 8;
        });

        let ot = projected > 40 ? projected - 40 : 0;

        let tr = document.createElement("tr");

        if (projected > 40) tr.classList.add("overtime");
        else if (projected >= 36) tr.classList.add("warning");
        else tr.classList.add("normal");

        tr.innerHTML = `
            <td>${name}</td>
            ${days.map(d=>`<td>${d.toFixed(2)}</td>`).join("")}
            <td>${actual.toFixed(2)}</td>
            <td>${projected.toFixed(2)}</td>
            <td>${ot.toFixed(2)}</td>
        `;

        tbody.appendChild(tr);
    });
}

function exportExcel() {
    let rows = [["Name","Mon","Tue","Wed","Thu","Fri","Actual","Projected","OT"]];

    document.querySelectorAll("#table tbody tr").forEach(tr => {
        let cols = tr.querySelectorAll("td");
        rows.push([...cols].map(td => td.innerText));
    });

    let ws = XLSX.utils.aoa_to_sheet(rows);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "OT");

    XLSX.writeFile(wb, "overtime.xlsx");
}

</script>

</body>
</html>
