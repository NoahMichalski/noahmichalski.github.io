<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Formatter v1.2</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    padding: 20px;
}

h1 {
    text-align: center;
}

textarea {
    width: 100%;
    height: 400px;
    background: #000;
    color: #0f0;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    white-space: pre;
}

button, input {
    margin: 10px;
}
</style>
</head>

<body>

<h1>Job Formatter v1.2 (Clean Output)</h1>

<input type="file" id="fileInput" />
<button onclick="processFile()">Process File</button>
<button onclick="copyOutput()">Copy Output</button>

<textarea id="output"></textarea>

<script>
function processFile() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert("Upload a file first");

    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let grouped = {};

        rows.forEach(row => {
            let subdivision = (row[0] || "").toString().trim();
            let lot = (row[1] || "").toString().trim();
            let job = (row[2] || "").toString().trim();

            if (!subdivision || !lot || !job) return;

            if (!grouped[subdivision]) {
                grouped[subdivision] = [];
            }

            grouped[subdivision].push(`${lot}-${job}`);
        });

        let output = "";

        Object.keys(grouped).forEach(sub => {
            // bold subdivision
            output += `**${sub}**\n`;

            grouped[sub].forEach(entry => {
                output += entry + "\n";
            });
        });

        document.getElementById("output").value = output.trim();
    };

    reader.readAsArrayBuffer(file);
}

function copyOutput() {
    const textarea = document.getElementById("output");
    textarea.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
