<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Dashboard v2</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0e0e0e;
    color:#fff;
    font-family:system-ui;
    margin:0;
    padding:20px;
}

h1 { text-align:center; margin-bottom:20px; }

.container { max-width:1400px; margin:auto; }

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.card {
    background:#181818;
    border-radius:12px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,.4);
}

table {
    width:100%;
    border-collapse:collapse;
}

td,th {
    padding:8px;
    border-bottom:1px solid #333;
}

.click { cursor:pointer; }
.good { color:#4caf50; }
.bad { color:#ff5252; }

input {
    padding:6px;
    margin-right:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>VIP Operations Dashboard</h1>

<input type="file" id="upload">
<input type="date" id="startDate">
<input type="date" id="endDate">

<div class="grid">

<div class="card">
<h3>🏆 Crew Rankings</h3>
<table id="crewTable"></table>
</div>

<div class="card">
<h3>📊 Floorplan Performance</h3>
<table id="floorTable"></table>
</div>

<div class="card">
<h3>📈 Task Averages</h3>
<canvas id="taskChart"></canvas>
</div>

<div class="card">
<h3>📅 Trend Over Time</h3>
<canvas id="trendChart"></canvas>
</div>

</div>

<div class="card">
<h3>🔎 Floorplan Drilldown</h3>
<div id="drill"></div>
</div>

</div>

<script>

let raw=[],data=[];

document.getElementById('upload').onchange=e=>{
    let r=new FileReader();
    r.onload=evt=>{
        let wb=XLSX.read(evt.target.result,{type:'binary'});
        let sheet=wb.Sheets[wb.SheetNames[0]];
        raw=XLSX.utils.sheet_to_json(sheet);
        data=raw;
        render();
    };
    r.readAsBinaryString(e.target.files[0]);
};

document.getElementById('startDate').onchange=applyFilter;
document.getElementById('endDate').onchange=applyFilter;

function applyFilter(){
    let s=document.getElementById('startDate').value;
    let e=document.getElementById('endDate').value;

    data=raw.filter(d=>{
        let dt=new Date(d.Date);
        return (!s||dt>=new Date(s)) && (!e||dt<=new Date(e));
    });

    render();
}

function render(){
    renderCrew();
    renderFloorplans();
    renderCharts();
}

function avg(a){return a.reduce((x,y)=>x+y,0)/a.length;}

function renderCrew(){
    let map={};

    data.forEach(d=>{
        if(!map[d.Employee]) map[d.Employee]=[];
        map[d.Employee].push(d.Hours);
    });

    let global=avg(data.map(d=>d.Hours));

    let rows=Object.entries(map).map(([k,v])=>{
        let a=avg(v);
        return {crew:k,avg:a,eff:a/global};
    });

    rows.sort((a,b)=>a.eff-b.eff);

    let html="<tr><th>#</th><th>Crew</th><th>Avg</th><th>Eff</th></tr>";

    rows.forEach((r,i)=>{
        html+=`<tr>
        <td>${i+1}</td>
        <td>${r.crew}</td>
        <td>${r.avg.toFixed(2)}</td>
        <td class="${r.eff<1?'good':'bad'}">${r.eff.toFixed(2)}</td>
        </tr>`;
    });

    document.getElementById("crewTable").innerHTML=html;
}

function renderFloorplans(){
    let map={};

    data.forEach(d=>{
        let key=d.Floorplan;
        if(!map[key]) map[key]=[];
        map[key].push(d);
    });

    let html="<tr><th>Floorplan</th><th>Avg</th><th>Budget</th><th>Variance</th></tr>";

    for(let f in map){
        let jobs=map[f];
        let avgH=avg(jobs.map(j=>j.Hours));
        let avgB=avg(jobs.map(j=>j["Budgetted Hours"]||0));
        let varr=((avgH-avgB)/avgB)*100;

        html+=`<tr class="click" onclick="drill('${f}')">
        <td>${f}</td>
        <td>${avgH.toFixed(2)}</td>
        <td>${avgB.toFixed(2)}</td>
        <td class="${varr<0?'good':'bad'}">${varr.toFixed(1)}%</td>
        </tr>`;
    }

    document.getElementById("floorTable").innerHTML=html;
}

function drill(floor){
    let jobs=data.filter(d=>d.Floorplan===floor);

    let html=`<h3>${floor}</h3>`;

    html+="<table><tr><th>Crew</th><th>Task</th><th>Hours</th><th>Budget</th></tr>";

    jobs.forEach(j=>{
        html+=`<tr>
        <td>${j.Employee}</td>
        <td>${j.Task}</td>
        <td>${j.Hours}</td>
        <td>${j["Budgetted Hours"]}</td>
        </tr>`;
    });

    html+="</table>";

    document.getElementById("drill").innerHTML=html;
}

function renderCharts(){

    let taskMap={};
    data.forEach(d=>{
        if(!taskMap[d.Task]) taskMap[d.Task]=[];
        taskMap[d.Task].push(d.Hours);
    });

    new Chart(document.getElementById("taskChart"),{
        type:'bar',
        data:{
            labels:Object.keys(taskMap),
            datasets:[{
                label:'Avg Hours',
                data:Object.values(taskMap).map(avg)
            }]
        }
    });

    let dates=[...new Set(data.map(d=>d.Date))].sort();
    let trend=dates.map(dt=>{
        let day=data.filter(d=>d.Date===dt);
        return avg(day.map(d=>d.Hours));
    });

    new Chart(document.getElementById("trendChart"),{
        type:'line',
        data:{
            labels:dates,
            datasets:[{label:'Avg Hours',data:trend}]
        }
    });
}

</script>

</body>
</html>
