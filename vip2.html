<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Builder Map v1.31</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:sans-serif;}
#map{height:100%}

/* SEARCH */
.search-box{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  z-index:1002;width:320px;
}
#searchInput{
  width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;
}
.search-results{
  background:white;border-radius:8px;margin-top:5px;
  max-height:220px;overflow:auto;
}
.search-results div{
  padding:10px;border-bottom:1px solid #eee;cursor:pointer;
}
.search-results div:hover{background:#f0f0f0}

/* LOGO */
#vipLogo{
  position:absolute;
  bottom:10px;
  left:10px;
  width:110px;
  z-index:1002;
}

/* VERSION */
#version{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.85);
  padding:4px 10px;
  border-radius:6px;
  z-index:1002;
}

/* CONTROLS */
#controls{
  position:absolute;
  top:60px;
  right:10px;
  width:240px;
  max-height:70vh;
  background:white;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  z-index:1001;
}

@media (max-width:700px){
  #controls{
    bottom:0;
    top:auto;
    left:0;
    right:0;
    width:100%;
    max-height:45vh;
    border-radius:12px 12px 0 0;
  }
}

/* HEADER */
#controlsHeader{
  padding:10px;
  border-bottom:1px solid #ddd;
  background:white;
  position:sticky;
  top:0;
}

/* LIST */
#controlsList{
  overflow-y:auto;
  padding:10px;
}

/* BUTTON */
#toggleUI{
  position:absolute;
  top:10px;
  right:10px;
  z-index:1003;
  padding:8px 12px;
}

/* LEGEND */
#legend{
  position:absolute;
  bottom:60px;
  right:10px;
  background:white;
  padding:10px;
  border-radius:10px;
  z-index:1001;
  font-size:14px;
}

/* POPUP */
.leaflet-popup-content{
  margin:8px !important;
  text-align:center;
  min-width:200px;
}
</style>
</head>

<body>

<button id="toggleUI">Hide</button>

<div class="search-box">
  <input id="searchInput" placeholder="Search subdivision...">
  <div id="results" class="search-results"></div>
</div>

<div id="controls"></div>
<div id="legend"></div>

<div id="version">v1.31</div>
<img id="vipLogo" src="/images/logo-VIP.png">

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([40.1,-83.1],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const colorMap = {
  "Pulte":"green","Ryan":"violet","DR Horton":"black",
  "Epcon":"gold","Schottenstein":"red","Rockford":"blue",
  "MI Homes":"grey","Centex":"green","Del Webb":"green"
};

let builderGroups = {};
let markers = [];
let controlsVisible = true;

/* NORMALIZE */
function normalizeBuilder(name){
  if(!name) return "Unknown";
  return name.toLowerCase().includes("shottenstein")
    ? "Schottenstein"
    : name;
}

/* 🔥 LOT MAP FIX */
function getLotMapHTML(lotMap){

  if (!lotMap) return `<i>No lot map</i>`;

  const clean = String(lotMap).trim();

  if (
    clean === "" ||
    clean.toLowerCase().includes("no") ||
    clean === "null"
  ){
    return `<i>No lot map</i>`;
  }

  // image detection
  const isImage = clean.match(/\.(jpg|jpeg|png|webp)$/i);

  if(isImage){
    return `
      <a href="${clean}" target="_blank">Open Lot Map</a><br>
      <img src="${clean}" style="width:100%;max-width:200px;margin-top:6px;border-radius:6px;">
    `;
  }

  return `<a href="${clean}" target="_blank">View Lot Map</a>`;
}

/* LOAD DATA */
fetch("subdivisions.json")
.then(r=>r.json())
.then(data=>{

  data.forEach(item=>{

    const b = normalizeBuilder(item.builder);

    const icon = L.icon({
      iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${colorMap[b]||'blue'}.png`,
      shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
      iconSize:[25,41],iconAnchor:[12,41]
    });

    const marker = L.marker([item.coords.lat,item.coords.lon],{icon});

    const lotHTML = getLotMapHTML(item.lotMap);

    marker.bindPopup(`
      <b>${item.subdivision}</b><br>
      ${b}<br><br>
      ${lotHTML}<br><br>
      <a target="_blank"
      href="https://www.google.com/maps/search/?api=1&query=${item.coords.lat},${item.coords.lon}">
      ${item.address}</a>
    `);

    if(!builderGroups[b]){
      builderGroups[b]=L.layerGroup().addTo(map);
    }

    builderGroups[b].addLayer(marker);

    markers.push({...item, builder:b, marker});
  });

  buildControls();
  buildLegend();
  setupSearch();
});

/* SEARCH */
function setupSearch(){
  const input = document.getElementById("searchInput");
  const results = document.getElementById("results");

  input.addEventListener("input",()=>{
    const val = input.value.toLowerCase();
    results.innerHTML="";

    if(!val) return;

    markers.filter(m=>m.subdivision.toLowerCase().includes(val))
    .forEach(m=>{
      const div = document.createElement("div");
      div.innerHTML = `<b>${m.builder}</b> - ${m.subdivision}`;

      div.onclick=()=>{
        map.setView([m.coords.lat,m.coords.lon],14);
        m.marker.openPopup();
        results.innerHTML="";
      };

      results.appendChild(div);
    });
  });
}

/* CONTROLS */
function buildControls(){
  const container = document.getElementById("controls");
  container.innerHTML="";

  let counts={};
  markers.forEach(m=>{
    counts[m.builder]=(counts[m.builder]||0)+1;
  });

  const header = document.createElement("div");
  header.id="controlsHeader";
  header.innerHTML = `<b>Total Subdivisions: ${markers.length}</b><br><br>`;

  const allBtn = document.createElement("button");
  allBtn.innerText="All";
  allBtn.onclick=()=>{
    Object.values(builderGroups).forEach(g=>g.addTo(map));
    document.querySelectorAll("#controls input").forEach(c=>c.checked=true);
  };

  const noneBtn = document.createElement("button");
  noneBtn.innerText="None";
  noneBtn.onclick=()=>{
    Object.values(builderGroups).forEach(g=>map.removeLayer(g));
    document.querySelectorAll("#controls input").forEach(c=>c.checked=false);
  };

  header.appendChild(allBtn);
  header.appendChild(noneBtn);
  container.appendChild(header);

  const list = document.createElement("div");
  list.id="controlsList";

  Object.entries(counts)
  .sort((a,b)=>b[1]-a[1])
  .forEach(([b,c])=>{
    const cb = document.createElement("input");
    cb.type="checkbox"; cb.checked=true;

    cb.onchange=()=>{
      cb.checked ? builderGroups[b].addTo(map)
                 : map.removeLayer(builderGroups[b]);
    };

    const label = document.createElement("label");
    label.appendChild(cb);
    label.append(` ${b} (${c})`);

    list.appendChild(label);
    list.appendChild(document.createElement("br"));
  });

  container.appendChild(list);
}

/* LEGEND */
function buildLegend(){
  const div = document.getElementById("legend");

  Object.entries(colorMap).forEach(([b,c])=>{
    const row=document.createElement("div");
    row.innerHTML=`<span style="color:${c}">●</span> ${b}`;
    div.appendChild(row);
  });
}

/* TOGGLE */
document.getElementById("toggleUI").onclick=()=>{
  controlsVisible=!controlsVisible;
  document.getElementById("controls").style.display =
    controlsVisible?"flex":"none";
  document.getElementById("legend").style.display =
    controlsVisible?"block":"none";
};

</script>
</body>
</html>
