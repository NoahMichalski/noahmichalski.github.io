<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Job Intake</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    background:#0f1115;
    color:#e6e6e6;
    font-family:Arial;
    padding:20px;
}

h1 { margin-bottom:5px; }

#version {
    position:absolute;
    top:15px;
    right:20px;
    color:#888;
    font-size:12px;
}

/* Buttons */
button {
    margin:5px;
    padding:8px 12px;
    background:#1f2937;
    color:#fff;
    border:1px solid #374151;
    cursor:pointer;
}
button:hover { background:#374151; }

/* Table */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th, td {
    border:1px solid #2c2f36;
    padding:6px;
}
th {
    background:#1f2937;
}

/* Inputs */
input {
    width:100%;
    background:#0f172a;
    color:#fff;
    border:none;
    padding:5px;
}

/* Status Colors */
.good { background:#132a1c; }
.warn { background:#3a2f0c; }
.bad  { background:#3a1212; }

/* Search */
#searchResults div {
    padding:6px;
    border-bottom:1px solid #2c2f36;
    cursor:pointer;
}
#searchResults div:hover {
    background:#1f2937;
}

#lotStatus {
    margin-bottom:10px;
    color:#9ca3af;
}
</style>
</head>

<body>

<div id="version">v1.0.0</div>

<h1>VIP Job Intake</h1>
<div id="lotStatus">Loading lots...</div>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="validateAll()">✅ Validate</button>
<button onclick="exportExcel()">📤 Export Excel</button>

<h3>Search Lots</h3>
<input id="searchBox" oninput="searchLots()" placeholder="Search lot / subdivision / builder">
<div id="searchResults"></div>

<table>
<thead>
<tr>
<th>Lot</th>
<th>Subdivision</th>
<th>Builder</th>
<th>Task</th>
<th>AM</th>
<th>Notes</th>
<th>Status</th>
<th>Check</th>
<th>X</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

let lotsArray = [];
let lotsData = {};

// 🔄 LOAD JSON
async function loadLots(){
    try {
        let res = await fetch("lots(1).json?v=" + Date.now());
        let data = await res.json();

        lotsArray = data;
        lotsData = {};

        data.forEach(lot=>{
            let key = `${lot.lotNumber}|${lot.subdivision}`;
            lotsData[key] = lot;
        });

        document.getElementById("lotStatus").innerText =
            "Lots Loaded: " + data.length;

        console.log("Loaded:", data.length);

    } catch(err){
        console.error(err);
        document.getElementById("lotStatus").innerText =
            "FAILED TO LOAD lots(1).json";
    }
}

window.onload = loadLots;

// ➕ ADD ROW
function addRow(lotData=null){
    let tbody = document.getElementById("tbody");

    let tr = document.createElement("tr");

    tr.innerHTML = `
        <td><input></td>
        <td><input></td>
        <td><input></td>
        <td><input></td>
        <td style="text-align:center;"><input type="checkbox"></td>
        <td><input placeholder="Notes (required if Other)"></td>
        <td>Status</td>
        <td><button onclick="validateRow(this)">Check</button></td>
        <td><button onclick="this.closest('tr').remove()">X</button></td>
    `;

    tbody.appendChild(tr);

    if(lotData){
        tr.cells[0].querySelector("input").value = lotData.lotNumber;
        tr.cells[1].querySelector("input").value = lotData.subdivision;
        tr.cells[2].querySelector("input").value = lotData.builder;

        validateRow(tr.querySelector("button"));
    }
}

// ✅ VALIDATE ROW
function validateRow(btn){
    let row = btn.closest("tr");

    let lot = row.cells[0].querySelector("input").value.trim();
    let sub = row.cells[1].querySelector("input").value.trim();
    let builder = row.cells[2].querySelector("input").value.trim();

    let key = `${lot}|${sub}`;
    let lotObj = lotsData[key];

    let status = [];
    let cls = "good";

    if(!lotObj){
        let matches = lotsArray.filter(l=>String(l.lotNumber) === lot);

        if(matches.length > 1){
            status.push("SELECT FROM SEARCH");
            cls = "warn";
        } else {
            status.push("LOT NOT FOUND");
            cls = "bad";
        }
    } else {
        if(lotObj.builder !== builder){
            status.push("BUILDER MISMATCH");
            cls = "warn";
        }
    }

    if(status.length === 0) status.push("OK");

    row.className = cls;
    row.cells[6].innerText = status.join(", ");
}

// 🔁 VALIDATE ALL
function validateAll(){
    document.querySelectorAll("#tbody tr").forEach(r=>{
        validateRow(r.querySelector("button"));
    });
}

// 📤 EXPORT
function exportExcel(){
    let data = [];

    let rows = document.querySelectorAll("#tbody tr");

    for(let r of rows){
        if(r.className !== "good") continue;

        let task = r.cells[3].querySelector("input").value.trim();
        let notes = r.cells[5].querySelector("input").value.trim();

        if(task.toLowerCase() === "other" && !notes){
            alert("Missing notes for 'Other' on lot " + r.cells[0].querySelector("input").value);
            return;
        }

        data.push({
            Builder: r.cells[2].querySelector("input").value,
            Subdivision: r.cells[1].querySelector("input").value,
            Lot: r.cells[0].querySelector("input").value,
            Task: task,
            "AM Job": r.cells[4].querySelector("input").checked ? "YES" : "",
            Notes: notes
        });
    }

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Cleaning");

    XLSX.writeFile(wb, "cleaning_jobs.xlsx");
}

// 🔍 SEARCH
function searchLots(){
    let q = document.getElementById("searchBox").value.toLowerCase();

    let results = lotsArray.filter(lot=>{
        return String(lot.lotNumber).includes(q) ||
               lot.subdivision.toLowerCase().includes(q) ||
               lot.builder.toLowerCase().includes(q);
    });

    let container = document.getElementById("searchResults");
    container.innerHTML = "";

    results.slice(0,20).forEach(lot=>{
        let div = document.createElement("div");
        div.innerText = `${lot.lotNumber} | ${lot.subdivision} | ${lot.builder}`;

        div.onclick = ()=>addRow(lot);

        container.appendChild(div);
    });
}

</script>

</body>
</html>
