<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Job Intake</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; }

.tabs button {
    padding:10px;
    margin-right:5px;
    background:#222;
    border:1px solid #555;
    cursor:pointer;
}
.active { background:#444; }

table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #444; padding:6px; }
th { background:#333; }

input, select {
    width:100%;
    background:#222;
    color:#fff;
    border:none;
    padding:5px;
}

button.action {
    padding:6px 10px;
    background:#222;
    border:1px solid #555;
    cursor:pointer;
}

.good { background:#163d1c; }
.warn { background:#4a3b00; }
.bad { background:#4a1c1c; }

#searchResults div {
    padding:6px;
    border-bottom:1px solid #333;
    cursor:pointer;
}
#searchResults div:hover { background:#333; }
</style>
</head>

<body>

<h1>VIP Job Intake</h1>

<div id="lotStatus">Lots: Loading...</div>

<div class="tabs">
    <button onclick="switchTab('cleaning')" id="cleaningTab" class="active">Cleaning</button>
    <button onclick="switchTab('labor')" id="laborTab">Labor</button>
</div>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="validateAll()">✅ Validate</button>
<button onclick="exportExcel()">📤 Export Excel</button>

<h3>Search Lots</h3>
<input id="searchBox" oninput="searchLots()" placeholder="Search lot / subdivision / builder">
<div id="searchResults"></div>

<table>
<thead>
<tr>
<th>Lot</th>
<th>Subdivision</th>
<th>Builder</th>
<th>Task</th>
<th>Status</th>
<th>Check</th>
<th>X</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

let currentTab = "cleaning";
let lotsData = {};
let lotsArray = [];

let tasks = {
    cleaning: ["Original","Reclean","Windows","Final Clean","Touch Up"],
    labor: [
        "Punch Out","Insulation Prep","2nd Roll","Carpet Prep",
        "Carpet prep/scrap house/gar/lot","Laquer Prep","Drywall Sweep",
        "Cover Carpet","Power Wash Interior- basement/garage",
        "Powerwash Garage","Powerwash exterior/low siding around",
        "Relay","Cover Crawl","p/w Basement/Garage/drive/walks/porch",
        "p/w gar/drives/walks/porch/back courtyard",
        "p/w Basement/Garage/Porch","Bracing","Remove Bracing",
        "Bolts","Pump","Flood",
        "Scrap- inside house/floor coverings/garage","Other"
    ]
};

async function loadLots() {
    try {
        let res = await fetch("lots(1).json");
        let data = await res.json();

        lotsData = {};
        lotsArray = data;

        data.forEach(lot=>{
            let key = String(lot.lotNumber).trim(); // STRICT KEY
            lotsData[key] = lot;
        });

        document.getElementById("lotStatus").innerText =
            "Lots Loaded: " + Object.keys(lotsData).length;

    } catch (err) {
        document.getElementById("lotStatus").innerText = "FAILED TO LOAD LOTS";
        console.error(err);
    }
}

window.onload = () => loadLots();

function switchTab(tab){
    currentTab = tab;
    document.getElementById("cleaningTab").classList.remove("active");
    document.getElementById("laborTab").classList.remove("active");
    document.getElementById(tab+"Tab").classList.add("active");

    document.getElementById("tbody").innerHTML = "";
}

function addRow(lotData=null){
    let tbody = document.getElementById("tbody");

    let select = `<select>`;
    tasks[currentTab].forEach(t=>{
        select += `<option>${t}</option>`;
    });
    select += `</select>`;

    let tr = document.createElement("tr");

    tr.innerHTML = `
        <td><input></td>
        <td><input></td>
        <td><input></td>
        <td>${select}</td>
        <td>Status</td>
        <td><button class="action" onclick="validateRow(this)">Check</button></td>
        <td><button class="action" onclick="this.closest('tr').remove()">X</button></td>
    `;

    tbody.appendChild(tr);

    if(lotData){
        tr.cells[0].querySelector("input").value = lotData.lotNumber;
        tr.cells[1].querySelector("input").value = lotData.subdivision;
        tr.cells[2].querySelector("input").value = lotData.builder;
    }
}

function validateRow(btn){
    let row = btn.closest("tr");

    let lot = String(row.cells[0].querySelector("input").value).trim();
    let sub = row.cells[1].querySelector("input").value.trim();
    let builder = row.cells[2].querySelector("input").value.trim();

    let lotObj = lotsData[lot];

    let status = [];
    let cls = "good";

    if(!lotObj){
        status.push("LOT NOT FOUND");
        cls = "bad";
    } else {
        if(sub && lotObj.subdivision !== sub){
            status.push("SUBDIVISION MISMATCH");
            cls = "warn";
        }
        if(builder && lotObj.builder !== builder){
            status.push("BUILDER MISMATCH");
            cls = "warn";
        }
    }

    if(status.length === 0) status.push("OK");

    row.className = cls;
    row.cells[4].innerText = status.join(", ");
}

function validateAll(){
    let rows = document.querySelectorAll("#tbody tr");
    let counts = {};

    rows.forEach(r=>{
        let lot = String(r.cells[0].querySelector("input").value).trim();
        counts[lot] = (counts[lot] || 0) + 1;
    });

    rows.forEach(r=>{
        validateRow(r.querySelector("button"));

        let lot = String(r.cells[0].querySelector("input").value).trim();

        if(counts[lot] > 1){
            r.className = "warn";
            r.cells[4].innerText += " | DUPLICATE";
        }
    });
}

function exportExcel(){
    let rows = document.querySelectorAll("#tbody tr");

    let data = [];

    rows.forEach(r=>{
        if(r.className !== "good") return;

        data.push({
            Lot: r.cells[0].querySelector("input").value,
            Subdivision: r.cells[1].querySelector("input").value,
            Builder: r.cells[2].querySelector("input").value,
            Task: r.cells[3].querySelector("select").value,
            Type: currentTab
        });
    });

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, currentTab);

    XLSX.writeFile(wb, currentTab + "_jobs.xlsx");
}

function searchLots(){
    let q = document.getElementById("searchBox").value.toLowerCase();

    let results = lotsArray.filter(lot=>{
        return String(lot.lotNumber).includes(q) ||
               lot.subdivision.toLowerCase().includes(q) ||
               lot.builder.toLowerCase().includes(q);
    });

    let container = document.getElementById("searchResults");
    container.innerHTML = "";

    results.slice(0,20).forEach(lot=>{
        let div = document.createElement("div");
        div.innerText = `${lot.lotNumber} | ${lot.subdivision} | ${lot.builder}`;
        div.onclick = ()=>addRow(lot);
        container.appendChild(div);
    });
}

</script>

</body>
</html>
