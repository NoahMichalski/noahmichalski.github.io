<!DOCTYPE html>
<html>
<head>
  <title>VIP Multi-Builder Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { background:#111; color:#fff; font-family:Arial; padding:20px; }

    button, select {
      padding:8px 12px;
      margin:5px;
      background:#444;
      color:#fff;
      border:none;
      cursor:pointer;
    }

    .date-box {
      background:#1a1a1a;
      border:1px solid #333;
      border-radius:10px;
      padding:15px;
      margin-bottom:20px;
    }

    .date-title {
      font-size:18px;
      font-weight:bold;
      margin-bottom:15px;
      color:#0f0;
    }

    .columns { display:flex; gap:20px; }

    .column {
      flex:1;
      background:#121212;
      padding:10px;
      border-radius:8px;
      border:1px solid #2a2a2a;
    }

    .job {
      padding:4px 0;
      border-bottom:1px solid #222;
    }
  </style>
</head>

<body>

<h2>VIP Multi-Builder Tool</h2>

<select id="builder">
  <option value="pulte">Pulte</option>
  <option value="drhorton">DR Horton</option>
</select>

<input type="file" id="fileInput">
<button onclick="loadFile()">LOAD FILE</button>

<div id="output"></div>

<script>

// ===== DATE =====
function excelDateToJS(serial) {
  return new Date((serial - 25569) * 86400 * 1000);
}

// ===== TASK LOGIC =====
function mapTasks(tasks) {
  let types = new Set();
  let fallback = null;

  tasks.forEach(task => {
    let t = task.toLowerCase().trim();
    if (!fallback) fallback = task;

    if (t.includes("anchor bolts")) types.add("bolts");
    else if (t.includes("install") || t.includes("screens")) types.add("screens");
    else if (t.includes("power wash")) types.add("p/w");
    else if (t.includes("carpet prep")) types.add("car");

    else if (t.includes("full clean") || t.includes("first clean")) types.add("original");
    else if (
      t.includes("reclean") ||
      t.includes("qc clean") ||
      t.includes("reclean 2") ||
      t.includes("buff clean") ||
      t.includes("closing clean")
    ) types.add("reclean");
  });

  if (types.has("original")) return "original";
  if (types.has("reclean")) return "reclean";
  if (types.has("bolts")) return "bolts";
  if (types.has("screens")) return "screens";
  if (types.has("p/w")) return "p/w";
  if (types.has("car")) return "car";

  return fallback.toLowerCase();
}

// ===== SUBDIVISION CLEANUP =====
function cleanSubdivision(name) {
  if (!name) return "";

  let n = name.toLowerCase().trim();

  // PULTE
  if (n.includes("amrine meadows")) return "Amrine";
  if (n.includes("clark shaw reserve")) return "Clarkshaw";
  if (n.includes("clover run")) return "Clover";
  if (n.includes("eagle creek")) return "Eagle";
  if (n.includes("pioneer crossing")) return "Pioneer";
  if (n.includes("slate ridge")) return "Slate";
  if (n.includes("berlin bluffs")) return "Berlin";
  if (n.includes("bloomfield hills")) return "Bloomfield";
  if (n.includes("towns on the greenway")) return "Towns Greenway";
  if (n.includes("towns on the parkway")) return "Towns Parkway";
  if (n.includes("homestead at scotts farm")) return "Scotts";
  if (n.includes("dw maygrass")) return "Maygrass";
  if (n.includes("buckstone bend")) return "Buckstone";
  if (n.includes("nelson farms")) return "Nelson";
  if (n.includes("nottingham trace")) return "Nottingham";
  if (n.includes("arrowhead")) return "Arrowhead";

  // DR HORTON
  if (n.includes("longview")) return "LH";
  if (n.includes("orchard lakes")) return "Orchard";
  if (n.includes("walnut mill")) return "Walnut";
  if (n.includes("overlook")) return "Overlook";
  if (n.includes("lansdowne")) return "Lansdowne";
  if (n.includes("madison meadows")) return "MD";

  // CLEANUP
  return name
    .replace(/\d+/g, "")
    .replace(/hle/gi, "")
    .replace(/ph/gi, "")
    .replace(/'/g, "")
    .replace(/-/g, "") // 🔥 remove trailing dashes
    .replace(/\s+/g, " ")
    .trim()
    .split(" - ")[0];
}

// ===== LOAD =====
function loadFile() {
  const builder = document.getElementById("builder").value;
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file");

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    // 🔥 BUILDER VALIDATION
    let headerText = rows[0].join(" ").toLowerCase();

    if (builder === "pulte" && headerText.includes("plat")) {
      alert("⚠️ This looks like a DR Horton file — switch builder.");
      return;
    }

    if (builder === "drhorton" && headerText.includes("community")) {
      alert("⚠️ This looks like a Pulte file — switch builder.");
      return;
    }

    if (builder === "pulte") processPulte(rows);
    if (builder === "drhorton") processDRHorton(rows);
  };

  reader.readAsArrayBuffer(file);
}

// ===== PULTE =====
function processPulte(rows) {
  let jobs = {};

  rows.forEach(row => {
    let community = row[0];
    let jobRaw = row[1];
    let task = row[8];
    let dateRaw = row[12];

    if (!jobRaw || !task || !dateRaw) return;

    let lot = parseInt(jobRaw.split("-")[1]?.trim(), 10);

    let date = typeof dateRaw === "number"
      ? excelDateToJS(dateRaw)
      : new Date(dateRaw);

    if (isNaN(date)) return;

    let dateStr = date.toLocaleDateString("en-US", { month:"2-digit", day:"2-digit" });

    let subdivision = cleanSubdivision(community);
    let key = lot + "_" + dateStr;

    if (!jobs[key]) jobs[key] = { lot, subdivision, dateStr, tasks: [] };

    jobs[key].tasks.push(task);
  });

  render(jobs);
}

// ===== DR HORTON =====
function processDRHorton(rows) {
  let jobs = {};

  let headerIndex = rows.findIndex(r =>
    r.join(" ").toLowerCase().includes("description")
  );

  if (headerIndex === -1) {
    alert("Invalid DR Horton file");
    return;
  }

  let headers = rows[headerIndex].map(h => (h || "").toLowerCase());

  let dateCol = headers.findIndex(h => h.includes("date"));
  let projectCol = headers.findIndex(h => h.includes("project"));
  let platCol = headers.findIndex(h => h.includes("plat"));
  let descCol = headers.findIndex(h => h.includes("description"));

  rows.slice(headerIndex + 1).forEach(row => {

    let dateRaw = row[dateCol];
    let project = row[projectCol];
    let plat = row[platCol];
    let task = row[descCol];

    if (!plat || !task || !dateRaw) return;

    let lot = null;

    if (typeof plat === "string") {
      let firstPart = plat.split("/")[0].trim();
      let match = firstPart.match(/\d+/);

      if (match) {
        let num = parseInt(match[0], 10);
        if (num < 100000) lot = num;
      }
    }

    if (!lot) return;

    let date = new Date(dateRaw);
    if (isNaN(date)) return;

    let dateStr = date.toLocaleDateString("en-US", { month:"2-digit", day:"2-digit" });

    let subdivision = cleanSubdivision(project);
    let key = lot + "_" + dateStr;

    if (!jobs[key]) jobs[key] = { lot, subdivision, dateStr, tasks: [] };

    jobs[key].tasks.push(task);
  });

  render(jobs);
}

// ===== RENDER =====
function render(jobs) {

  let cleaned = Object.values(jobs).map(j => ({
    dateStr: j.dateStr,
    type: mapTasks(j.tasks),
    display: `${j.lot} ${j.subdivision}`
  }));

  let grouped = {};
  cleaned.forEach(j => {
    if (!grouped[j.dateStr]) grouped[j.dateStr] = [];
    grouped[j.dateStr].push(j);
  });

  let container = document.getElementById("output");
  container.innerHTML = "";

  Object.keys(grouped).sort().forEach(date => {

    let box = document.createElement("div");
    box.className = "date-box";

    let title = document.createElement("div");
    title.className = "date-title";
    title.textContent = date;

    box.appendChild(title);

    let columns = document.createElement("div");
    columns.className = "columns";

    let left = document.createElement("div");
    left.className = "column";

    let right = document.createElement("div");
    right.className = "column";

    let copyClean = document.createElement("button");
    copyClean.textContent = "Copy Cleaning";
    copyClean.onclick = () => copyList(left);

    let copyLabor = document.createElement("button");
    copyLabor.textContent = "Copy Labor";
    copyLabor.onclick = () => copyList(right);

    left.appendChild(copyClean);
    right.appendChild(copyLabor);

    let cleaning = [];
    let labor = [];

    grouped[date].forEach(job => {
      if (job.type === "original" || job.type === "reclean") cleaning.push(job);
      else labor.push(job);
    });

    cleaning.sort((a,b)=>{
      if (a.type==="original" && b.type==="reclean") return -1;
      if (a.type==="reclean" && b.type==="original") return 1;
      return 0;
    });

    cleaning.forEach(job=>{
      let div=document.createElement("div");
      div.className="job";
      div.textContent=job.display;
      div.style.color = job.type==="original" ? "#4CAF50" : "#FFD700";
      left.appendChild(div);
    });

    labor.forEach(job=>{
      let div=document.createElement("div");
      div.className="job";
      div.textContent=`${job.display}-${job.type}`;
      div.style.color="#FFA500";
      right.appendChild(div);
    });

    columns.appendChild(left);
    columns.appendChild(right);
    box.appendChild(columns);

    container.appendChild(box);
  });
}

function copyList(column) {
  let text="";
  column.querySelectorAll(".job").forEach(j=>{
    text+=j.textContent+"\n";
  });
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

</script>

</body>
</html>
