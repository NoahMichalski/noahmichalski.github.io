<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Formatter v4</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0d0d0d;
    color: #fff;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    background: #121212;
    padding: 15px 30px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.title {
    font-size: 20px;
    font-weight: bold;
}

.controls button {
    margin-left: 10px;
}

/* BUTTONS */
button {
    background: #fff;
    color: #000;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ddd;
}

/* MAIN */
.main {
    display: flex;
    height: calc(100vh - 70px);
}

/* LEFT PANEL */
.left {
    width: 40%;
    border-right: 1px solid #222;
    padding: 20px;
    overflow-y: auto;
}

/* RIGHT PANEL */
.right {
    width: 60%;
    padding: 20px;
}

/* DROP ZONE */
.drop-zone {
    border: 2px dashed #333;
    border-radius: 10px;
    padding: 25px;
    text-align: center;
    margin-bottom: 15px;
    cursor: pointer;
    transition: 0.2s;
}

.drop-zone.dragover {
    border-color: #4caf50;
    background: #1a1a1a;
}

.file-info {
    font-size: 13px;
    color: #aaa;
    margin-top: 5px;
}

.status {
    font-size: 13px;
    color: #4caf50;
    font-weight: bold;
}

/* PREVIEW */
.subdivision {
    margin-bottom: 15px;
    padding: 10px;
    background: #161616;
    border-radius: 6px;
}

.subdivision h3 {
    margin: 0 0 5px;
    font-size: 14px;
    border-bottom: 1px solid #333;
}

.job {
    font-size: 13px;
    margin-left: 5px;
}

/* OUTPUT */
textarea {
    width: 100%;
    height: 100%;
    background: #000;
    color: #0f0;
    border: none;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
    <div class="title">Job Formatter v4</div>
    <div class="controls">
        <button onclick="copyOutput()">Copy</button>
        <button onclick="clearAll()">Clear</button>
    </div>
</div>

<div class="main">

<div class="left">

<div class="drop-zone" id="dropZone">
    <div id="dropText">Drop Excel File</div>
    <div class="file-info" id="fileName"></div>
    <div class="status" id="status"></div>
</div>

<div id="preview"></div>

</div>

<div class="right">
<textarea id="output"></textarea>
</div>

</div>

<input type="file" id="fileInput" hidden />

<script>
let file;

const dropZone = document.getElementById("dropZone");
const dropText = document.getElementById("dropText");
const fileName = document.getElementById("fileName");
const status = document.getElementById("status");

dropZone.onclick = () => document.getElementById("fileInput").click();

document.getElementById("fileInput").onchange = e => {
    file = e.target.files[0];
    handleFile();
};

dropZone.ondragover = e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
    dropText.innerText = "Release to upload";
};

dropZone.ondragleave = () => {
    dropZone.classList.remove("dragover");
    dropText.innerText = "Drop Excel File";
};

dropZone.ondrop = e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    file = e.dataTransfer.files[0];
    handleFile();
};

function handleFile() {
    fileName.innerText = file.name;
    status.innerText = "✔ Processing...";
    processFile();
}

function processFile() {
    const reader = new FileReader();

    reader.onload = function(e) {
        const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

        let grouped = {};
        let count = 0;

        rows.forEach(r => {
            let sub = (r[0] || "").trim();
            let lot = (r[1] || "").trim();
            let job = (r[2] || "").trim();
            let am = (r[3] || "").trim();

            if (!sub || !lot || !job) return;

            if (!grouped[sub]) grouped[sub] = [];

            let entry = `${lot}-${job}`;
            if (am) entry = `*${am} - ${entry}`;

            grouped[sub].push(entry);
            count++;
        });

        let out = "";
        let previewHTML = "";

        Object.keys(grouped).forEach(sub => {
            out += `*${sub}\n`;

            previewHTML += `<div class="subdivision"><h3>${sub}</h3>`;

            grouped[sub].forEach(e => {
                out += e + "\n";
                previewHTML += `<div class="job">${e}</div>`;
            });

            previewHTML += `</div>`;
        });

        output.value = out.trim();
        preview.innerHTML = previewHTML;
        status.innerText = `✔ ${count} jobs`;
    };

    reader.readAsArrayBuffer(file);
}

function copyOutput() {
    output.select();
    document.execCommand("copy");
}

function clearAll() {
    file = null;
    output.value = "";
    preview.innerHTML = "";
    fileName.innerText = "";
    status.innerText = "";
    dropText.innerText = "Drop Excel File";
}
</script>

</body>
</html>
