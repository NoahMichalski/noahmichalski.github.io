<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overtime Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#111; color:#eee; font-family:Arial; margin:0; }
.header { background:#1a1d24; padding:10px; }

.controls { text-align:center; padding:10px; }

button, select, input {
    padding:6px 10px;
    margin:5px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    border:1px solid #333;
    padding:6px;
    text-align:center;
}

th { background:#d9d9d9; color:#000; }

.normal { background:#2e7d32; }
.warning { background:#ffd966; color:#000; }
.overtime { background:#ff1a1a; color:#fff; }
.predicted { background:#ff4da6; }

/* 🔥 removed blue outline */
td[contenteditable="true"] {
    outline:none;
}
</style>
</head>

<body>

<div class="header">Overtime Dashboard</div>

<div class="controls">
<input type="file" id="fileInput">

<select id="weekSelect" onchange="render()">
<option value="0">Week 1</option>
<option value="1">Week 2</option>
</select>

<select id="daySelect" onchange="render()">
<option value="0">Mon</option>
<option value="1">Tue</option>
<option value="2">Wed</option>
<option value="3">Thu</option>
<option value="4">Fri</option>
</select>

<button onclick="loadExcel()">Load Excel</button>
<button onclick="emailPreview()">Email Preview</button>
</div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Actual</th>
<th>Projected</th>
<th>OT</th>
<th>Hit</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let allData = [];
let currentData = [];
let futureSelections = {}; // 🔥 stores dropdown values

function clean(v){
    let n = parseFloat(v);
    return isNaN(n) ? 0 : n;
}

function loadExcel(){

    let file = fileInput.files[0];
    let reader = new FileReader();

    reader.onload = e=>{

        let wb = XLSX.read(e.target.result,{type:'binary'});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let rows = XLSX.utils.sheet_to_json(sheet,{header:1});

        allData = [];
        futureSelections = {};

        rows.forEach(r=>{

            let name = r[1];
            if(typeof name !== "string" || !name.includes(",")) return;

            let days = [
                clean(r[4]),
                clean(r[6]),
                clean(r[7]),
                clean(r[9]),
                clean(r[11])
            ];

            allData.push({ name, days });
        });

        render();
    };

    reader.readAsBinaryString(file);
}

function render(){

    let week = parseInt(weekSelect.value);
    let day = parseInt(daySelect.value);

    let midpoint = Math.floor(allData.length / 2);

    currentData = week === 0
        ? allData.slice(0, midpoint)
        : allData.slice(midpoint);

    let tbody = table.querySelector("tbody");
    tbody.innerHTML="";

    let rows = currentData.map((r,index)=>{

        let projected=0,running=0,hit="-";

        for(let i=0;i<5;i++){

            let val;

            if(i <= day){
                val = r.days[i];
            } else {
                let key = `${index}-${i}`;
                let selected = futureSelections[key];

                if(selected === "OFF") val = 0;
                else if(selected) val = parseFloat(selected);
                else val = 8;
            }

            projected+=val;
            running+=val;

            if(running>40 && hit==="-" ){
                hit=["Mon","Tue","Wed","Thu","Fri"][i];
            }
        }

        let actual=r.days.reduce((a,b)=>a+b,0);
        let ot=projected>40?projected-40:0;

        return {...r,projected,actual,ot,hit,index};
    });

    rows.sort((a,b)=>b.projected-a.projected);

    rows.forEach(r=>{

        let tr=document.createElement("tr");

        if(r.projected>40) tr.className="overtime";
        else if(r.projected>=38) tr.className="warning";
        else tr.className="normal";

        let cells = "";

        for(let i=0;i<5;i++){

            if(i <= day){

                cells += `
                <td contenteditable="true"
                    onblur="updateCell(${r.index}, ${i}, this.innerText)">
                    ${r.days[i]}
                </td>`;

            } else {

                let key = `${r.index}-${i}`;
                let val = futureSelections[key] || "8";

                cells += `
                <td class="predicted">
                    <select onchange="updateFuture(${r.index}, ${i}, this.value)">
                        <option value="8" ${val=="8"?"selected":""}>8</option>
                        <option value="4" ${val=="4"?"selected":""}>4</option>
                        <option value="0" ${val=="0"?"selected":""}>0</option>
                        <option value="OFF" ${val=="OFF"?"selected":""}>OFF</option>
                    </select>
                </td>`;
            }
        }

        tr.innerHTML=`
        <td>${r.name}</td>
        ${cells}
        <td>${r.actual.toFixed(1)}</td>
        <td>${r.projected.toFixed(1)}</td>
        <td>${r.ot.toFixed(1)}</td>
        <td>${r.hit}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* edit past days */
function updateCell(rowIndex, dayIndex, value){
    let num = parseFloat(value);
    if(isNaN(num)) num = 0;
    allData[rowIndex].days[dayIndex] = num;
    render();
}

/* dropdown future */
function updateFuture(rowIndex, dayIndex, value){
    futureSelections[`${rowIndex}-${dayIndex}`] = value;
    render();
}

/* email */
function emailPreview(){

    let rows = document.querySelectorAll("#table tr");

    let html = `<html><body><table style="border-collapse:collapse;">`;

    rows.forEach((tr,i)=>{
        html+="<tr>";

        tr.querySelectorAll("th,td").forEach(td=>{

            let text = td.querySelector("select") ? td.querySelector("select").value : td.innerText;

            let style="border:1px solid #000;padding:6px;text-align:center;";

            if(i===0){
                style+="background:#d9d9d9;color:#000;font-weight:bold;";
            } else {

                if(tr.classList.contains("overtime")){
                    style+="background:#ff1a1a;color:#fff;";
                }
                else if(tr.classList.contains("warning")){
                    style+="background:#ffd966;color:#000;";
                }
                else{
                    style+="background:#93c47d;color:#000;";
                }

                if(td.classList.contains("predicted")){
                    style="border:1px solid #000;padding:6px;text-align:center;background:#ff4da6;color:#fff;";
                }
            }

            html+=`<td style="${style}">${text}</td>`;
        });

        html+="</tr>";
    });

    html+="</table></body></html>";

    let win = window.open("", "_blank");
    win.document.write(html);
    win.document.close();
}

</script>

</body>
</html>
