<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Formatter v4.2</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0d0d0d;
    color: #fff;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    background: #121212;
    padding: 15px 30px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
}

button {
    background: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

/* LAYOUT */
.main {
    display: flex;
    height: calc(100vh - 60px);
}

.left {
    width: 40%;
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.right {
    width: 60%;
    padding: 20px;
}

/* DROP */
.drop-zone {
    border: 2px dashed #333;
    padding: 20px;
    text-align: center;
    margin-bottom: 15px;
    cursor: pointer;
}

.drop-zone.dragover {
    border-color: #4caf50;
}

.file-info { color: #aaa; font-size: 13px; }
.status { color: #4caf50; font-size: 13px; }

/* TIME BOX */
.time-box {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 15px;
}

.time-box-title {
    font-weight: bold;
    margin-bottom: 5px;
}

/* PREVIEW */
.subdivision {
    background: #161616;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 6px;
}

.subdivision h3 {
    margin: 0 0 5px;
    font-size: 14px;
}

.job {
    font-size: 13px;
    margin-left: 5px;
}

.job.highlight {
    color: #ffd54f;
    font-weight: bold;
}

/* OUTPUT */
textarea {
    width: 100%;
    height: 100%;
    background: #000;
    color: #0f0;
    border: none;
    padding: 15px;
    font-family: monospace;
}
</style>
</head>

<body>

<div class="header">
    <div>Job Formatter v4.2</div>
    <div>
        <button onclick="copyOutput()">Copy</button>
        <button onclick="clearAll()">Clear</button>
    </div>
</div>

<div class="main">

<div class="left">

<div class="drop-zone" id="dropZone">
    <div id="dropText">Drop Excel File</div>
    <div class="file-info" id="fileName"></div>
    <div class="status" id="status"></div>
</div>

<div class="time-box">
    <div class="time-box-title">⏰ Time / Priority Tasks</div>
    <div id="timeContent"></div>
</div>

<div id="preview"></div>

</div>

<div class="right">
<textarea id="output"></textarea>
</div>

</div>

<input type="file" id="fileInput" hidden />

<script>
let file;

const dropZone = document.getElementById("dropZone");
const dropText = document.getElementById("dropText");
const fileName = document.getElementById("fileName");
const status = document.getElementById("status");

dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
    file = e.target.files[0];
    handleFile();
};

dropZone.ondragover = e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
};

dropZone.ondrop = e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    file = e.dataTransfer.files[0];
    handleFile();
};

function handleFile() {
    if (!file) return;

    fileName.innerText = file.name;
    status.innerText = "Processing...";
    setTimeout(processFile, 10);
}

function isTimeSensitive(text) {
    text = text.toLowerCase();
    return (
        text.includes("am") ||
        text.includes("pm") ||
        /\d{1,2}:\d{2}/.test(text)
    );
}

function processFile() {
    const reader = new FileReader();

    reader.onload = function(e) {
        try {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(
                workbook.Sheets[workbook.SheetNames[0]],
                { header: 1 }
            );

            let grouped = {};
            let count = 0;
            let timeEntries = [];

            rows.forEach(r => {
                let sub = String(r[0] || "").trim();
                let lot = String(r[1] || "").trim();
                let job = String(r[2] || "").trim();
                let am = String(r[3] || "").trim();

                if (!sub || !lot || !job) return;

                if (!grouped[sub]) grouped[sub] = [];

                let entry = `${lot}-${job}`;
                let highlight = false;

                if (am) {
                    entry = `*${am} - ${entry}`;
                    highlight = isTimeSensitive(am);
                }

                if (highlight) {
                    timeEntries.push(`${sub} → ${entry}`);
                }

                grouped[sub].push({ text: entry, highlight });
                count++;
            });

            let out = "";
            let previewHTML = "";

            for (let sub in grouped) {
                out += `*${sub}\n`;
                previewHTML += `<div class="subdivision"><h3>${sub}</h3>`;

                grouped[sub].forEach(obj => {
                    out += obj.text + "\n";
                    previewHTML += `<div class="job ${obj.highlight ? "highlight" : ""}">${obj.text}</div>`;
                });

                previewHTML += `</div>`;
            }

            output.value = out.trim();
            preview.innerHTML = previewHTML;

            // Time box
            let timeHTML = "";

            if (timeEntries.length === 0) {
                timeHTML = "<div style='color:#777;'>No time-specific tasks</div>";
            } else {
                timeEntries.forEach(t => {
                    timeHTML += `<div>${t}</div>`;
                });
            }

            document.getElementById("timeContent").innerHTML = timeHTML;

            status.innerText = `✔ ${count} jobs`;
        } catch (err) {
            console.error(err);
            status.innerText = "❌ Error reading file";
        }
    };

    reader.readAsArrayBuffer(file);
}

function copyOutput() {
    output.select();
    document.execCommand("copy");
}

function clearAll() {
    file = null;
    output.value = "";
    preview.innerHTML = "";
    fileName.innerText = "";
    status.innerText = "";
    document.getElementById("timeContent").innerHTML = "";
}
</script>

</body>
</html>
