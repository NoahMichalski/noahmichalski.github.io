<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overtime Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin:0;
    background:#0f1115;
    color:#e6e6e6;
    font-family:Segoe UI, Arial;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#1a1d24;
    padding:10px 20px;
    border-bottom:1px solid #2a2f3a;
}

.header-left {
    display:flex;
    align-items:center;
    gap:15px;
}

.logo { height:40px; }
.title { font-size:20px; font-weight:600; }

/* CONTROLS */
.controls, .filters {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
}

button, select, input {
    background:#2a2f3a;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:4px;
}

/* SUMMARY */
.summary {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:10px;
}

.card {
    background:#1a1d24;
    padding:10px 15px;
    border-radius:6px;
    border:1px solid #2a2f3a;
}

/* TABLE */
.table-container { padding:10px 20px; }

table {
    width:100%;
    border-collapse:collapse;
    background:#1a1d24;
}

th, td {
    border:1px solid #2a2f3a;
    padding:8px;
    text-align:center;
}

th {
    background:#d9d9d9 !important;
    color:#000000 !important;
    font-weight:bold;
}

/* COLORS */
.normal { background:#2e7d32; }
.warning { background:#f9a825; color:#000; }
.overtime { background:#c62828; }

.predicted {
    background:#ff4da6 !important;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-left">
        <img src="/images/VIP-logo-white.png" class="logo">
        <div class="title">Overtime Dashboard</div>
    </div>
</div>

<div class="controls">
<input type="file" id="fileInput">

<select id="daySelect" onchange="recalc()">
<option value="0">Monday</option>
<option value="1">Tuesday</option>
<option value="2">Wednesday</option>
<option value="3">Thursday</option>
<option value="4">Friday</option>
</select>

<button onclick="loadFile()">Load</button>
<button onclick="copyEmail()">Copy Email</button>
</div>

<div class="summary" id="summary"></div>

<div class="table-container">
<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Actual</th>
<th>Projected</th>
<th>OT</th>
<th>Hits OT</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
let rawData = [];
let currentData = [];

function clean(v){ return parseFloat(v)||0; }

function loadFile(){
    let file = document.getElementById("fileInput").files[0];
    let reader = new FileReader();

    reader.onload = e=>{
        let wb = XLSX.read(e.target.result,{type:'binary'});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        rawData = XLSX.utils.sheet_to_json(sheet);
        build();
    };

    reader.readAsBinaryString(file);
}

function build(){
    currentData = rawData.map(r=>({
        name:r["Name"],
        days:[
            clean(r["Monday"]),
            clean(r["Tuesday"]),
            clean(r["Wednesday"]),
            clean(r["Thursday"]),
            clean(r["Friday"])
        ]
    }));
    render();
}

function recalc(){ render(); }

function render(){

    let day = parseInt(document.getElementById("daySelect").value);

    let computed = currentData.map(row=>{
        let actual = row.days.reduce((a,b)=>a+b,0);

        let projected=0,running=0,hit="—";
        let display=[...row.days];

        for(let i=0;i<5;i++){
            let val = (i<=day)?row.days[i]:8;
            if(i>day) display[i]=8;

            projected+=val;
            running+=val;

            if(running>40 && hit==="—"){
                hit=["Mon","Tue","Wed","Thu","Fri"][i];
            }
        }

        let ot = projected>40?projected-40:0;

        return {...row, actual, projected, ot, display, hit};
    });

    // 🔥 ALWAYS SORT BY OT DESC
  computed.sort((a,b)=>b.projected - a.projected);

    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    let totalA=0,totalP=0,totalOT=0,otCount=0,riskCount=0;

    computed.forEach(row=>{

        totalA+=row.actual;
        totalP+=row.projected;
        totalOT+=row.ot;

        if(row.projected>40) otCount++;
        else if(row.projected>=36) riskCount++;

        let tr=document.createElement("tr");

        if(row.projected>40) tr.classList.add("overtime");
        else if(row.projected>=38) tr.classList.add("warning");
        else tr.classList.add("normal");

        tr.innerHTML=`
            <td>${row.name}</td>
            ${row.display.map((d,i)=>`
                <td class="${i>day?'predicted':''}" contenteditable="true">${d}</td>
            `).join("")}
            <td>${row.actual.toFixed(1)}</td>
            <td>${row.projected.toFixed(1)}</td>
            <td>${row.ot.toFixed(1)}</td>
            <td>${row.hit}</td>
        `;

        tbody.appendChild(tr);
    });

}


/* EMAIL COPY */
function copyEmail(){

    let rows = document.querySelectorAll("#table tr");

    let html = `
    <html>
    <body style="font-family:Arial;">
    <h3>Overtime Report</h3>
    <button onclick="copyNow()" style="margin-bottom:10px;padding:6px 10px;">
        Copy Table
    </button>
    <table style="border-collapse:collapse;">
    `;

    rows.forEach((tr,i)=>{

        html += "<tr>";

        tr.querySelectorAll("th,td").forEach(td=>{

            let style = "border:1px solid #000;padding:6px;text-align:center;";

            if(i===0){
    style+="background:#d9d9d9;color:#000;font-weight:bold;";
}else {

                if(tr.classList.contains("overtime")){
                    style += "background:#ff1a1a;color:#fff;font-weight:bold;";
                }
                else if(tr.classList.contains("warning")){
                    style += "background:#ffd966;color:#000;";
                }
                else{
                    style += "background:#93c47d;color:#000;";
                }

                if(td.classList.contains("predicted")){
                    style = "border:1px solid #000;padding:6px;text-align:center;background:#ff4da6;color:#fff;font-weight:bold;";
                }
            }

            html += `<td style="${style}">${td.innerText}</td>`;
        });

        html += "</tr>";
    });

    html += `
    </table>

    <script>
    function copyNow(){
        let range = document.createRange();
        range.selectNode(document.querySelector("table"));
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand("copy");
        alert("Copied!");
    }
    <\/script>

    </body>
    </html>
    `;

    let win = window.open("", "_blank");
    win.document.write(html);
    win.document.close();
}
</script>

</body>
</html>
