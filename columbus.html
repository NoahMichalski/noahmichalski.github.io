<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Ohio Storm Center</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#000;color:white;margin:0}
header{background:#000;padding:15px;text-align:center;font-size:26px;font-weight:bold;border-bottom:1px solid #222}

.container{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:15px;
 padding:15px
}

.card{
 background:#000;
 border-radius:12px;
 padding:12px;
 border:1px solid #222
}

iframe{width:100%;border:none;border-radius:10px}

.countyGrid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:8px;
 margin-top:10px
}

.county{
 padding:8px;
 border-radius:6px;
 font-size:14px;
 border:1px solid #333
}

.green{background:#0e3a1c}
.red{background:#5a0f0f}
.yellow{background:#5a4a0f}

.modal{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.85);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:1000
}

.modalBox{
 background:#000;
 border:1px solid #333;
 padding:20px;
 border-radius:10px;
 max-width:700px;
 width:90%
}

</style>
</head>
<body>

<header>Central Ohio Storm Center</header>

<div class="container">

<div class="card">
<h2>County Conditions</h2>
<div class="countyGrid" id="countyWeather"></div>
</div>

<div class="card">
<h2>Central Ohio County Alerts</h2>
<div class="countyGrid" id="countyList"></div>
</div>

<div class="card">
<h2>Live Radar</h2>
<iframe height="450" src="https://embed.windy.com/embed2.html?lat=39.96&lon=-82.99&zoom=6&level=surface&overlay=radar"></iframe>
</div>

<div class="card">
<h2>NWS Radar (KILN)</h2>
<div style="display:flex;justify-content:center">
<img style="width:60%;max-width:420px;border-radius:10px" src="https://radar.weather.gov/ridge/standard/KILN_loop.gif">
</div>
</div>

<div class="card">
<h2>7 Day Forecast</h2>
<div id="weeklyForecast" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px"></div>
</div>

</div>

<!-- hourly modal -->
<div id="hourlyModal" class="modal">
 <div class="modalBox">
 <div style="display:flex;justify-content:space-between">
 <h3 id="hourlyTitle"></h3>
 <button onclick="closeHourly()">Close</button>
 </div>
 <div id="hourlyContent" style="display:flex;flex-direction:column;gap:4px"></div>
 </div>
</div>

<!-- alert modal -->
<div id="alertModal" class="modal">
 <div class="modalBox">
 <div style="display:flex;justify-content:space-between">
 <h3 id="alertTitle"></h3>
 <button onclick="closeAlert()">Close</button>
 </div>
 <div id="alertContent"></div>
 </div>
</div>

<script>

const counties=[
{name:"Franklin",lat:39.96,lon:-82.99},
{name:"Delaware",lat:40.30,lon:-83.07},
{name:"Union",lat:40.25,lon:-83.36},
{name:"Madison",lat:39.90,lon:-83.40},
{name:"Pickaway",lat:39.64,lon:-82.95},
{name:"Fairfield",lat:39.78,lon:-82.60},
{name:"Licking",lat:40.06,lon:-82.40},
{name:"Morrow",lat:40.52,lon:-82.80},
{name:"Marion",lat:40.59,lon:-83.12},
{name:"Knox",lat:40.40,lon:-82.42},
{name:"Ross",lat:39.33,lon:-82.98},
{name:"Fayette",lat:39.55,lon:-83.43},
{name:"Perry",lat:39.88,lon:-82.22},
{name:"Hocking",lat:39.49,lon:-82.48}
]

function getEmoji(text){
text=text.toLowerCase()
if(text.includes("sun")||text.includes("clear")) return "☀️"
if(text.includes("cloud")) return "☁️"
if(text.includes("rain")||text.includes("shower")) return "🌧️"
if(text.includes("storm")||text.includes("thunder")) return "⛈️"
if(text.includes("snow")) return "❄️"
if(text.includes("fog")) return "🌫️"
return "🌤️"
}

async function loadWeather(){

// show loading indicators
countyWeather.innerHTML = "Loading county conditions..."
weeklyForecast.innerHTML = "Loading 7 day forecast..."

// load counties in parallel (much faster)
const countyPromises = counties.map(async (c)=>{

let point = await fetch(`https://api.weather.gov/points/${c.lat},${c.lon}`)
let pointData = await point.json()

let forecast = await fetch(pointData.properties.forecastHourly)
let forecastData = await forecast.json()

let current = forecastData.properties.periods[0]

let emoji = getEmoji(current.shortForecast)

return `<div class="county green" style="cursor:pointer" onclick="showHourly('${c.name}',${c.lat},${c.lon})">
<b>${c.name}</b><br>
${emoji} ${current.temperature}°F<br>
<small>${current.shortForecast}</small>
</div>`

})

let results = await Promise.all(countyPromises)

countyWeather.innerHTML = results.join("")

// weekly forecast
let point = await fetch("https://api.weather.gov/points/39.96,-82.99")
let pointData = await point.json()

let forecast = await fetch(pointData.properties.forecast)
let forecastData = await forecast.json()

let days = forecastData.properties.periods.filter(p=>p.isDaytime).slice(0,7)

let forecastHTML=""

days.forEach(d=>{
let emoji=getEmoji(d.shortForecast)
forecastHTML+=`<div class="county" style="background:#000;text-align:center;cursor:pointer" onclick="showDay('${d.name}',${d.temperature},'${d.temperatureUnit}','${d.shortForecast.replace(/'/g,"\'")}')"><b>${d.name}</b><br>${emoji} ${d.temperature}°${d.temperatureUnit}<br><small>${d.shortForecast}</small></div>`
})

weeklyForecast.innerHTML = forecastHTML

}

async function loadCountyAlerts(){

let res=await fetch("https://api.weather.gov/alerts/active?area=OH")
let data=await res.json()

let countyStatus={}
counties.forEach(c=>countyStatus[c.name]=[])

data.features.forEach(alert=>{
let event=alert.properties.event
let areas=alert.properties.areaDesc
counties.forEach(c=>{
 if(areas.includes(c.name)){
 countyStatus[c.name].push(alert)
 }
})
})

let html=""

counties.forEach(c=>{
let alerts=countyStatus[c.name]
let cls="green"
let label="No Alerts"

if(alerts.length>0){
label=alerts[0].properties.event
if(label.includes("Tornado Warning")) cls="red"
else cls="yellow"
}

html+=`<div class="county ${cls}" style="cursor:pointer" onclick="showAlert('${c.name}')"><b>${c.name}</b><br>${label}</div>`

})

document.getElementById("countyList").innerHTML=html

window._alerts=data.features

}

async function showHourly(name,lat,lon){

let point=await fetch(`https://api.weather.gov/points/${lat},${lon}`)
let pointData=await point.json()

let forecast=await fetch(pointData.properties.forecastHourly)
let forecastData=await forecast.json()

let hours=forecastData.properties.periods.slice(0,12)

let html=""

hours.forEach(h=>{
let hour=new Date(h.startTime).getHours().toString().padStart(2,'0')
let emoji=getEmoji(h.shortForecast)
html+=`<div style="background:#111;padding:4px 8px;border-radius:4px;font-size:13px;display:flex;gap:14px;align-items:center">
<span style="min-width:55px"><b>${hour}:00</b></span>
<span style="min-width:90px">${emoji} ${h.temperature}°F</span>
<span style="flex:1">${h.shortForecast}</span>
<span style="white-space:nowrap">💨 ${h.windSpeed}</span>
</div>`
})

hourlyTitle.innerText=name+" County Hourly"
hourlyContent.innerHTML=html
hourlyModal.style.display="flex"

}

function closeHourly(){ hourlyModal.style.display="none" }

function showAlert(county){

let html=""

window._alerts.forEach(a=>{
 if(a.properties.areaDesc.includes(county)){
 html+=`<div style="margin-bottom:12px"><b>${a.properties.event}</b><br>
 Expires: ${new Date(a.properties.ends).toLocaleString()}<br><br>
 ${a.properties.description}</div>`
 }
})

alertTitle.innerText=county+" Alerts"
alertContent.innerHTML=html||"No active alerts"
alertModal.style.display="flex"

}

function closeAlert(){ alertModal.style.display="none" }

async function showDay(name,temp,unit,desc){

// get hourly forecast for Columbus (represents region)
let point=await fetch("https://api.weather.gov/points/39.96,-82.99")
let pointData=await point.json()

let forecast=await fetch(pointData.properties.forecastHourly)
let forecastData=await forecast.json()

let hours=forecastData.properties.periods

// match the clicked day
let target=name.toLowerCase()

let dayHours=hours.filter(h=>{
 let d=new Date(h.startTime).toLocaleDateString('en-US',{weekday:'long'}).toLowerCase()
 return d===target
}).slice(0,24)

let html="<div style='display:flex;flex-direction:column;gap:6px'>"

function getEmoji(text){
text=text.toLowerCase()
if(text.includes("sun")||text.includes("clear")) return "☀️"
if(text.includes("cloud")) return "☁️"
if(text.includes("rain")||text.includes("shower")) return "🌧️"
if(text.includes("storm")||text.includes("thunder")) return "⛈️"
if(text.includes("snow")) return "❄️"
return "🌤️"
}

dayHours.forEach(h=>{

let hour=new Date(h.startTime).getHours().toString().padStart(2,'0')
let emoji=getEmoji(h.shortForecast)

html+=`<div style="background:#111;padding:4px 8px;border-radius:4px;font-size:13px;display:flex;gap:14px;align-items:center">
<span style="min-width:55px"><b>${hour}:00</b></span>
<span style="min-width:90px">${emoji} ${h.temperature}°F</span>
<span style="flex:1">${h.shortForecast}</span>
<span style="white-space:nowrap">💨 ${h.windSpeed}</span>
</div>`

})

html+="</div>"

alertTitle.innerText=name+" Hourly Forecast"
alertContent.innerHTML=html
alertModal.style.display="flex"

}

loadWeather()
loadCountyAlerts()
setInterval(loadCountyAlerts,60000)

</script>

</body>
</html>
