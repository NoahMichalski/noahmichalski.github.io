<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Lookup</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f0f0f;
  color: #fff;
}

/* HEADER */
.header {
  padding: 15px;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #222;
}

h1 {
  margin: 0 0 10px 0;
  font-size: 1.4rem;
}

/* FILTER BAR */
.filters {
  display: flex;
  gap: 10px;
}

.filters input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e1e1e;
  color: #fff;
}

/* TABLE */
.table-container {
  max-height: calc(100vh - 110px);
  overflow-y: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

thead th {
  position: sticky;
  top: 70px;
  background: #1a1a1a;
  z-index: 5;
  cursor: pointer;
  user-select: none;
}

th, td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid #222;
}

th {
  font-size: 0.8rem;
  color: #aaa;
  text-transform: uppercase;
}

tr:hover {
  background: #1c1c1c;
}

.address-link {
  color: #4da3ff;
  text-decoration: none;
}

.address-link:hover {
  text-decoration: underline;
}

.no-results {
  text-align: center;
  padding: 20px;
  color: #888;
}

.sort-indicator {
  margin-left: 5px;
  font-size: 0.7rem;
}
</style>
</head>

<body>

<div class="header">
  <h1>Lot Lookup</h1>

  <div class="filters">
    <input id="filterLot" placeholder="Lot">
    <input id="filterSubdivision" placeholder="Subdivision">
    <input id="filterBuilder" placeholder="Builder">
    <input id="filterFloorplan" placeholder="Floorplan">
  </div>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th onclick="sortTable('lotNumber')">Lot<span class="sort-indicator" id="sort-lotNumber"></span></th>
        <th onclick="sortTable('subdivision')">Subdivision<span class="sort-indicator" id="sort-subdivision"></span></th>
        <th onclick="sortTable('builder')">Builder<span class="sort-indicator" id="sort-builder"></span></th>
        <th onclick="sortTable('address')">Address<span class="sort-indicator" id="sort-address"></span></th>
        <th onclick="sortTable('floorplan')">Floorplan<span class="sort-indicator" id="sort-floorplan"></span></th>
      </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
  </table>
</div>

<script>
let lots = [];
let currentSort = { key: null, asc: true };

fetch('lots(1).json')
  .then(res => res.json())
  .then(data => {
    lots = data;
    renderTable(lots);
  });

function renderTable(data) {
  const table = document.getElementById('resultsTable');
  table.innerHTML = '';

  if (data.length === 0) {
    table.innerHTML = `<tr><td colspan="5" class="no-results">No results found</td></tr>`;
    return;
  }

  data.forEach(lot => {
    const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lot.address)}`;

    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${lot.lotNumber}</td>
      <td>${lot.subdivision}</td>
      <td>${lot.builder}</td>
      <td><a class="address-link" href="${mapsLink}" target="_blank">${lot.address}</a></td>
      <td>${lot.floorplan || 'N/A'}</td>
    `;

    table.appendChild(row);
  });
}

/* FILTERING */
function filterLots() {
  const lotVal = document.getElementById('filterLot').value.toLowerCase();
  const subVal = document.getElementById('filterSubdivision').value.toLowerCase();
  const builderVal = document.getElementById('filterBuilder').value.toLowerCase();
  const floorVal = document.getElementById('filterFloorplan').value.toLowerCase();

  let filtered = lots.filter(lot =>
    (!lotVal || lot.lotNumber?.toLowerCase().includes(lotVal)) &&
    (!subVal || lot.subdivision?.toLowerCase().includes(subVal)) &&
    (!builderVal || lot.builder?.toLowerCase().includes(builderVal)) &&
    (!floorVal || lot.floorplan?.toLowerCase().includes(floorVal))
  );

  if (currentSort.key) {
    filtered = sortData(filtered, currentSort.key, currentSort.asc);
  }

  renderTable(filtered);
}

document.querySelectorAll('.filters input').forEach(input => {
  input.addEventListener('input', filterLots);
});

/* SORTING */
function sortTable(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort = { key, asc: true };
  }

  updateSortIndicators();
  filterLots();
}

function sortData(data, key, asc) {
  return [...data].sort((a, b) => {
    const valA = (a[key] || '').toLowerCase();
    const valB = (b[key] || '').toLowerCase();

    if (valA < valB) return asc ? -1 : 1;
    if (valA > valB) return asc ? 1 : -1;
    return 0;
  });
}

function updateSortIndicators() {
  document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '');

  if (currentSort.key) {
    const el = document.getElementById(`sort-${currentSort.key}`);
    el.textContent = currentSort.asc ? '▲' : '▼';
  }
}
</script>

</body>
</html>
