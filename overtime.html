<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overtime Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1 { text-align:center; }

.controls { text-align:center; margin-bottom:15px; }

button {
    background:white;
    color:black;
    border:none;
    padding:8px 14px;
    margin:5px;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td {
    border:1px solid #333;
    padding:6px;
    text-align:center;
}

.error {
    color:red;
    text-align:center;
    margin-top:10px;
}

.normal { background:#0f2e0f; }
.warning { background:#5a4b00; }
.overtime { background:#5c0000; font-weight:bold; }

</style>
</head>

<body>

<h1>Overtime Predictor</h1>

<div class="controls">
    <input type="file" id="fileInput" accept=".xlsx,.csv">
    <button onclick="processFile()">Load File</button>
    <button onclick="exportExcel()">Export</button>
</div>

<div id="error" class="error"></div>

<table id="table">
<thead>
<tr>
<th>Employee</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Actual</th>
<th>Projected</th>
<th>OT</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let rawData = [];

function processFile() {
    document.getElementById("error").innerText = "";

    const file = document.getElementById('fileInput').files[0];
    if (!file) {
        showError("No file selected");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        try {
            const wb = XLSX.read(e.target.result, {type:'binary'});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            rawData = XLSX.utils.sheet_to_json(sheet);

            if (!rawData.length) {
                showError("File is empty or unreadable");
                return;
            }

            processData();

        } catch (err) {
            showError("Error reading file: " + err.message);
        }
    };

    reader.readAsBinaryString(file);
}

function showError(msg) {
    document.getElementById("error").innerText = msg;
}

function getField(row, options) {
    for (let key of Object.keys(row)) {
        let lower = key.toLowerCase();
        if (options.some(opt => lower.includes(opt))) {
            return row[key];
        }
    }
    return null;
}

function processData() {
    let employees = {};

    rawData.forEach((row, i) => {
        let name = getField(row, ["employee", "name", "worker"]);
        let date = getField(row, ["date"]);
        let hours = getField(row, ["hour"]);

        if (!name || !date) return;

        hours = parseFloat(hours) || 0;

        let d = new Date(date);
        if (isNaN(d)) return;

        let day = d.getDay(); // 0=Sun

        if (!employees[name]) {
            employees[name] = {
                days: [0,0,0,0,0] // Mon-Fri
            };
        }

        // convert JS day to Mon-Fri index
        let map = {1:0,2:1,3:2,4:3,5:4};
        if (map[day] !== undefined) {
            employees[name].days[map[day]] += hours;
        }
    });

    render(employees);
}

function render(data) {
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    Object.keys(data).forEach(name => {
        let days = data[name].days;

        let actual = days.reduce((a,b)=>a+b,0);

        let todayIndex = getTodayIndex();

        let projected = 0;

        days.forEach((h, i) => {
            if (i <= todayIndex) projected += h;
            else projected += 8; // future days assume 8 hrs
        });

        let ot = projected > 40 ? projected - 40 : 0;

        let tr = document.createElement("tr");

        if (projected > 40) tr.classList.add("overtime");
        else if (projected >= 36) tr.classList.add("warning");
        else tr.classList.add("normal");

        tr.innerHTML = `
            <td>${name}</td>
            ${days.map(d=>`<td>${d.toFixed(1)}</td>`).join("")}
            <td>${actual.toFixed(1)}</td>
            <td>${projected.toFixed(1)}</td>
            <td>${ot.toFixed(1)}</td>
        `;

        tbody.appendChild(tr);
    });
}

function getTodayIndex() {
    let d = new Date().getDay();
    let map = {1:0,2:1,3:2,4:3,5:4};
    return map[d] ?? 4;
}

function exportExcel() {
    let rows = [["Employee","Mon","Tue","Wed","Thu","Fri","Actual","Projected","OT"]];

    document.querySelectorAll("#table tbody tr").forEach(tr => {
        let cols = tr.querySelectorAll("td");
        rows.push([...cols].map(td => td.innerText));
    });

    let ws = XLSX.utils.aoa_to_sheet(rows);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "OT");

    XLSX.writeFile(wb, "overtime.xlsx");
}
</script>

</body>
</html>
