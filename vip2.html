<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Builder Map v2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100%}

/* UI */
.search-box{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  z-index:1001;width:300px;
}
#searchInput{
  width:100%;padding:8px;border-radius:6px;border:1px solid #ccc;
}

#builderToggles{
  position:absolute;top:60px;right:10px;z-index:1001;
  background:white;padding:10px;border-radius:8px;
}

#company-logo{
  position:absolute;bottom:10px;left:10px;width:100px;z-index:1002;
}
</style>
</head>

<body>

<div class="search-box">
  <input id="searchInput" placeholder="Search subdivision...">
</div>

<div id="builderToggles"></div>
<img id="company-logo" src="/images/logo-VIP.png">

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([40.1,-83.1],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

const colorMap = {
  "Pulte":"green","Ryan":"violet","DR Horton":"black",
  "Epcon":"gold","Shottenstein":"red","Rockford":"blue",
  "MI Homes":"grey"
};

const builderGroups = {};
let markers = [];

// LOAD JSON
fetch('subdivisions.json')
.then(r=>r.json())
.then(data=>{

  data.forEach(item=>{
    const {builder,subdivision,address,coords,lotMap} = item;

    const icon = L.icon({
      iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${colorMap[builder]||'blue'}.png`,
      shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
      iconSize:[25,41],iconAnchor:[12,41]
    });

    const marker = L.marker([coords.lat,coords.lon],{icon}).addTo(map);

    const lotHtml = lotMap
      ? `<a href="${lotMap}" target="_blank">View Lot Map</a>`
      : `<i>No lot map</i>`;

    marker.bindPopup(`
      <b>${subdivision}</b><br>
      ${builder}<br><br>
      ${lotHtml}<br><br>
      <a target="_blank"
       href="https://www.google.com/maps/search/?api=1&query=${coords.lat},${coords.lon}">
       ${address}
      </a>
    `);

    // grouping
    if(!builderGroups[builder]){
      builderGroups[builder]=L.layerGroup().addTo(map);
    }
    builderGroups[builder].addLayer(marker);

    markers.push({marker,...item});
  });

  buildToggles();
  setupSearch();

});


// SEARCH
function setupSearch(){
  const input = document.getElementById('searchInput');

  input.addEventListener('input',()=>{
    const val = input.value.toLowerCase();

    markers.forEach(m=>{
      if(m.subdivision.toLowerCase().includes(val)){
        map.setView([m.coords.lat,m.coords.lon],14);
        m.marker.openPopup();
      }
    });
  });
}


// BUILDER TOGGLES
function buildToggles(){
  const div = document.getElementById('builderToggles');

  Object.entries(builderGroups).forEach(([b,g])=>{
    const cb = document.createElement('input');
    cb.type='checkbox'; cb.checked=true;

    cb.onchange=()=>{
      cb.checked ? g.addTo(map) : map.removeLayer(g);
    };

    const label=document.createElement('label');
    label.appendChild(cb);
    label.append(" "+b);

    div.appendChild(label);
    div.appendChild(document.createElement('br'));
  });
}

</script>
</body>
</html>
