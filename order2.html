<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Job Formatter v5</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin:0;
    font-family:"Segoe UI";
    background:#0d0d0d;
    color:#fff;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:#121212;
    border-bottom:1px solid #222;
}

.header-left {
    display:flex;
    align-items:center;
    gap:12px;
}

.logo {
    height:34px;
    cursor:pointer;
    transition:.2s;
    filter:drop-shadow(0 0 4px rgba(255,255,255,.2));
}

.logo:hover {
    transform:scale(1.05);
    filter:drop-shadow(0 0 8px rgba(255,255,255,.4));
}

button {
    background:#fff;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

/* LAYOUT */
.main { display:flex; height:calc(100vh - 60px); }
.left { width:40%; padding:20px; overflow-y:auto; border-right:1px solid #222; }
.right { width:60%; padding:20px; }

/* DROP */
.drop-zone {
    border:2px dashed #333;
    padding:20px;
    text-align:center;
    margin-bottom:15px;
    cursor:pointer;
}
.drop-zone.dragover { border-color:#4caf50; }

.file-info { color:#aaa; font-size:13px; }
.status { color:#4caf50; font-size:13px; }

/* PANELS */
.box {
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:8px;
    padding:10px;
    margin-bottom:15px;
}

/* PREVIEW */
.subdivision {
    background:#161616;
    margin-bottom:10px;
    padding:10px;
    border-radius:6px;
}

.job.highlight {
    color:#ffd54f;
    font-weight:bold;
}

/* OUTPUT */
textarea {
    width:100%;
    height:100%;
    background:#000;
    color:#0f0;
    border:none;
    padding:15px;
    font-family:monospace;
}
input {
    margin:2px;
    padding:4px;
    background:#222;
    border:1px solid #444;
    color:#fff;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-left">
        <img src="/images/VIP-logo-white.png" class="logo" onclick="clearAll()">
        <div>VIP Job Formatter v5</div>
    </div>
    <div>
        <button onclick="copyOutput()">Copy</button>
        <button onclick="clearAll()">Clear</button>
    </div>
</div>

<div class="main">

<div class="left">

<div class="drop-zone" id="dropZone">
    Drop Excel File
    <div class="file-info" id="fileName"></div>
    <div class="status" id="status"></div>
</div>

<div class="box">
    <b>✏️ Fix Missing Data</b>
    <div id="editContent"></div>
    <button onclick="applyFixes()">Apply Fixes</button>
</div>

<div class="box">
    <b>⏰ Time / Priority Tasks</b>
    <div id="timeContent"></div>
</div>

<div id="preview"></div>

</div>

<div class="right">
<textarea id="output"></textarea>
</div>

</div>

<input type="file" id="fileInput" hidden />

<script>
let file;
let rawRows=[];

dropZone.onclick = () => fileInput.click();

fileInput.onchange = e=>{
    file = e.target.files[0];
    loadFile();
};

dropZone.ondragover = e=>{
    e.preventDefault();
    dropZone.classList.add("dragover");
};

dropZone.ondrop = e=>{
    e.preventDefault();
    dropZone.classList.remove("dragover");
    file = e.dataTransfer.files[0];
    loadFile();
};

function loadFile(){
    fileName.innerText=file.name;
    status.innerText="Processing...";
    setTimeout(processFile,10);
}

function isTimeSensitive(t){
    t=t.toLowerCase();
    return t.includes("am")||t.includes("pm")||/\d{1,2}:\d{2}/.test(t);
}

function processFile(){
    const reader=new FileReader();

    reader.onload=e=>{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        rawRows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
        render(rawRows);
    };

    reader.readAsArrayBuffer(file);
}

function render(rows){
    let grouped={},timeEntries=[],count=0,editHTML="";

    rows.forEach((r,i)=>{
        let sub=String(r[0]||"").trim();
        let lot=String(r[1]||"").trim();
        let job=String(r[2]||"").trim();
        let am =String(r[3]||"").trim();

        // editable missing
        if(!sub||!job){
            editHTML+=`
            <div>
                Row ${i+1}<br>
                <input placeholder="Subdivision" value="${sub}" id="sub-${i}">
                <input placeholder="Lot" value="${lot}" id="lot-${i}">
                <input placeholder="Job" value="${job}" id="job-${i}">
                <input placeholder="AM/Time" value="${am}" id="am-${i}">
            </div>`;
            return;
        }

        if(!grouped[sub]) grouped[sub]=[];

        let entry=lot?`${lot}-${job}`:`${job}`;
        let highlight=false;

        if(am){
            entry=`*${am} - ${entry}`;
            if(isTimeSensitive(am)){
                highlight=true;
                timeEntries.push(`${sub} → ${entry}`);
            }
        }

        grouped[sub].push({text:entry,highlight});
        count++;
    });

    editContent.innerHTML=editHTML;

    let out="",previewHTML="";

    for(let sub in grouped){
        out+=`*${sub}\n`;
        previewHTML+=`<div class="subdivision"><b>${sub}</b>`;

        grouped[sub].forEach(o=>{
            out+=o.text+"\n";
            previewHTML+=`<div class="job ${o.highlight?"highlight":""}">${o.text}</div>`;
        });

        previewHTML+=`</div>`;
    }

    output.value=out.trim();
    preview.innerHTML=previewHTML;

    timeContent.innerHTML=timeEntries.length
        ?timeEntries.map(t=>`<div>${t}</div>`).join("")
        :"<div style='color:#777;'>No time-specific tasks</div>";

    status.innerText=`✔ ${count} jobs`;
}

function applyFixes(){
    rawRows.forEach((r,i)=>{
        let s=document.getElementById(`sub-${i}`);
        let l=document.getElementById(`lot-${i}`);
        let j=document.getElementById(`job-${i}`);
        let a=document.getElementById(`am-${i}`);

        if(s) rawRows[i][0]=s.value;
        if(l) rawRows[i][1]=l.value;
        if(j) rawRows[i][2]=j.value;
        if(a) rawRows[i][3]=a.value;
    });

    render(rawRows);
}

function copyOutput(){
    output.select();
    document.execCommand("copy");
}

function clearAll(){
    file=null;
    output.value="";
    preview.innerHTML="";
    fileName.innerText="";
    status.innerText="";
    timeContent.innerHTML="";
    editContent.innerHTML="";
}
</script>

</body>
</html>
