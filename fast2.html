<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Dashboard v5</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0e0e0e;
    color:#fff;
    font-family:system-ui;
    padding:20px;
}

.container { max-width:1500px; margin:auto; }

.card {
    background:#181818;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

table { width:100%; border-collapse:collapse; }
td,th { padding:8px; border-bottom:1px solid #333; }

.good { color:#4caf50; }
.bad { color:#ff5252; }
.click { cursor:pointer; }

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.8);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-box {
    background:#1c1c1c;
    width:90%;
    max-height:85%;
    overflow:auto;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>VIP Performance Dashboard</h1>

<input type="file" id="upload">

<div class="grid">

<div class="card">
<h3>🏆 Crew Efficiency</h3>
<table id="crewTable"></table>
</div>

<div class="card">
<h3>📊 Floorplans</h3>
<table id="floorTable"></table>
</div>

<div class="card">
<h3>📈 Crew Efficiency Chart</h3>
<canvas id="crewChart"></canvas>
</div>

<div class="card">
<h3>📊 Task Averages</h3>
<canvas id="taskChart"></canvas>
</div>

<div class="card">
<h3>📅 Trend Over Time</h3>
<canvas id="trendChart"></canvas>
</div>

</div>

<div class="card">
<h3>🚨 Outliers</h3>
<div id="outliers"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span onclick="closeModal()" style="cursor:pointer;">✖</span>
<div id="modalContent"></div>
</div>
</div>

<script>

let data=[];

document.getElementById('upload').onchange=e=>{
    let r=new FileReader();
    r.onload=evt=>{
        let wb=XLSX.read(evt.target.result,{type:'binary'});
        let sheet=wb.Sheets[wb.SheetNames[0]];
        data=XLSX.utils.sheet_to_json(sheet);
        render();
    };
    r.readAsBinaryString(e.target.files[0]);
};

function avg(a){return a.reduce((x,y)=>x+y,0)/a.length;}

function render(){
    renderCrew();
    renderFloor();
    renderCharts();
    renderOutliers();
}

function renderCrew(){
    let map={};

    data.forEach(d=>{
        if(!map[d.Employee]) map[d.Employee]=[];
        map[d.Employee].push(d);
    });

    let global=avg(data.map(d=>d.Hours));

    let rows=Object.entries(map).map(([crew,jobs])=>{
        let avgH=avg(jobs.map(j=>j.Hours));
        let avgB=avg(jobs.map(j=>j["Budgetted Hours"]||0));
        let eff=avgH/global;
        let varp=((avgH-avgB)/avgB)*100;

        return {crew,avgH,avgB,eff,varp};
    });

    rows.sort((a,b)=>a.eff-b.eff);

    let html="<tr><th>#</th><th>Crew</th><th>Avg</th><th>Budget</th><th>%</th><th>Eff</th></tr>";

    rows.forEach((r,i)=>{
        html+=`<tr>
        <td>${i+1}</td>
        <td>${r.crew}</td>
        <td>${r.avgH.toFixed(2)}</td>
        <td>${r.avgB.toFixed(2)}</td>
        <td class="${r.varp<0?'good':'bad'}">${r.varp.toFixed(1)}%</td>
        <td class="${r.eff<1?'good':'bad'}">${r.eff.toFixed(2)}</td>
        </tr>`;
    });

    document.getElementById("crewTable").innerHTML=html;
}

function renderFloor(){
    let map={};

    data.forEach(d=>{
        if(!map[d.Floorplan]) map[d.Floorplan]=[];
        map[d.Floorplan].push(d);
    });

    let html="<tr><th>Floorplan</th><th>Avg</th><th>Budget</th></tr>";

    for(let f in map){
        let jobs=map[f];
        html+=`<tr class="click" onclick="openModal('${f}')">
        <td>${f}</td>
        <td>${avg(jobs.map(j=>j.Hours)).toFixed(2)}</td>
        <td>${avg(jobs.map(j=>j["Budgetted Hours"]||0)).toFixed(2)}</td>
        </tr>`;
    }

    document.getElementById("floorTable").innerHTML=html;
}

function renderCharts(){

    // crew chart
    let crewMap={};
    data.forEach(d=>{
        if(!crewMap[d.Employee]) crewMap[d.Employee]=[];
        crewMap[d.Employee].push(d.Hours);
    });

    new Chart(document.getElementById("crewChart"),{
        type:'bar',
        data:{
            labels:Object.keys(crewMap),
            datasets:[{
                label:'Avg Hours',
                data:Object.values(crewMap).map(avg)
            }]
        }
    });

    // task chart
    let taskMap={};
    data.forEach(d=>{
        if(!taskMap[d.Task]) taskMap[d.Task]=[];
        taskMap[d.Task].push(d.Hours);
    });

    new Chart(document.getElementById("taskChart"),{
        type:'bar',
        data:{
            labels:Object.keys(taskMap),
            datasets:[{
                label:'Avg Hours',
                data:Object.values(taskMap).map(avg)
            }]
        }
    });

    // trend chart
    let dates=[...new Set(data.map(d=>d.Date))].sort();

    let trend=dates.map(dt=>{
        let day=data.filter(d=>d.Date===dt);
        return avg(day.map(d=>d.Hours));
    });

    new Chart(document.getElementById("trendChart"),{
        type:'line',
        data:{
            labels:dates,
            datasets:[{label:'Avg Hours',data:trend}]
        }
    });
}

function openModal(floor){
    let jobs=data.filter(d=>d.Floorplan===floor);

    let html=`<h2>${floor}</h2><table>
    <tr><th>Crew</th><th>Task</th><th>Hours</th><th>Budget</th><th>%</th></tr>`;

    jobs.forEach(j=>{
        let diff=j.Hours-(j["Budgetted Hours"]||0);
        let pct=(diff/(j["Budgetted Hours"]||1))*100;

        html+=`<tr>
        <td>${j.Employee}</td>
        <td>${j.Task}</td>
        <td>${j.Hours}</td>
        <td>${j["Budgetted Hours"]||0}</td>
        <td class="${pct<0?'good':'bad'}">${pct.toFixed(1)}%</td>
        </tr>`;
    });

    html+="</table>";

    document.getElementById("modalContent").innerHTML=html;
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function renderOutliers(){
    let html="";

    data.forEach(d=>{
        let diff=d.Hours-(d["Budgetted Hours"]||0);
        let pct=(diff/(d["Budgetted Hours"]||1))*100;

        if(Math.abs(diff)>2){
            html+=`<div class="${pct>0?'bad':'good'}">
            ${d.Employee} | ${d.Floorplan} | ${d.Task}  
            → ${d.Hours}h vs ${d["Budgetted Hours"]||0}h  
            (${pct.toFixed(1)}%)
            </div>`;
        }
    });

    document.getElementById("outliers").innerHTML=html;
}

</script>

</body>
</html>
