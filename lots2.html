<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Lookup</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f0f0f;
  color: #fff;
}

/* HEADER */
.header {
  padding: 15px;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #222;
}

/* BUILDER UPDATE BAR */
#builderUpdates {
  padding: 8px 15px;
  background: #0d0d0d;
  border-bottom: 1px solid #222;
  font-size: 0.85rem;
}

.builder-pill {
  margin-right: 14px;
  display: inline-block;
  color: #aaa;
}

/* FILTERS */
.filters {
  display: grid;
  grid-template-columns: 120px auto 1fr 180px 180px auto auto;
  gap: 10px;
}

.filters input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e1e1e;
  color: #fff;
}

.btn {
  background: #222;
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
}

.btn:hover {
  background: #333;
}

/* TABLE */
.table-container {
  height: calc(100vh - 180px);
  overflow: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #222;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
  position: relative;
}

/* 🔥 CENTER ADDRESS NOW TOO */
td:nth-child(4) {
  text-align: center;
}

/* COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1) { width: 80px; }
th:nth-child(2), td:nth-child(2) { width: 220px; }
th:nth-child(3), td:nth-child(3) { width: 160px; }
th:nth-child(4), td:nth-child(4) { width: auto; }
th:nth-child(5), td:nth-child(5) { width: 140px; }
th:nth-child(6), td:nth-child(6) { width: 120px; }

/* STICKY HEADER */
thead th {
  position: sticky;
  top: 0;
  background: #1a1a1a;
  z-index: 5;
}

/* RESIZER */
.resizer {
  position: absolute;
  top: 0;
  right: 0;
  width: 6px;
  height: 100%;
  cursor: col-resize;
}

.resizer:hover {
  background: #4da3ff;
}
</style>
</head>

<body>

<div class="header">
  <h2>Lot Lookup</h2>

  <div class="filters">
    <input id="filterLot" placeholder="Lot">
    <button class="btn" onclick="exactLotSearch()">🎯</button>

    <input id="filterSubdivision" placeholder="Subdivision">
    <input id="filterBuilder" placeholder="Builder">
    <input id="filterFloorplan" placeholder="Floorplan">

    <button class="btn" onclick="refreshData()">🔄</button>
    <button class="btn" onclick="clearFilters()">Clear</button>
  </div>
</div>

<!-- 🔥 BUILDER LAST UPDATED -->
<div id="builderUpdates">
  <strong>Last Updated:</strong>
  <span id="builderUpdateList"></span>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Lot</th>
<th>Subdivision</th>
<th>Builder</th>
<th>Address</th>
<th>Floorplan</th>
<th>Updated</th>
</tr>
</thead>
<tbody id="resultsTable"></tbody>
</table>
</div>

<script>
let lots = [];

function loadData() {
  fetch('lots(1).json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      lots = data;
      buildBuilderUpdates();
      renderTable(lots);
    });
}
loadData();

/* DAYS AGO */
function daysAgo(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const date = new Date(y,m-1,day);
  const diff = Math.floor((Date.now()-date)/86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return '1d ago';
  return diff + 'd ago';
}

/* 🔥 BUILDER UPDATE BAR */
function buildBuilderUpdates() {
  const latest = {};

  lots.forEach(l => {
    if (!l.lastUpdated) return;

    const [y,m,d] = l.lastUpdated.split('-');
    const date = new Date(y,m-1,d);

    if (!latest[l.builder] || date > latest[l.builder]) {
      latest[l.builder] = date;
    }
  });

  builderUpdateList.innerHTML = '';

  Object.entries(latest).forEach(([builder, date]) => {
    const diff = Math.floor((Date.now() - date.getTime()) / 86400000);

    const span = document.createElement('span');
    span.className = 'builder-pill';

    span.textContent = `${builder} – ${diff === 0 ? 'Today' : diff + 'd ago'}`;

    // 🔴 older than 30 days
    if (diff > 30) {
      span.style.color = '#ff6b6b';
    }

    builderUpdateList.appendChild(span);
  });
}

/* FILTER */
function filterLots() {
  const lot = filterLot.value.toLowerCase();
  const sub = filterSubdivision.value.toLowerCase();
  const builder = filterBuilder.value.toLowerCase();
  const floor = filterFloorplan.value.toLowerCase();

  renderTable(lots.filter(l =>
    (!lot || l.lotNumber.toLowerCase().includes(lot)) &&
    (!sub || l.subdivision.toLowerCase().includes(sub)) &&
    (!builder || l.builder.toLowerCase().includes(builder)) &&
    (!floor || (l.floorplan||'').toLowerCase().includes(floor))
  ));
}

document.querySelectorAll('.filters input')
  .forEach(i => i.addEventListener('input', filterLots));

/* EXACT */
function exactLotSearch() {
  const v = filterLot.value.toLowerCase();
  renderTable(lots.filter(l => l.lotNumber.toLowerCase() === v));
}

/* RENDER */
function renderTable(data) {
  resultsTable.innerHTML = '';

  data.forEach(l => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${l.lotNumber}</td>
      <td>${l.subdivision}</td>
      <td>${l.builder}</td>
      <td>${l.address}</td>
      <td>${l.floorplan || ''}</td>
      <td>${daysAgo(l.lastUpdated)}</td>
    `;
    resultsTable.appendChild(row);
  });
}

/* REFRESH */
function refreshData(){ loadData(); }

/* CLEAR */
function clearFilters(){
  document.querySelectorAll('.filters input').forEach(i=>i.value='');
  renderTable(lots);
}

/* RESIZE */
function enableResize(){
  const ths = document.querySelectorAll("th");
  const saved = JSON.parse(localStorage.getItem("colWidths")||"{}");

  ths.forEach((th,i)=>{
    if(saved[i]) th.style.width = saved[i]+"px";

    const r = document.createElement("div");
    r.classList.add("resizer");
    th.appendChild(r);

    let startX, startW;

    r.addEventListener("mousedown",e=>{
      startX=e.pageX;
      startW=th.offsetWidth;

      function move(e){
        const w = startW + (e.pageX-startX);
        th.style.width = w+"px";
        saved[i]=w;
        localStorage.setItem("colWidths",JSON.stringify(saved));
      }

      function up(){
        document.removeEventListener("mousemove",move);
        document.removeEventListener("mouseup",up);
      }

      document.addEventListener("mousemove",move);
      document.addEventListener("mouseup",up);
    });
  });
}

window.addEventListener("load", enableResize);
</script>

</body>
</html>
