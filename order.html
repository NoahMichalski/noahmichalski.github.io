<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Formatter v2</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.drop-zone {
    border: 2px dashed #444;
    border-radius: 10px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.drop-zone:hover {
    border-color: #888;
}

.buttons {
    margin-top: 20px;
    text-align: center;
}

button {
    background: #fff;
    color: #000;
    border: none;
    padding: 10px 18px;
    margin: 5px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ddd;
}

.output-container {
    margin-top: 20px;
    display: flex;
    gap: 20px;
}

.preview {
    flex: 1;
    background: #121212;
    padding: 15px;
    border-radius: 8px;
    overflow-y: auto;
    max-height: 400px;
}

.preview h3 {
    margin: 10px 0 5px;
    border-bottom: 1px solid #333;
}

textarea {
    flex: 1;
    background: #000;
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    font-family: monospace;
    height: 400px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Job Formatter v2</h1>

<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
    Drag & Drop Excel File or Click to Upload
</div>

<input type="file" id="fileInput" hidden />

<div class="buttons">
    <button onclick="processFile()">Process</button>
    <button onclick="copyOutput()">Copy Output</button>
</div>

<div class="output-container">
    <div class="preview" id="preview"></div>
    <textarea id="output"></textarea>
</div>

</div>
</div>

<script>
let file;

document.getElementById("fileInput").addEventListener("change", e => {
    file = e.target.files[0];
});

document.querySelector(".drop-zone").addEventListener("dragover", e => {
    e.preventDefault();
});

document.querySelector(".drop-zone").addEventListener("drop", e => {
    e.preventDefault();
    file = e.dataTransfer.files[0];
});

function processFile() {
    if (!file) return alert("Upload a file first");

    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let grouped = {};

        rows.forEach(row => {
            let subdivision = (row[0] || "").toString().trim();
            let lot = (row[1] || "").toString().trim();
            let job = (row[2] || "").toString().trim();

            if (!subdivision || !lot || !job) return;

            if (!grouped[subdivision]) grouped[subdivision] = [];

            grouped[subdivision].push(`${lot}-${job}`);
        });

        let output = "";
        let previewHTML = "";

        Object.keys(grouped).forEach(sub => {
            output += `*${sub}\n`;

            previewHTML += `<h3>${sub}</h3>`;

            grouped[sub].forEach(entry => {
                output += entry + "\n";
                previewHTML += `<div>${entry}</div>`;
            });
        });

        document.getElementById("output").value = output.trim();
        document.getElementById("preview").innerHTML = previewHTML;
    };

    reader.readAsArrayBuffer(file);
}

function copyOutput() {
    const textarea = document.getElementById("output");
    textarea.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
