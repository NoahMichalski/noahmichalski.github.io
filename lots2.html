<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Lookup</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f0f0f;
  color: #fff;
}

.header {
  padding: 15px;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #222;
}

.filters {
  display: grid;
  grid-template-columns: 120px auto 1fr 180px 180px auto auto;
  gap: 10px;
}

.filters input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e1e1e;
  color: #fff;
}

.btn {
  background: #222;
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
}

#builderUpdates {
  padding: 8px 15px;
  background: #0d0d0d;
  border-bottom: 1px solid #222;
  font-size: 0.85rem;
}

.builder-pill {
  margin-right: 12px;
  color: #aaa;
}

.table-container {
  height: calc(100vh - 180px);
  overflow: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #222;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  position: relative;
}

th {
  cursor: pointer;
}

thead th {
  position: sticky;
  top: 0;
  background: #1a1a1a;
  z-index: 5;
}

/* COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1) { width: 80px; }
th:nth-child(2), td:nth-child(2) { width: 220px; }
th:nth-child(3), td:nth-child(3) { width: 160px; }
th:nth-child(4), td:nth-child(4) { width: auto; }
th:nth-child(5), td:nth-child(5) { width: 140px; }
th:nth-child(6), td:nth-child(6) { width: 120px; }

/* RESIZER */
.resizer {
  position: absolute;
  top: 0;
  right: 0;
  width: 6px;
  height: 100%;
  cursor: col-resize;
}

.resizer:hover {
  background: #4da3ff;
}
</style>
</head>

<body>

<div class="header">
  <h2>Lot Lookup</h2>

  <div class="filters">
    <input id="filterLot" placeholder="Lot">
    <button class="btn" onclick="exactLotSearch()">🎯</button>

    <input id="filterSubdivision" placeholder="Subdivision">
    <input id="filterBuilder" placeholder="Builder">
    <input id="filterFloorplan" placeholder="Floorplan">

    <button class="btn" onclick="refreshData()">🔄</button>
    <button class="btn" onclick="clearFilters()">Clear</button>
  </div>
</div>

<div id="builderUpdates">
  <strong>Last Updated:</strong>
  <span id="builderUpdateList"></span>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th onclick="sortTable('lotNumber')">Lot</th>
<th onclick="sortTable('subdivision')">Subdivision</th>
<th onclick="sortTable('builder')">Builder</th>
<th onclick="sortTable('address')">Address</th>
<th onclick="sortTable('floorplan')">Floorplan</th>
<th onclick="sortTable('lastUpdated')">Updated</th>
</tr>
</thead>
<tbody id="resultsTable"></tbody>
</table>
</div>

<script>
let lots = [];
let currentSort = { key: null, asc: true };

function loadData() {
  fetch('lots(1).json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      lots = data;
      buildBuilderUpdates();
      filterLots();
    });
}
loadData();

/* DAYS AGO */
function daysAgo(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const date = new Date(y,m-1,day);
  const diff = Math.floor((Date.now()-date)/86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return '1d ago';
  return diff + 'd ago';
}

/* BUILDER UPDATES */
function buildBuilderUpdates() {
  const latest = {};

  lots.forEach(l => {
    if (!l.lastUpdated) return;

    const date = new Date(l.lastUpdated);

    if (!latest[l.builder] || date > latest[l.builder]) {
      latest[l.builder] = date;
    }
  });

  builderUpdateList.innerHTML = '';

  Object.entries(latest).forEach(([builder, date]) => {
    const diff = Math.floor((Date.now() - date.getTime()) / 86400000);

    const span = document.createElement('span');
    span.className = 'builder-pill';
    span.textContent = `${builder} – ${diff === 0 ? 'Today' : diff + 'd ago'}`;

    if (diff > 30) span.style.color = '#ff6b6b';

    builderUpdateList.appendChild(span);
  });
}

/* FILTER */
function filterLots() {
  const lot = filterLot.value.toLowerCase();
  const sub = filterSubdivision.value.toLowerCase();
  const builder = filterBuilder.value.toLowerCase();
  const floor = filterFloorplan.value.toLowerCase();

  let filtered = lots.filter(l =>
    (!lot || l.lotNumber.toLowerCase().includes(lot)) &&
    (!sub || l.subdivision.toLowerCase().includes(sub)) &&
    (!builder || l.builder.toLowerCase().includes(builder)) &&
    (!floor || (l.floorplan||'').toLowerCase().includes(floor))
  );

  if (currentSort.key) {
    filtered = sortData(filtered, currentSort.key, currentSort.asc);
  }

  renderTable(filtered);
}

/* SORT LOGIC */
function sortTable(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort = { key, asc: true };
  }
  filterLots();
}

function sortData(data, key, asc) {
  return [...data].sort((a, b) => {

    if (key === 'lotNumber') {
      return asc ? smartLotSort(a, b) : smartLotSort(b, a);
    }

    if (key === 'lastUpdated') {
      return asc
        ? new Date(a.lastUpdated) - new Date(b.lastUpdated)
        : new Date(b.lastUpdated) - new Date(a.lastUpdated);
    }

    let A = (a[key] || '').toString().toLowerCase();
    let B = (b[key] || '').toString().toLowerCase();

    if (A < B) return asc ? -1 : 1;
    if (A > B) return asc ? 1 : -1;
    return 0;
  });
}

/* SMART LOT SORT */
function smartLotSort(a,b){
  const parse=x=>{
    const m=x.toString().match(/^(\d+)([A-Za-z]*)$/);
    return {num:m?parseInt(m[1]):0,suffix:m?m[2]:''};
  };
  const A=parse(a.lotNumber),B=parse(b.lotNumber);
  return A.num!==B.num?A.num-B.num:A.suffix.localeCompare(B.suffix);
}

/* INPUT LISTENERS */
document.querySelectorAll('.filters input')
  .forEach(i => i.addEventListener('input', filterLots));

filterLot.addEventListener('keydown', e => {
  if (e.key === 'Enter') exactLotSearch();
});

/* EXACT */
function exactLotSearch() {
  const v = filterLot.value.toLowerCase();
  renderTable(lots.filter(l => l.lotNumber.toLowerCase() === v));
}

/* RENDER */
function renderTable(data) {
  resultsTable.innerHTML = '';

  data.forEach(l => {
    const row = document.createElement('tr');

    row.innerHTML = `
      <td>${l.lotNumber}</td>
      <td>${l.subdivision}</td>
      <td>${l.builder}</td>
      <td>${l.address}</td>
      <td>${l.floorplan || ''}</td>
      <td>${daysAgo(l.lastUpdated)}</td>
    `;

    resultsTable.appendChild(row);
  });
}

/* REFRESH */
function refreshData(){ loadData(); }

/* CLEAR */
function clearFilters(){
  document.querySelectorAll('.filters input').forEach(i=>i.value='');
  filterLots();
}
</script>

</body>
</html>
