<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Intake + Validator + Export</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th, td {
    border:1px solid #444;
    padding:6px;
}

th { background:#333; }

input {
    width:100%;
    background:#222;
    color:#fff;
    border:none;
    padding:5px;
}

button {
    margin:5px;
    padding:8px 12px;
    background:#222;
    color:#fff;
    border:1px solid #555;
    cursor:pointer;
}

.good { background:#163d1c; }
.warn { background:#4a3b00; }
.bad { background:#4a1c1c; }

</style>
</head>

<body>

<h1>VIP Job Intake System</h1>

<input type="file" id="jsonFile">

<button onclick="addRow()">➕ Add Row</button>
<button onclick="validateAll()">✅ Validate All</button>
<button onclick="exportExcel()">📤 Export Excel</button>

<table id="table">
<thead>
<tr>
<th>Lot</th>
<th>Subdivision</th>
<th>Builder</th>
<th>Task</th>
<th>Status</th>
<th>Recheck</th>
<th>Remove</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let lotsData = {};

document.getElementById("jsonFile").addEventListener("change", e=>{
    let reader = new FileReader();
    reader.onload = evt=>{
        let data = JSON.parse(evt.target.result);
        lotsData = {};

        data.forEach(lot=>{
            lotsData[String(lot.lotNumber)] = lot;
        });

        alert("Lots loaded");
    };
    reader.readAsText(e.target.files[0]);
});

function addRow(){
    let tbody = document.querySelector("#table tbody");

    let tr = document.createElement("tr");

    tr.innerHTML = `
        <td><input oninput="autoFill(this)"></td>
        <td><input></td>
        <td><input></td>
        <td><input placeholder="reclean / original / windows"></td>
        <td>Status</td>
        <td><button onclick="recheck(this)">Check</button></td>
        <td><button onclick="this.closest('tr').remove()">X</button></td>
    `;

    tbody.appendChild(tr);
}

function autoFill(input){
    let row = input.closest("tr");
    let lotNum = input.value.trim();

    let lot = lotsData[lotNum];

    if(lot){
        row.cells[1].querySelector("input").value = lot.subdivision;
        row.cells[2].querySelector("input").value = lot.builder;
    }

    validateRow(row);
}

function validateRow(row){
    let lotNum = row.cells[0].querySelector("input").value.trim();
    let sub = row.cells[1].querySelector("input").value.trim();
    let builder = row.cells[2].querySelector("input").value.trim();

    let lot = lotsData[lotNum];

    let status = [];
    let className = "good";

    if(!lot){
        status.push("LOT NOT FOUND");
        className = "bad";
    } else {

        if(sub && sub !== lot.subdivision){
            status.push("SUBDIVISION MISMATCH");
            className = "warn";
        }

        if(builder && builder !== lot.builder){
            status.push("BUILDER MISMATCH");
            className = "warn";
        }
    }

    if(status.length === 0){
        status.push("OK");
    }

    row.className = className;
    row.cells[4].innerText = status.join(", ");
}

function validateAll(){
    let rows = document.querySelectorAll("#table tbody tr");

    let counts = {};

    rows.forEach(r=>{
        let lot = r.cells[0].querySelector("input").value.trim();
        counts[lot] = (counts[lot] || 0) + 1;
    });

    rows.forEach(r=>{
        validateRow(r);

        let lot = r.cells[0].querySelector("input").value.trim();

        if(counts[lot] > 1){
            r.className = "warn";
            r.cells[4].innerText += " | DUPLICATE";
        }
    });
}

function recheck(btn){
    let row = btn.closest("tr");
    validateRow(row);
}

function exportExcel(){
    let rows = document.querySelectorAll("#table tbody tr");

    let data = [];

    rows.forEach(r=>{
        if(r.className !== "good") return;

        data.push({
            Lot: r.cells[0].querySelector("input").value,
            Subdivision: r.cells[1].querySelector("input").value,
            Builder: r.cells[2].querySelector("input").value,
            Task: r.cells[3].querySelector("input").value
        });
    });

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Jobs");

    XLSX.writeFile(wb, "validated_jobs.xlsx");
}

</script>

</body>
</html>
