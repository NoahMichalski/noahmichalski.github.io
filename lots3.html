<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Lookup</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f0f0f;
  color: #fff;
}

/* HEADER */
.header {
  padding: 15px;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #222;
}

h1 {
  margin: 0 0 10px 0;
  font-size: 1.4rem;
}

/* FILTER GRID */
.filters {
  display: grid;
  grid-template-columns: 120px auto 1fr 180px 180px auto auto;
  gap: 10px;
}

.filters input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e1e1e;
  color: #fff;
}

/* BUTTONS */
.btn {
  background: #222;
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
}

.btn:hover {
  background: #333;
}

/* TABLE */
.table-container {
  height: calc(100vh - 120px);
  overflow-y: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

thead th {
  position: sticky;
  top: 0;
  background: #1a1a1a;
  z-index: 5;
  cursor: pointer;
  border-bottom: 2px solid #333;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #222;
  text-align: left;
}

th {
  font-size: 0.8rem;
  color: #aaa;
  text-transform: uppercase;
}

tr:hover {
  background: #1c1c1c;
}

.address-link {
  color: #4da3ff;
  text-decoration: none;
}

.highlight {
  color: #4da3ff;
  font-weight: 600;
}

.no-results {
  text-align: center;
  padding: 20px;
  color: #888;
}

.sort-indicator {
  margin-left: 5px;
  font-size: 0.7rem;
}
</style>
</head>

<body>

<div class="header">
  <h1>Lot Lookup</h1>

  <div class="filters">
    <input id="filterLot" placeholder="Lot">
    <button class="btn" onclick="exactLotSearch()">🎯</button>

    <input id="filterSubdivision" placeholder="Subdivision">
    <input id="filterBuilder" placeholder="Builder">
    <input id="filterFloorplan" placeholder="Floorplan">

    <button class="btn" onclick="refreshData()">🔄</button>
    <button class="btn" onclick="clearFilters()">Clear</button>
  </div>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th onclick="sortTable('lotNumber')">Lot<span id="sort-lotNumber" class="sort-indicator"></span></th>
        <th onclick="sortTable('subdivision')">Subdivision<span id="sort-subdivision" class="sort-indicator"></span></th>
        <th onclick="sortTable('builder')">Builder<span id="sort-builder" class="sort-indicator"></span></th>
        <th onclick="sortTable('address')">Address<span id="sort-address" class="sort-indicator"></span></th>
        <th onclick="sortTable('floorplan')">Floorplan<span id="sort-floorplan" class="sort-indicator"></span></th>
      </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
  </table>
</div>

<script>
let lots = [];
let currentSort = { key: null, asc: true };

function loadData() {
  fetch('lots(1).json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      lots = data;
      filterLots();
    });
}

loadData();

function refreshData() {
  loadData();
}

function highlight(text, query) {
  if (!query) return text || '';
  const regex = new RegExp(`(${query})`, 'gi');
  return (text || '').replace(regex, '<span class="highlight">$1</span>');
}

function renderTable(data) {
  const table = document.getElementById('resultsTable');
  table.innerHTML = '';

  if (data.length === 0) {
    table.innerHTML = `<tr><td colspan="5" class="no-results">No results found</td></tr>`;
    return;
  }

  const lotQ = document.getElementById('filterLot').value;
  const subQ = document.getElementById('filterSubdivision').value;
  const builderQ = document.getElementById('filterBuilder').value;
  const floorQ = document.getElementById('filterFloorplan').value;

  data.forEach(lot => {
    const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lot.address)}`;

    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${highlight(lot.lotNumber, lotQ)}</td>
      <td>${highlight(lot.subdivision, subQ)}</td>
      <td>${highlight(lot.builder, builderQ)}</td>
      <td><a class="address-link" href="${mapsLink}" target="_blank">${lot.address}</a></td>
      <td>${highlight(lot.floorplan || 'N/A', floorQ)}</td>
    `;

    table.appendChild(row);
  });
}

/* FILTER + AUTO SORT */
function filterLots() {
  const lotVal = document.getElementById('filterLot').value.toLowerCase();
  const subVal = document.getElementById('filterSubdivision').value.toLowerCase();
  const builderVal = document.getElementById('filterBuilder').value.toLowerCase();
  const floorVal = document.getElementById('filterFloorplan').value.toLowerCase();

  let filtered = lots.filter(lot =>
    (!lotVal || lot.lotNumber?.toLowerCase().includes(lotVal)) &&
    (!subVal || lot.subdivision?.toLowerCase().includes(subVal)) &&
    (!builderVal || lot.builder?.toLowerCase().includes(builderVal)) &&
    (!floorVal || lot.floorplan?.toLowerCase().includes(floorVal))
  );

  // 🔥 AUTO SORT WHEN SUBDIVISION FILTER USED
  if (subVal && !currentSort.key) {
    filtered = filtered.sort((a, b) => a.lotNumber - b.lotNumber);
  } else if (currentSort.key) {
    filtered = sortData(filtered, currentSort.key, currentSort.asc);
  }

  renderTable(filtered);
}

/* EXACT LOT */
function exactLotSearch() {
  const lotVal = document.getElementById('filterLot').value.trim().toLowerCase();
  if (!lotVal) return;

  const filtered = lots.filter(lot =>
    lot.lotNumber?.toLowerCase() === lotVal
  );

  renderTable(filtered);
}

document.querySelectorAll('.filters input').forEach(input => {
  input.addEventListener('input', filterLots);
});

/* SORT */
function sortTable(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort = { key, asc: true };
  }

  updateSortIndicators();
  filterLots();
}

function sortData(data, key, asc) {
  return [...data].sort((a, b) => {
    let valA = a[key] || '';
    let valB = b[key] || '';

    if (!isNaN(valA) && !isNaN(valB)) {
      return asc ? valA - valB : valB - valA;
    }

    valA = valA.toString().toLowerCase();
    valB = valB.toString().toLowerCase();

    if (valA < valB) return asc ? -1 : 1;
    if (valA > valB) return asc ? 1 : -1;
    return 0;
  });
}

function updateSortIndicators() {
  document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '');

  if (currentSort.key) {
    document.getElementById(`sort-${currentSort.key}`).textContent =
      currentSort.asc ? '▲' : '▼';
  }
}

/* CLEAR */
function clearFilters() {
  document.querySelectorAll('.filters input').forEach(i => i.value = '');
  currentSort = { key: null, asc: true };
  updateSortIndicators();
  renderTable(lots);
}
</script>

</body>
</html>
