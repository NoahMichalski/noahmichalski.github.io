<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lot Converter v2.5</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px;}
.box { background:#1a1a1a; padding:15px; margin-bottom:15px; border-radius:8px;}
button { padding:8px; margin:5px; background:white; color:black; cursor:pointer;}
td, th { border:1px solid #333; padding:4px; font-size:12px;}
table { border-collapse: collapse; width:100%; overflow-x:auto; display:block;}
textarea { width:100%; height:250px; background:black; color:#0f0;}
.errorRow { background:#3a0000;}
.goodRow { background:#003300;}
</style>
</head>

<body>

<h1>Lot Converter</h1>
<div>Version 2.5</div>

<div class="box">
<input type="file" id="fileInput">
<input type="date" id="dateInput">
<br>
<button onclick="processFile()">Import</button>
<button onclick="fixErrors()">Fix Errors</button>
</div>

<div class="box">
<h3>Editable Data</h3>
<table id="table">
<thead></thead>
<tbody></tbody>
</table>
</div>

<div class="box">
<h3>Output</h3>
<textarea id="output"></textarea><br>
<button onclick="copyOutput()">Copy</button>
<button onclick="downloadJSON()">Download</button>
</div>

<script>
document.getElementById("dateInput").valueAsDate = new Date();

let data = [];
let headers = [];

function processFile(){
    const file = document.getElementById("fileInput").files[0];
    if(!file) return alert("Select file");

    const reader = new FileReader();

    reader.onload = function(e){
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});

        headers = Object.keys(rows[0]).filter(h => !h.includes("Unnamed"));

        data = rows.map(r=>{
            let obj = {};
            headers.forEach(h=>{
                obj[h] = (r[h] || "").toString().trim();
            });
            obj.valid = false;
            return obj;
        });

        renderTable();
        validate();
    };

    reader.readAsArrayBuffer(file);
}

function renderTable(){
    const thead = document.querySelector("#table thead");
    const tbody = document.querySelector("#table tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    let headRow = "<tr>";
    headers.forEach(h => headRow += `<th>${h}</th>`);
    headRow += "<th>Status</th></tr>";
    thead.innerHTML = headRow;

    data.forEach((row,i)=>{
        let tr = document.createElement("tr");

        let rowHTML = "";
        headers.forEach(h=>{
            rowHTML += `<td contenteditable oninput="edit(${i}, '${h}', this.innerText)">${row[h]}</td>`;
        });

        rowHTML += `<td id="status-${i}">❌</td>`;
        tr.innerHTML = rowHTML;
        tbody.appendChild(tr);
    });
}

function edit(i,key,val){
    data[i][key] = val.trim();
    validate();
}

function validate(){
    const date = document.getElementById("dateInput").value;
    let output = [];

    data.forEach((row,i)=>{
        let valid = row.Builder && row.Subdivision && row.Address;

        row.valid = valid;

        let tr = document.querySelectorAll("#table tbody tr")[i];
        let status = document.getElementById(`status-${i}`);

        if(valid){
            tr.className = "goodRow";
            status.innerText = "✅";

            output.push({
                lotNumber: row.Lot || "",
                subdivision: row.Subdivision,
                builder: row.Builder,
                address: row.Address,
                floorplan: row.Floorplan || "",

                original: Number(row.Original || 0),
                reclean: Number(row.Reclean || 0),
                windows: Number(row.Windows || 0),
                model: Number(row.Model || 0),
                dryCleanOriginal: Number(row["Dry Clean Original"] || 0),
                waterReclean: Number(row["1st w/water reclean"] || 0),
                rewashWindows: Number(row["Rewash windows"] || 0),

                lastUpdated: date
            });

        } else {
            tr.className = "errorRow";
            status.innerText = "❌";
        }
    });

    document.getElementById("output").value = JSON.stringify(output, null, 2);
}

function fixErrors(){
    validate();
    alert("Fix highlighted rows.");
}

function copyOutput(){
    let t = document.getElementById("output");
    t.select();
    document.execCommand("copy");
}

function downloadJSON(){
    let blob = new Blob([document.getElementById("output").value], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "lots.json";
    a.click();
}
</script>

</body>
</html>
