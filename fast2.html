<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0b0b0b;
    color:#eaeaea;
    font-family:system-ui;
    margin:0;
    padding:20px;
}

.container { max-width:1400px; margin:auto; }

h1 { text-align:center; margin-bottom:20px; }

.card {
    background:#151515;
    border-radius:14px;
    padding:18px;
    margin-bottom:18px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #222;
}

tr:hover { background:#1f1f1f; }

.click { cursor:pointer; }

.good { color:#3ddc97; }
.bad { color:#ff5c5c; }

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    width:85%;
    max-height:85%;
    overflow:auto;
    background:#121212;
    border-radius:14px;
    padding:20px;
}

.close {
    float:right;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>VIP Performance Dashboard</h1>

<input type="file" id="upload">

<div class="grid">

<div class="card">
<h3>🏆 Crew Efficiency</h3>
<table id="crewTable"></table>
</div>

<div class="card">
<h3>📊 Floorplans</h3>
<table id="floorTable"></table>
</div>

</div>

<div class="grid">

<div class="card">
<h3>📈 Crew Efficiency</h3>
<canvas id="crewChart"></canvas>
</div>

<div class="card">
<h3>📊 Task Efficiency</h3>
<canvas id="taskChart"></canvas>
</div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>
<div id="modalContent"></div>
</div>
</div>

<script>

let data=[];
let currentCrew="";
let crewChartInstance=null;
let taskChartInstance=null;

const crewTable = document.getElementById("crewTable");
const floorTable = document.getElementById("floorTable");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

document.getElementById('upload').onchange=e=>{
    let r=new FileReader();
    r.onload=evt=>{
        let wb=XLSX.read(evt.target.result,{type:'binary'});
        let sheet=wb.Sheets[wb.SheetNames[0]];
        data=XLSX.utils.sheet_to_json(sheet);

        data.forEach(d=>{
            let b=d["Budgetted Hours"]||0;
            d.eff=b?d.Hours/b:null;
        });

        render();
    };
    r.readAsBinaryString(e.target.files[0]);
};

function avg(a){
    let v=a.filter(x=>x!=null);
    return v.reduce((x,y)=>x+y,0)/v.length;
}

function render(){
    renderCrew();
    renderFloor();
    renderCharts();
}

function renderCrew(){
    let map={};

    data.forEach(d=>{
        if(!map[d.Employee]) map[d.Employee]=[];
        map[d.Employee].push(d.eff);
    });

    let rows=Object.entries(map).map(([c,v])=>({
        crew:c,
        eff:avg(v)
    }));

    rows.sort((a,b)=>a.eff-b.eff);

    let html="<tr><th>#</th><th>Crew</th><th>Eff</th></tr>";

    rows.forEach((r,i)=>{
        html+=`
        <tr>
        <td>${i+1}</td>
        <td class="click" onclick="openCrew('${r.crew}')">${r.crew}</td>
        <td class="${r.eff<1?'good':'bad'}">${r.eff.toFixed(2)}</td>
        </tr>`;
    });

    crewTable.innerHTML=html;
}

function openCrew(crew){
    currentCrew=crew;

    let jobs=data.filter(d=>d.Employee===crew);

    let map={};
    jobs.forEach(j=>{
        if(!map[j.Floorplan]) map[j.Floorplan]=[];
        map[j.Floorplan].push(j.eff);
    });

    let html=`<h2>${crew}</h2><table><tr><th>Floorplan</th><th>Efficiency</th></tr>`;

    for(let f in map){
        html+=`
        <tr class="click" onclick="openFloor('${f}')">
        <td>${f}</td>
        <td class="${avg(map[f])<1?'good':'bad'}">${avg(map[f]).toFixed(2)}</td>
        </tr>`;
    }

    html+="</table>";

    modalContent.innerHTML=html;
    modal.style.display="flex";
}

function openFloor(floor){

    let jobs=data.filter(d=>d.Employee===currentCrew && d.Floorplan===floor);

    let html=`<h2>${currentCrew} → ${floor}</h2>
    <table>
    <tr><th>Date</th><th>Subdivision</th><th>Lot</th><th>Task</th>
    <th>Hours</th><th>Budget</th><th>Eff</th></tr>`;

    jobs.forEach(j=>{
        html+=`
        <tr>
        <td>${j.Date}</td>
        <td>${j.Subdivision}</td>
        <td>${j.Lot}</td>
        <td>${j.Task}</td>
        <td>${j.Hours.toFixed(1)}</td>
        <td>${(j["Budgetted Hours"]||0).toFixed(1)}</td>
        <td class="${j.eff<1?'good':'bad'}">${j.eff.toFixed(2)}</td>
        </tr>`;
    });

    html+="</table>";

    modalContent.innerHTML=html;
}

function renderFloor(){
    let map={};

    data.forEach(d=>{
        if(!map[d.Floorplan]) map[d.Floorplan]=[];
        map[d.Floorplan].push(d);
    });

    let html="<tr><th>Floorplan</th><th>Eff</th></tr>";

    for(let f in map){
        let eff=avg(map[f].map(j=>j.eff));
        html+=`
        <tr>
        <td>${f}</td>
        <td class="${eff<1?'good':'bad'}">${eff.toFixed(2)}</td>
        </tr>`;
    }

    floorTable.innerHTML=html;
}

function renderCharts(){

    // destroy old charts
    if(crewChartInstance) crewChartInstance.destroy();
    if(taskChartInstance) taskChartInstance.destroy();

    let crewMap={};
    data.forEach(d=>{
        if(!crewMap[d.Employee]) crewMap[d.Employee]=[];
        crewMap[d.Employee].push(d.eff);
    });

    crewChartInstance = new Chart(document.getElementById("crewChart"),{
        type:'bar',
        data:{
            labels:Object.keys(crewMap),
            datasets:[{
                data:Object.values(crewMap).map(avg),
                backgroundColor:Object.values(crewMap).map(v=>avg(v)<1?'#3ddc97':'#ff5c5c')
            }]
        }
    });

    let taskMap={};
    data.forEach(d=>{
        if(!taskMap[d.Task]) taskMap[d.Task]=[];
        taskMap[d.Task].push(d.eff);
    });

    taskChartInstance = new Chart(document.getElementById("taskChart"),{
        type:'bar',
        data:{
            labels:Object.keys(taskMap),
            datasets:[{
                data:Object.values(taskMap).map(avg)
            }]
        }
    });
}

function closeModal(){
    modal.style.display="none";
}

</script>

</body>
</html>
