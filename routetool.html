<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Route Optimizer FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px;}
button { margin:5px; padding:8px; background:#0af; border:none; color:#fff;}
input { padding:6px; margin:5px;}
#map { height:420px; margin-top:15px;}
table { width:100%; margin-top:20px;}
th { background:#333; padding:6px;}
td { border-bottom:1px solid #333; padding:5px;}
</style>
</head>

<body>

<h2>Route Optimizer FINAL</h2>

<input type="file" id="fileInput">
<button onclick="loadExcel()">Import Excel</button>
<button onclick="optimizeRoute()">Optimize Route</button>
<button onclick="calcDriving()">Get Driving Distances</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="clearData()">Clear</button>

<br><br>

<input id="sub" placeholder="Subdivision">
<input id="lat" placeholder="Lat">
<input id="lon" placeholder="Lon">
<button onclick="addSubdivision()">Add + Smart Insert</button>

<div id="info"></div>

<div id="map"></div>

<table>
<thead>
<tr>
<th>#</th>
<th>Builder</th>
<th>Subdivision</th>
<th>Miles → Next</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

const ORS_KEY = "5b3ce3597851110001cf624895d5d8857d8d41b6a9508753893fbb25";

let data = JSON.parse(localStorage.getItem("routeData") || "[]");
let distances = [];

let map = L.map('map').setView([40.1,-83.1],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let polyline;

// -------- IMPORT --------
function loadExcel(){

    let file = document.getElementById("fileInput").files[0];
    if(!file){
        alert("Select a file first");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        let wb = XLSX.read(e.target.result,{type:'binary'});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet);

        let imported = [];
        let skipped = [];

        json.forEach((r,i)=>{

            let lat = parseFloat(r.Lat || r.LAT || r.lat || r.Latitude);
            let lon = parseFloat(r.Lon || r.LON || r.lon || r.Long || r.Longitude);

            let sub = r.Subdivision || r.subdivision;
            let builder = r.Builder || "";
            let address = r.Address || "";

            if(!sub || isNaN(lat) || isNaN(lon)){
                skipped.push(i+1);
                return;
            }

            imported.push({
                builder,
                subdivision: sub.trim(),
                address,
                lat,
                lon
            });
        });

        data = imported;

        save();
        drawMap();

        document.getElementById("info").innerHTML =
            "Imported: " + imported.length +
            " | Skipped: " + skipped.length +
            (skipped.length ? " (rows: " + skipped.join(", ") + ")" : "");
    };

    reader.readAsBinaryString(file);
}

// -------- OPTIMIZE --------
function straightDist(a,b){
    let dx=a.lat-b.lat, dy=a.lon-b.lon;
    return Math.sqrt(dx*dx+dy*dy);
}

function optimizeRoute(){

    let start=data.find(x=>x.subdivision.toLowerCase().includes("jerome village applewood"));

    if(!start){
        alert("Start location (Jerome Village Applewood) not found");
        return;
    }

    let remaining=[...data];
    let route=[];

    let current=remaining.splice(remaining.indexOf(start),1)[0];
    route.push(current);

    while(remaining.length){
        let nearest=remaining.reduce((a,b)=>
            straightDist(current,a)<straightDist(current,b)?a:b
        );

        remaining.splice(remaining.indexOf(nearest),1);
        route.push(nearest);
        current=nearest;
    }

    data=route;
    save();
    drawMap();
}

// -------- DRIVING DISTANCE --------
async function getDrive(a,b){

    let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
        method:"POST",
        headers:{
            "Authorization":ORS_KEY,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            coordinates:[[a.lon,a.lat],[b.lon,b.lat]]
        })
    });

    let json=await res.json();

    if(!json.routes){
        console.log(json);
        return 0;
    }

    return json.routes[0].summary.distance * 0.000621371;
}

async function calcDriving(){

    distances=[];
    let total=0;

    for(let i=0;i<data.length-1;i++){
        let miles=await getDrive(data[i],data[i+1]);
        distances.push(miles.toFixed(2));
        total+=miles;
    }

    document.getElementById("info").innerHTML =
        "Total Route: " + total.toFixed(1) + " miles";

    render();
}

// -------- ADD NEW --------
async function addSubdivision(){

    let sub=document.getElementById("sub").value;
    let lat=parseFloat(document.getElementById("lat").value);
    let lon=parseFloat(document.getElementById("lon").value);

    if(!sub || isNaN(lat) || isNaN(lon)){
        alert("Enter valid subdivision + lat/lon");
        return;
    }

    let newPoint={subdivision:sub,lat,lon};

    let bestIndex=0;
    let bestCost=Infinity;

    for(let i=0;i<data.length-1;i++){

        let d1=await getDrive(data[i],newPoint);
        let d2=await getDrive(newPoint,data[i+1]);

        let cost=d1+d2;

        if(cost<bestCost){
            bestCost=cost;
            bestIndex=i+1;
        }
    }

    data.splice(bestIndex,0,newPoint);
    save();
    drawMap();

    document.getElementById("info").innerHTML =
        "Inserted at position: " + (bestIndex+1);
}

// -------- MAP --------
function drawMap(){

    if(polyline) map.removeLayer(polyline);

    map.eachLayer(layer=>{
        if(layer instanceof L.Marker) map.removeLayer(layer);
    });

    if(data.length===0) return;

    let coords=data.map(p=>[p.lat,p.lon]);

    polyline=L.polyline(coords,{color:'cyan'}).addTo(map);
    map.fitBounds(polyline.getBounds());

    data.forEach(p=>{
        L.marker([p.lat,p.lon]).addTo(map)
            .bindPopup(p.subdivision);
    });

    render();
}

// -------- TABLE --------
function render(){

    let html="";

    for(let i=0;i<data.length;i++){
        let d=distances[i]?distances[i]+" mi":"-";

        html+=`<tr>
        <td>${i+1}</td>
        <td>${data[i].builder || ""}</td>
        <td>${data[i].subdivision}</td>
        <td>${d}</td>
        </tr>`;
    }

    document.getElementById("table").innerHTML=html;
}

// -------- EXPORT --------
function exportExcel(){

    let exportData=data.map((d,i)=>({
        Order:i+1,
        Builder:d.builder || "",
        Subdivision:d.subdivision,
        Address:d.address || "",
        MilesToNext:distances[i] || ""
    }));

    let ws=XLSX.utils.json_to_sheet(exportData);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Route");

    XLSX.writeFile(wb,"route.xlsx");
}

// -------- UTIL --------
function save(){
    localStorage.setItem("routeData", JSON.stringify(data));
}

function clearData(){
    localStorage.removeItem("routeData");
    data=[];
    distances=[];
    drawMap();
    document.getElementById("info").innerHTML="";
}

drawMap();

</script>

</body>
</html>
