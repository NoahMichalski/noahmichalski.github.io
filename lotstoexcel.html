<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lot Data Manager</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

button, select {
  margin: 5px;
  padding: 8px 12px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: #555; }

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 15px;
}

th, td {
  border: 1px solid #444;
  padding: 6px;
}

th { background: #222; }
td { background: #1a1a1a; }

td[contenteditable="true"] {
  background: #222;
}

tr.error {
  background: #3a0000 !important;
}

tr.duplicate {
  background: #ff000055 !important;
}

tr.possible-duplicate {
  background: #ffaa0055 !important;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Lot Data Manager</h1>

<input type="file" id="fileInput" accept=".json">

<br>

<button onclick="loadDefault()">Load Repo JSON</button>
<button onclick="loadJSON()">Upload JSON</button>
<button onclick="checkDuplicates()">Check Duplicates</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="copyTable()">Copy Table</button>

<br>

<label>Filter Builder:</label>
<select id="builderFilter" onchange="renderTable()">
  <option value="ALL">All</option>
</select>

<div id="status"></div>

<table>
<thead>
<tr>
<th>Builder</th>
<th>Subdivision</th>
<th>Lot</th>
<th>Floorplan</th>
<th>Address</th>
<th>Last Updated</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
let rawData = [];

async function loadDefault() {
  try {
    const res = await fetch("lots(1).json");
    const data = await res.json();
    processData(data);
  } catch {
    document.getElementById("status").innerText = "❌ Could not load lots(1).json";
  }
}

function loadJSON() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      processData(data);
    } catch {
      document.getElementById("status").innerText = "❌ Invalid JSON";
    }
  };

  reader.readAsText(file);
}

function processData(data) {
  rawData = data.map(item => ({
    builder: item.builder || "",
    subdivision: item.subdivision || "",
    lot: item.lotNumber || "",
    floorplan: item.floorplan || "",
    address: item.address || "",
    lastUpdated: item.lastUpdated || ""
  }));

  populateBuilderFilter();
  renderTable();
  checkDuplicates();
}

function populateBuilderFilter() {
  const select = document.getElementById('builderFilter');
  const builders = [...new Set(rawData.map(r => r.builder).filter(b => b))];

  select.innerHTML = '<option value="ALL">All</option>';

  builders.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    select.appendChild(opt);
  });
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const filter = document.getElementById('builderFilter').value;

  tbody.innerHTML = "";

  rawData.forEach((row, index) => {
    if (filter !== "ALL" && row.builder !== filter) return;

    const tr = document.createElement('tr');

    Object.keys(row).forEach(key => {
      const td = document.createElement('td');
      td.contentEditable = true;
      td.innerText = row[key];

      td.oninput = () => {
        rawData[index][key] = td.innerText;
        validateRow(tr, rawData[index]);
        checkDuplicates();
      };

      tr.appendChild(td);
    });

    validateRow(tr, row);
    tbody.appendChild(tr);
  });
}

function validateRow(tr, row) {
  tr.classList.remove("error");

  if (!row.floorplan || !row.address) {
    tr.classList.add("error");
  }
}

function normalizeAddress(addr) {
  return addr.toLowerCase()
    .replace(/street/g, "st")
    .replace(/drive/g, "dr")
    .replace(/road/g, "rd")
    .replace(/lane/g, "ln")
    .replace(/court/g, "ct")
    .replace(/circle/g, "cir")
    .replace(/way/g, "wy")
    .replace(/\s+/g, "")
    .replace(/[^a-z0-9]/g, "");
}

function checkDuplicates() {
  const rows = document.querySelectorAll("#tableBody tr");

  const seenExact = {};
  const seenAddress = {};

  let duplicates = 0;

  rows.forEach(tr => {
    tr.classList.remove("duplicate", "possible-duplicate");
  });

  rows.forEach(tr => {
    const cells = tr.children;

    const subdivision = cells[1].innerText.trim();
    const lot = cells[2].innerText.trim();
    const address = cells[4].innerText.trim();

    const keyExact = subdivision + "|" + lot;
    const keyAddress = normalizeAddress(address);

    if (seenExact[keyExact]) {
      tr.classList.add("duplicate");
      seenExact[keyExact].classList.add("duplicate");
      duplicates++;
    } else {
      seenExact[keyExact] = tr;
    }

    if (keyAddress && seenAddress[keyAddress]) {
      tr.classList.add("possible-duplicate");
      seenAddress[keyAddress].classList.add("possible-duplicate");
      duplicates++;
    } else if (keyAddress) {
      seenAddress[keyAddress] = tr;
    }
  });

  document.getElementById("status").innerText =
    duplicates > 0
      ? `⚠️ ${duplicates} duplicate issues found`
      : `✅ Clean (${rawData.length} lots)`;
}

function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(rawData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Lots");
  XLSX.writeFile(wb, "lots.xlsx");
}

function exportJSON() {
  const json = rawData.map(r => ({
    lotNumber: r.lot,
    subdivision: r.subdivision,
    builder: r.builder,
    address: r.address,
    floorplan: r.floorplan,
    lastUpdated: r.lastUpdated
  }));

  const blob = new Blob([JSON.stringify(json, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "lots.json";
  a.click();
}

function copyTable() {
  let text = "Builder\tSubdivision\tLot\tFloorplan\tAddress\tLast Updated\n";

  rawData.forEach(r => {
    text += `${r.builder}\t${r.subdivision}\t${r.lot}\t${r.floorplan}\t${r.address}\t${r.lastUpdated}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
