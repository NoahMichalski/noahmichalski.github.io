<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overtime Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.logo {
    display:block;
    margin:0 auto 15px auto;
    max-width:200px;
}

h1 { text-align:center; }

.controls { text-align:center; margin-bottom:10px; }

button, select {
    background:white;
    color:black;
    border:none;
    padding:8px 14px;
    margin:5px;
    cursor:pointer;
}

.dayLabel {
    text-align:center;
    margin-bottom:10px;
    font-weight:bold;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    border:1px solid #333;
    padding:6px;
    text-align:center;
}

.predicted {
    background:#ff2fa3;
    font-weight:bold;
}

.normal { background:#1f4d1f; }
.warning { background:#7a6a00; }
.overtime { background:#8b0000; }

</style>
</head>

<body>

<img src="/images/VIP-logo-white.png" class="logo">

<h1>Overtime Predictor</h1>

<div class="controls">
    <input type="file" id="fileInput" accept=".xlsx,.csv">

    <select id="daySelect" onchange="updateDayLabel(); recalcAll();">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
    </select>

    <button onclick="processFile()">Load</button>
    <button onclick="copyStyled()">Copy for Email</button>
</div>

<div class="dayLabel" id="dayLabel"></div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Actual</th>
<th>Projected</th>
<th>OT</th>
<th>Hits OT</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let tableData = [];

function updateDayLabel(){
    let text = document.getElementById("daySelect").selectedOptions[0].text;
    document.getElementById("dayLabel").innerText = "Current Day: " + text;
}

updateDayLabel();

function processFile() {
    const file = document.getElementById('fileInput').files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        tableData = XLSX.utils.sheet_to_json(sheet);
        render();
    };

    reader.readAsBinaryString(file);
}

function clean(val) {
    return parseFloat(val) || 0;
}

function render() {
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    tableData.forEach(row => {
        let name = row["Name"];
        if (!name) return;

        let days = [
            clean(row["Monday"]),
            clean(row["Tuesday"]),
            clean(row["Wednesday"]),
            clean(row["Thursday"]),
            clean(row["Friday"])
        ];

        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${name}</td>
            ${days.map(d=>`<td contenteditable="true">${d}</td>`).join("")}
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        `;

        tbody.appendChild(tr);
    });

    recalcAll();
}

function recalcAll() {
    let selectedDay = parseInt(document.getElementById("daySelect").value);

    document.querySelectorAll("#table tbody tr").forEach(tr => {
        let tds = tr.querySelectorAll("td");

        let days = [];
        for (let i=1;i<=5;i++){
            days.push(parseFloat(tds[i].innerText)||0);
        }

        let actual = days.reduce((a,b)=>a+b,0);

        let projected = 0;
        let running = 0;
        let hitDay = "—";

        for (let i=0;i<5;i++){
            tds[i+1].classList.remove("predicted");

            let val = (i<=selectedDay)? days[i] : 8;

            if(i>selectedDay){
                tds[i+1].innerText = "8";
                tds[i+1].classList.add("predicted");
            }

            projected += val;
            running += val;

            if(running > 40 && hitDay==="—"){
                hitDay = ["Mon","Tue","Wed","Thu","Fri"][i];
            }
        }

        let ot = projected>40 ? projected-40 : 0;

        tds[6].innerText = actual.toFixed(2);
        tds[7].innerText = projected.toFixed(2);
        tds[8].innerText = ot.toFixed(2);
        tds[9].innerText = hitDay;

        tr.classList.remove("normal","warning","overtime");

        if(projected>40) tr.classList.add("overtime");
        else if(projected>=36) tr.classList.add("warning");
        else tr.classList.add("normal");
    });
}

document.addEventListener("input", e=>{
    if(e.target.closest("table")) recalcAll();
});

function copyStyled(){
    let table = document.getElementById("table").cloneNode(true);
    table.style.borderCollapse = "collapse";

    table.querySelectorAll("td,th").forEach(cell=>{
        cell.style.border="1px solid #000";
        cell.style.padding="6px";

        let bg = getComputedStyle(cell).backgroundColor;
        cell.style.backgroundColor = bg;
        cell.style.color = "#fff";
    });

    let html = table.outerHTML;

    navigator.clipboard.write([
        new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" })
        })
    ]);

    alert("Copied with colors for email!");
}

</script>

</body>
</html>
