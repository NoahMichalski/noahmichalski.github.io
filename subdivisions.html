<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subdivision List Builder v1.0</title>
<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1 {
  margin-bottom:10px;
}

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input {
  padding:8px;
  border-radius:5px;
  border:none;
  width:250px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:#2a2a2a;
  color:#fff;
}

button:hover {
  background:#444;
}

.table-container {
  max-height:70vh;
  overflow:auto;
  border:1px solid #333;
}

table {
  width:100%;
  border-collapse:collapse;
}

th {
  position:sticky;
  top:0;
  background:#222;
  padding:10px;
  border-bottom:1px solid #444;
}

td {
  padding:8px;
  border-bottom:1px solid #333;
}

.count {
  margin-bottom:10px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>Subdivision List Builder</h1>

<div class="topbar">
  <input id="search" placeholder="Search builder or subdivision...">
  <button onclick="copyData()">Copy</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<div class="count" id="count">Loading...</div>

<div class="table-container">
  <table id="table">
    <thead>
      <tr>
        <th>Builder</th>
        <th>Subdivision</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let DATA = [];

async function loadData(){
  try {
    const res = await fetch("lots(1).json");
    const json = await res.json();

    let map = new Map();

    json.forEach(lot => {
      if(!lot.builder || !lot.subdivision) return;

      let builder = lot.builder.trim();
      let subdivision = lot.subdivision.trim();

      let key = builder + "|" + subdivision;

      map.set(key, { builder, subdivision });
    });

    DATA = Array.from(map.values())
      .sort((a,b) => {
        if(a.builder === b.builder){
          return a.subdivision.localeCompare(b.subdivision);
        }
        return a.builder.localeCompare(b.builder);
      });

    render(DATA);

  } catch(err){
    document.getElementById("count").innerText = "Error loading lots(1).json";
    console.error(err);
  }
}

function render(data){
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(row => {
    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.builder}</td>
      <td>${row.subdivision}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("count").innerText =
    `Total Unique Subdivisions: ${data.length}`;
}

document.getElementById("search").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();

  let filtered = DATA.filter(r =>
    r.builder.toLowerCase().includes(val) ||
    r.subdivision.toLowerCase().includes(val)
  );

  render(filtered);
});

function copyData(){
  let text = "Builder\tSubdivision\n";

  DATA.forEach(r => {
    text += `${r.builder}\t${r.subdivision}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function exportCSV(){
  let csv = "Builder,Subdivision\n";

  DATA.forEach(r => {
    csv += `"${r.builder}","${r.subdivision}"\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "subdivisions.csv";
  a.click();
}

loadData();
</script>

</body>
</html>
