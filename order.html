<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Formatter v4.3</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0d0d0d;
    color: #fff;
}

.header {
    position: sticky;
    top: 0;
    background: #121212;
    padding: 15px 30px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
}

button {
    background: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.main {
    display: flex;
    height: calc(100vh - 60px);
}

.left {
    width: 40%;
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid #222;
}

.right {
    width: 60%;
    padding: 20px;
}

.drop-zone {
    border: 2px dashed #333;
    padding: 20px;
    text-align: center;
    margin-bottom: 15px;
    cursor: pointer;
}

.drop-zone.dragover {
    border-color: #4caf50;
}

.file-info { color: #aaa; font-size: 13px; }
.status { color: #4caf50; font-size: 13px; }

/* ERROR BOX */
.error-box {
    background: #2a1212;
    border: 1px solid #ff5252;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 15px;
}

.error-title {
    font-weight: bold;
    color: #ff5252;
    margin-bottom: 5px;
}

.error-line {
    font-size: 13px;
}

/* TIME BOX */
.time-box {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 15px;
}

/* PREVIEW */
.subdivision {
    background: #161616;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 6px;
}

.job.highlight {
    color: #ffd54f;
    font-weight: bold;
}

/* OUTPUT */
textarea {
    width: 100%;
    height: 100%;
    background: #000;
    color: #0f0;
    border: none;
    padding: 15px;
    font-family: monospace;
}
</style>
</head>

<body>

<div class="header">
    <div>Job Formatter v4.3</div>
    <div>
        <button onclick="copyOutput()">Copy</button>
        <button onclick="clearAll()">Clear</button>
    </div>
</div>

<div class="main">

<div class="left">

<div class="drop-zone" id="dropZone">
    <div id="dropText">Drop Excel File</div>
    <div class="file-info" id="fileName"></div>
    <div class="status" id="status"></div>
</div>

<div id="errorBox"></div>

<div class="time-box">
    <b>⏰ Time / Priority Tasks</b>
    <div id="timeContent"></div>
</div>

<div id="preview"></div>

</div>

<div class="right">
<textarea id="output"></textarea>
</div>

</div>

<input type="file" id="fileInput" hidden />

<script>
let file;

const dropZone = document.getElementById("dropZone");
dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
    file = e.target.files[0];
    handleFile();
};

dropZone.ondragover = e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
};

dropZone.ondrop = e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    file = e.dataTransfer.files[0];
    handleFile();
};

function handleFile() {
    fileName.innerText = file.name;
    status.innerText = "Processing...";
    setTimeout(processFile, 10);
}

function isTimeSensitive(text) {
    text = text.toLowerCase();
    return text.includes("am") || text.includes("pm") || /\d{1,2}:\d{2}/.test(text);
}

function processFile() {
    const reader = new FileReader();

    reader.onload = function(e) {
        try {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

            let grouped = {};
            let timeEntries = [];
            let errors = [];
            let count = 0;

            rows.forEach((r, i) => {
                let sub = String(r[0] || "").trim();
                let lot = String(r[1] || "").trim();
                let job = String(r[2] || "").trim();
                let am = String(r[3] || "").trim();

                // ❌ ERROR DETECTION
                if (!sub || !lot || !job) {
                    let missing = [];
                    if (!sub) missing.push("Subdivision");
                    if (!lot) missing.push("Lot");
                    if (!job) missing.push("Job");

                    if (sub || lot || job) {
                        errors.push(`Row ${i+1}: Missing ${missing.join(", ")}`);
                    }

                    return;
                }

                if (!grouped[sub]) grouped[sub] = [];

                let entry = `${lot}-${job}`;
                let highlight = false;

                if (am) {
                    entry = `*${am} - ${entry}`;
                    highlight = isTimeSensitive(am);
                }

                if (highlight) {
                    timeEntries.push(`${sub} → ${entry}`);
                }

                grouped[sub].push({ text: entry, highlight });
                count++;
            });

            // OUTPUT
            let out = "";
            let previewHTML = "";

            for (let sub in grouped) {
                out += `*${sub}\n`;
                previewHTML += `<div class="subdivision"><b>${sub}</b>`;

                grouped[sub].forEach(obj => {
                    out += obj.text + "\n";
                    previewHTML += `<div class="job ${obj.highlight ? "highlight" : ""}">${obj.text}</div>`;
                });

                previewHTML += `</div>`;
            }

            output.value = out.trim();
            preview.innerHTML = previewHTML;

            // TIME BOX
            timeContent.innerHTML = timeEntries.length
                ? timeEntries.map(t => `<div>${t}</div>`).join("")
                : "<div style='color:#777;'>No time-specific tasks</div>";

            // ERROR BOX
            let errorHTML = "";
            if (errors.length) {
                errorHTML += `<div class="error-box"><div class="error-title">❌ Errors Found</div>`;
                errors.forEach(e => errorHTML += `<div class="error-line">${e}</div>`);
                errorHTML += `</div>`;
            }
            errorBox.innerHTML = errorHTML;

            status.innerText = `✔ ${count} jobs`;
        } catch (err) {
            console.error(err);
            status.innerText = "❌ Error reading file";
        }
    };

    reader.readAsArrayBuffer(file);
}

function copyOutput() {
    output.select();
    document.execCommand("copy");
}

function clearAll() {
    file = null;
    output.value = "";
    preview.innerHTML = "";
    fileName.innerText = "";
    status.innerText = "";
    timeContent.innerHTML = "";
    errorBox.innerHTML = "";
}
</script>

</body>
</html>
