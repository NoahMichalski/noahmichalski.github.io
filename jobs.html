<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Intake System</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; }

table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #444; padding:6px; }
th { background:#333; }

input { width:100%; background:#222; color:#fff; border:none; padding:5px; }

button {
    margin:5px;
    padding:8px 12px;
    background:#222;
    color:#fff;
    border:1px solid #555;
    cursor:pointer;
}

.good { background:#163d1c; }
.warn { background:#4a3b00; }
.bad { background:#4a1c1c; }

#searchResults div {
    padding:6px;
    border-bottom:1px solid #333;
    cursor:pointer;
}
#searchResults div:hover { background:#333; }
</style>
</head>

<body>

<h1>VIP Job Intake</h1>

<input type="file" id="jsonFile">

<button onclick="addRow()">➕ Add Row</button>
<button onclick="validateAll()">✅ Validate All</button>
<button onclick="exportExcel()">📤 Export Excel</button>

<!-- 🔍 SEARCH -->
<h3>Search Lots</h3>
<input id="searchBox" placeholder="Search lot / subdivision / builder" oninput="searchLots()">
<div id="searchResults"></div>

<table id="table">
<thead>
<tr>
<th>Lot</th>
<th>Subdivision</th>
<th>Builder</th>
<th>Task</th>
<th>Status</th>
<th>Check</th>
<th>Remove</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let lotsData = {};
let lotsArray = [];

document.getElementById("jsonFile").addEventListener("change", e=>{
    let reader = new FileReader();
    reader.onload = evt=>{
        let data = JSON.parse(evt.target.result);

        lotsData = {};
        lotsArray = data;

        data.forEach(lot=>{
            let key = String(lot.lotNumber).trim();
            lotsData[key] = lot;
        });

        alert("Lots loaded");
    };
    reader.readAsText(e.target.files[0]);
});

function addRow(lotData=null){
    let tbody = document.querySelector("#table tbody");

    let tr = document.createElement("tr");

    tr.innerHTML = `
        <td><input></td>
        <td><input></td>
        <td><input></td>
        <td><input placeholder="reclean / original / windows"></td>
        <td>Status</td>
        <td><button onclick="validateRow(this)">Check</button></td>
        <td><button onclick="this.closest('tr').remove()">X</button></td>
    `;

    tbody.appendChild(tr);

    // autofill if coming from search
    if(lotData){
        tr.cells[0].querySelector("input").value = lotData.lotNumber;
        tr.cells[1].querySelector("input").value = lotData.subdivision;
        tr.cells[2].querySelector("input").value = lotData.builder;
    }
}

function normalize(val){
    return String(val || "").trim().toLowerCase();
}

function validateRow(btn){
    let row = btn.closest("tr");

    let lotNum = normalize(row.cells[0].querySelector("input").value);
    let sub = normalize(row.cells[1].querySelector("input").value);
    let builder = normalize(row.cells[2].querySelector("input").value);

    let lot = lotsData[lotNum];

    let status = [];
    let className = "good";

    if(!lot){
        status.push("LOT NOT FOUND");
        className = "bad";
    } else {

        if(sub && normalize(lot.subdivision) !== sub){
            status.push("SUBDIVISION MISMATCH");
            className = "warn";
        }

        if(builder && normalize(lot.builder) !== builder){
            status.push("BUILDER MISMATCH");
            className = "warn";
        }
    }

    if(status.length === 0) status.push("OK");

    row.className = className;
    row.cells[4].innerText = status.join(", ");
}

function validateAll(){
    let rows = document.querySelectorAll("#table tbody tr");

    let counts = {};

    rows.forEach(r=>{
        let lot = normalize(r.cells[0].querySelector("input").value);
        counts[lot] = (counts[lot] || 0) + 1;
    });

    rows.forEach(r=>{
        let btn = r.cells[5].querySelector("button");
        validateRow(btn);

        let lot = normalize(r.cells[0].querySelector("input").value);

        if(counts[lot] > 1){
            r.className = "warn";
            r.cells[4].innerText += " | DUPLICATE";
        }
    });
}

function exportExcel(){
    let rows = document.querySelectorAll("#table tbody tr");

    let data = [];

    rows.forEach(r=>{
        if(r.className !== "good") return;

        data.push({
            Lot: r.cells[0].querySelector("input").value,
            Subdivision: r.cells[1].querySelector("input").value,
            Builder: r.cells[2].querySelector("input").value,
            Task: r.cells[3].querySelector("input").value
        });
    });

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Jobs");

    XLSX.writeFile(wb, "validated_jobs.xlsx");
}

function searchLots(){
    let q = normalize(document.getElementById("searchBox").value);

    let results = lotsArray.filter(lot=>{
        return normalize(lot.lotNumber).includes(q) ||
               normalize(lot.subdivision).includes(q) ||
               normalize(lot.builder).includes(q);
    });

    let container = document.getElementById("searchResults");
    container.innerHTML = "";

    results.slice(0, 20).forEach(lot=>{
        let div = document.createElement("div");
        div.innerText = `${lot.lotNumber} | ${lot.subdivision} | ${lot.builder}`;
        div.onclick = ()=>addRow(lot);
        container.appendChild(div);
    });
}

</script>

</body>
</html>
