<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Lookup</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #0f0f0f;
  color: #fff;
}

.header {
  padding: 15px;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #222;
}

h1 {
  margin: 0 0 10px 0;
  font-size: 1.4rem;
}

#searchBox {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e1e1e;
  color: #fff;
  font-size: 1rem;
}

#searchBox::placeholder {
  color: #888;
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

thead {
  background: #1a1a1a;
}

th {
  text-align: left;
  padding: 12px;
  font-size: 0.85rem;
  color: #aaa;
  text-transform: uppercase;
  border-bottom: 1px solid #333;
}

td {
  padding: 12px;
  border-bottom: 1px solid #222;
  font-size: 0.95rem;
}

tr:hover {
  background: #1c1c1c;
}

.address-link {
  color: #4da3ff;
  text-decoration: none;
}

.address-link:hover {
  text-decoration: underline;
}

.no-results {
  padding: 20px;
  text-align: center;
  color: #888;
}

</style>
</head>

<body>

<div class="header">
  <h1>Lot Lookup</h1>
  <input id="searchBox" placeholder="Search lot, subdivision, builder, address..." />
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Lot</th>
        <th>Subdivision</th>
        <th>Builder</th>
        <th>Address</th>
        <th>Floorplan</th>
      </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
  </table>
</div>

<script>
let lots = [];

fetch('lots(1).json')
  .then(res => res.json())
  .then(data => {
    lots = data;
    renderTable(lots);
  });

function renderTable(data) {
  const table = document.getElementById('resultsTable');
  table.innerHTML = '';

  if (data.length === 0) {
    table.innerHTML = `<tr><td colspan="5" class="no-results">No results found</td></tr>`;
    return;
  }

  data.forEach(lot => {
    const row = document.createElement('tr');

    const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lot.address)}`;

    row.innerHTML = `
      <td>${lot.lotNumber}</td>
      <td>${lot.subdivision}</td>
      <td>${lot.builder}</td>
      <td><a class="address-link" href="${mapsLink}" target="_blank">${lot.address}</a></td>
      <td>${lot.floorplan || 'N/A'}</td>
    `;

    table.appendChild(row);
  });
}

function filterLots(query) {
  query = query.toLowerCase();

  return lots.filter(lot =>
    lot.lotNumber?.toLowerCase().includes(query) ||
    lot.subdivision?.toLowerCase().includes(query) ||
    lot.builder?.toLowerCase().includes(query) ||
    lot.address?.toLowerCase().includes(query)
  );
}

document.getElementById('searchBox').addEventListener('input', e => {
  const query = e.target.value.trim();
  const filtered = query ? filterLots(query) : lots;
  renderTable(filtered);
});
</script>

</body>
</html>
