<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Job Intake</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#111; color:#fff; font-family:Arial; padding:20px; }

table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #444; padding:6px; }
th { background:#333; }

input, select {
    width:100%;
    background:#222;
    color:#fff;
    border:none;
    padding:5px;
}

button { margin:5px; padding:6px 10px; background:#222; border:1px solid #555; color:#fff; cursor:pointer; }

.good { background:#163d1c; }
.warn { background:#4a3b00; }
.bad { background:#4a1c1c; }

#searchResults div {
    padding:6px;
    border-bottom:1px solid #333;
    cursor:pointer;
}
#searchResults div:hover { background:#333; }
</style>
</head>

<body>

<h1>VIP Job Intake</h1>
<div id="lotStatus">Loading lots...</div>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="validateAll()">✅ Validate</button>
<button onclick="exportExcel()">📤 Export Excel</button>

<h3>Search Lots</h3>
<input id="searchBox" oninput="searchLots()" placeholder="Search...">
<div id="searchResults"></div>

<table>
<thead>
<tr>
<th>Lot</th>
<th>Subdivision</th>
<th>Builder</th>
<th>Task</th>
<th>Status</th>
<th>Check</th>
<th>X</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

let lotsArray = [];
let lotsData = {};

async function loadLots(){
    try {
        console.log("Fetching lots JSON...");

        // 🔥 THIS IS THE IMPORTANT LINE
        let res = await fetch("lots(1).json?v=" + Date.now());

        if(!res.ok){
            throw new Error("Fetch failed");
        }

        let data = await res.json();

        console.log("Loaded lots:", data.length);

        lotsArray = data;
        lotsData = {};

        data.forEach(lot=>{
            let key = `${lot.lotNumber}|${lot.subdivision}`;
            lotsData[key] = lot;
        });

        document.getElementById("lotStatus").innerText =
            "Lots Loaded: " + data.length;

    } catch(err){
        console.error("LOAD FAILED:", err);
        document.getElementById("lotStatus").innerText =
            "FAILED TO LOAD lots(1).json";
    }
}

window.onload = loadLots;

function addRow(lotData=null){
    let tbody = document.getElementById("tbody");

    let tr = document.createElement("tr");

    tr.innerHTML = `
        <td><input></td>
        <td><input></td>
        <td><input></td>
        <td><input></td>
        <td>Status</td>
        <td><button onclick="validateRow(this)">Check</button></td>
        <td><button onclick="this.closest('tr').remove()">X</button></td>
    `;

    tbody.appendChild(tr);

    if(lotData){
        tr.cells[0].querySelector("input").value = lotData.lotNumber;
        tr.cells[1].querySelector("input").value = lotData.subdivision;
        tr.cells[2].querySelector("input").value = lotData.builder;

        validateRow(tr.querySelector("button"));
    }
}

function validateRow(btn){
    let row = btn.closest("tr");

    let lot = row.cells[0].querySelector("input").value.trim();
    let sub = row.cells[1].querySelector("input").value.trim();
    let builder = row.cells[2].querySelector("input").value.trim();

    let key = `${lot}|${sub}`;
    let lotObj = lotsData[key];

    let status = [];
    let cls = "good";

    if(!lotObj){
        let matches = lotsArray.filter(l=>String(l.lotNumber) === lot);

        if(matches.length > 1){
            status.push("SELECT FROM SEARCH");
            cls = "warn";
        } else {
            status.push("LOT NOT FOUND");
            cls = "bad";
        }
    } else {
        if(lotObj.builder !== builder){
            status.push("BUILDER MISMATCH");
            cls = "warn";
        }
    }

    if(status.length === 0) status.push("OK");

    row.className = cls;
    row.cells[4].innerText = status.join(", ");
}

function validateAll(){
    document.querySelectorAll("#tbody tr").forEach(r=>{
        validateRow(r.querySelector("button"));
    });
}

function exportExcel(){
    let data = [];

    document.querySelectorAll("#tbody tr").forEach(r=>{
        if(r.className !== "good") return;

        data.push({
            Lot: r.cells[0].querySelector("input").value,
            Subdivision: r.cells[1].querySelector("input").value,
            Builder: r.cells[2].querySelector("input").value,
            Task: r.cells[3].querySelector("input").value
        });
    });

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Jobs");

    XLSX.writeFile(wb, "jobs.xlsx");
}

function searchLots(){
    let q = document.getElementById("searchBox").value.toLowerCase();

    let results = lotsArray.filter(lot=>{
        return String(lot.lotNumber).includes(q) ||
               lot.subdivision.toLowerCase().includes(q) ||
               lot.builder.toLowerCase().includes(q);
    });

    let container = document.getElementById("searchResults");
    container.innerHTML = "";

    results.slice(0,20).forEach(lot=>{
        let div = document.createElement("div");
        div.innerText = `${lot.lotNumber} | ${lot.subdivision} | ${lot.builder}`;

        div.onclick = ()=>addRow(lot);

        container.appendChild(div);
    });
}

</script>

</body>
</html>
