<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Dashboard v7</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0e0e0e;
    color:#fff;
    font-family:system-ui;
    padding:20px;
}

.container { max-width:1500px; margin:auto; }

.card {
    background:#181818;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

table { width:100%; border-collapse:collapse; }
td,th { padding:8px; border-bottom:1px solid #333; }

.good { color:#4caf50; }
.bad { color:#ff5252; }
.click { cursor:pointer; }

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.85);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-box {
    background:#1c1c1c;
    width:90%;
    max-height:85%;
    overflow:auto;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>VIP Performance Dashboard</h1>

<input type="file" id="upload">

<div class="grid">

<div class="card">
<h3>🏆 Crew Efficiency</h3>
<table id="crewTable"></table>
</div>

<div class="card">
<h3>📊 Floorplan Performance</h3>
<table id="floorTable"></table>
</div>

<div class="card">
<h3>📈 Crew Efficiency Chart</h3>
<canvas id="crewChart"></canvas>
</div>

<div class="card">
<h3>📊 Task Efficiency</h3>
<canvas id="taskChart"></canvas>
</div>

<div class="card">
<h3>📅 Efficiency Trend</h3>
<canvas id="trendChart"></canvas>
</div>

</div>

<div class="card">
<h3>🚨 Outliers (vs Budget)</h3>
<div id="outliers"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span onclick="closeModal()" style="cursor:pointer;">✖</span>
<div id="modalContent"></div>
</div>
</div>

<script>

let data=[];

document.getElementById('upload').onchange=e=>{
    let r=new FileReader();
    r.onload=evt=>{
        let wb=XLSX.read(evt.target.result,{type:'binary'});
        let sheet=wb.Sheets[wb.SheetNames[0]];
        data=XLSX.utils.sheet_to_json(sheet);

        data.forEach(d=>{
            let b = d["Budgetted Hours"] || 0;
            d.eff = b ? d.Hours / b : null;
            d.diff = d.Hours - b;
            d.varp = b ? (d.diff / b) * 100 : 0;
        });

        render();
    };
    r.readAsBinaryString(e.target.files[0]);
};

function avg(arr){
    let valid = arr.filter(x => x !== null && !isNaN(x));
    return valid.reduce((a,b)=>a+b,0)/valid.length;
}

function render(){
    renderCrew();
    renderFloor();
    renderCharts();
    renderOutliers();
}

function renderCrew(){

    let map={};

    data.forEach(d=>{
        if(d.eff===null) return;
        if(!map[d.Employee]) map[d.Employee]=[];
        map[d.Employee].push(d.eff);
    });

    let rows = Object.entries(map).map(([crew,vals])=>{
        return { crew, eff: avg(vals) };
    });

    rows.sort((a,b)=>a.eff-b.eff);

    let html="<tr><th>#</th><th>Crew</th><th>Efficiency</th></tr>";

    rows.forEach((r,i)=>{
        html+=`
        <tr>
        <td>${i+1}</td>
        <td>${r.crew}</td>
        <td class="${r.eff<1?'good':'bad'}">${r.eff.toFixed(2)}</td>
        </tr>`;
    });

    document.getElementById("crewTable").innerHTML=html;
}

function renderFloor(){

    let map={};

    data.forEach(d=>{
        if(!map[d.Floorplan]) map[d.Floorplan]=[];
        map[d.Floorplan].push(d);
    });

    let html="<tr><th>Floorplan</th><th>Avg Hours</th><th>Budget</th><th>Efficiency</th></tr>";

    for(let f in map){
        let jobs=map[f];

        let avgH = avg(jobs.map(j=>j.Hours));
        let avgB = avg(jobs.map(j=>j["Budgetted Hours"]||0));
        let eff = avg(jobs.map(j=>j.eff));

        html+=`
        <tr class="click" onclick="openModal('${f}')">
        <td>${f}</td>
        <td>${avgH.toFixed(1)}</td>
        <td>${avgB.toFixed(1)}</td>
        <td class="${eff<1?'good':'bad'}">${eff.toFixed(2)}</td>
        </tr>`;
    }

    document.getElementById("floorTable").innerHTML=html;
}

function renderCharts(){

    // crew chart
    let crewMap={};
    data.forEach(d=>{
        if(d.eff===null) return;
        if(!crewMap[d.Employee]) crewMap[d.Employee]=[];
        crewMap[d.Employee].push(d.eff);
    });

    let labels = Object.keys(crewMap);
    let values = Object.values(crewMap).map(avg);

    new Chart(document.getElementById("crewChart"),{
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                label:'Efficiency (1.0 = Budget)',
                data:values,
                backgroundColor: values.map(v => v < 1 ? '#4caf50' : '#ff5252')
            }]
        },
        options:{
            scales:{
                y:{ beginAtZero:true, suggestedMax:1.5 }
            }
        }
    });

    // task chart
    let taskMap={};
    data.forEach(d=>{
        if(d.eff===null) return;
        if(!taskMap[d.Task]) taskMap[d.Task]=[];
        taskMap[d.Task].push(d.eff);
    });

    new Chart(document.getElementById("taskChart"),{
        type:'bar',
        data:{
            labels:Object.keys(taskMap),
            datasets:[{
                label:'Efficiency',
                data:Object.values(taskMap).map(avg)
            }]
        }
    });

    // trend
    let dates=[...new Set(data.map(d=>d.Date))].sort();

    let trend=dates.map(dt=>{
        let day=data.filter(d=>d.Date===dt);
        return avg(day.map(d=>d.eff));
    });

    new Chart(document.getElementById("trendChart"),{
        type:'line',
        data:{
            labels:dates,
            datasets:[{
                label:'Efficiency',
                data:trend
            }]
        }
    });
}

function openModal(floor){

    let jobs=data.filter(d=>d.Floorplan===floor);

    let html=`<h2>${floor}</h2>
    <table>
    <tr><th>Crew</th><th>Task</th><th>Hours</th><th>Budget</th><th>Eff</th><th>%</th></tr>`;

    jobs.forEach(j=>{
        html+=`
        <tr>
        <td>${j.Employee}</td>
        <td>${j.Task}</td>
        <td>${j.Hours.toFixed(1)}</td>
        <td>${(j["Budgetted Hours"]||0).toFixed(1)}</td>
        <td class="${j.eff<1?'good':'bad'}">${j.eff.toFixed(2)}</td>
        <td class="${j.varp<0?'good':'bad'}">${j.varp.toFixed(1)}%</td>
        </tr>`;
    });

    html+="</table>";

    document.getElementById("modalContent").innerHTML=html;
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function renderOutliers(){

    let html="";

    data.forEach(d=>{
        if(Math.abs(d.diff)>2){
            html+=`
            <div class="${d.diff>0?'bad':'good'}">
            ${d.Employee} | ${d.Floorplan} | ${d.Task}  
            → ${d.Hours.toFixed(1)}h vs ${(d["Budgetted Hours"]||0).toFixed(1)}h  
            (${d.varp.toFixed(1)}%)
            </div>`;
        }
    });

    document.getElementById("outliers").innerHTML=html;
}

</script>

</body>
</html>
