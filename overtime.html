<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overtime Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1 { text-align:center; }

.controls { text-align:center; margin-bottom:15px; }

button, select {
    background:white;
    color:black;
    border:none;
    padding:8px 14px;
    margin:5px;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    border:1px solid #333;
    padding:6px;
    text-align:center;
}

.predicted {
    background:#ff4da6;
    color:white;
    font-weight:bold;
}

.normal { background:#0f2e0f; }
.warning { background:#5a4b00; }
.overtime { background:#5c0000; font-weight:bold; }

</style>
</head>

<body>

<h1>Overtime Predictor</h1>

<div class="controls">
    <input type="file" id="fileInput" accept=".xlsx,.csv">

    <select id="daySelect" onchange="recalcAll()">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
    </select>

    <button onclick="processFile()">Load File</button>
    <button onclick="exportExcel()">Export</button>
</div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
<th>Actual</th>
<th>Projected</th>
<th>OT</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let tableData = [];

function processFile() {
    const file = document.getElementById('fileInput').files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        tableData = XLSX.utils.sheet_to_json(sheet);

        render();
    };

    reader.readAsBinaryString(file);
}

function clean(val) {
    if (val === " " || val === "" || val == null) return 0;
    return parseFloat(val) || 0;
}

function render() {
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    tableData.forEach(row => {
        let name = row["Name"];
        if (!name) return;

        let days = [
            clean(row["Monday"]),
            clean(row["Tuesday"]),
            clean(row["Wednesday"]),
            clean(row["Thursday"]),
            clean(row["Friday"])
        ];

        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${name}</td>
            ${days.map(d=>`<td contenteditable="true">${d}</td>`).join("")}
            <td class="actual">0</td>
            <td class="projected">0</td>
            <td class="ot">0</td>
        `;

        tbody.appendChild(tr);
    });

    recalcAll();
}

function recalcAll() {
    let selectedDay = parseInt(document.getElementById("daySelect").value);

    document.querySelectorAll("#table tbody tr").forEach(tr => {
        let tds = tr.querySelectorAll("td");

        let days = [];
        for (let i = 1; i <= 5; i++) {
            let val = parseFloat(tds[i].innerText) || 0;
            days.push(val);
        }

        let actual = days.reduce((a,b)=>a+b,0);

        let projected = 0;

        for (let i = 0; i < 5; i++) {
            tds[i+1].classList.remove("predicted");

            if (i <= selectedDay) {
                projected += days[i];
            } else {
                projected += 8;
                tds[i+1].innerText = "8";
                tds[i+1].classList.add("predicted");
            }
        }

        let ot = projected > 40 ? projected - 40 : 0;

        tds[6].innerText = actual.toFixed(2);
        tds[7].innerText = projected.toFixed(2);
        tds[8].innerText = ot.toFixed(2);

        tr.classList.remove("normal","warning","overtime");

        if (projected > 40) tr.classList.add("overtime");
        else if (projected >= 36) tr.classList.add("warning");
        else tr.classList.add("normal");
    });
}

document.addEventListener("input", function(e){
    if (e.target.closest("table")) recalcAll();
});

function exportExcel() {
    let wb = XLSX.utils.book_new();
    let ws_data = [];

    document.querySelectorAll("#table tr").forEach(tr => {
        let row = [];
        tr.querySelectorAll("th,td").forEach(td => {
            row.push(td.innerText);
        });
        ws_data.push(row);
    });

    let ws = XLSX.utils.aoa_to_sheet(ws_data);

    // Apply styles
    let range = XLSX.utils.decode_range(ws['!ref']);

    for (let R = 1; R <= range.e.r; ++R) {
        let tr = document.querySelectorAll("#table tbody tr")[R-1];

        let style = {};
        if (tr.classList.contains("overtime")) {
            style = { fill: { fgColor: { rgb: "FF0000" } } };
        } else if (tr.classList.contains("warning")) {
            style = { fill: { fgColor: { rgb: "FFFF00" } } };
        } else {
            style = { fill: { fgColor: { rgb: "008000" } } };
        }

        for (let C = 0; C <= range.e.c; ++C) {
            let cell = ws[XLSX.utils.encode_cell({r:R, c:C})];
            if (cell) cell.s = style;
        }
    }

    XLSX.utils.book_append_sheet(wb, ws, "OT");
    XLSX.writeFile(wb, "overtime.xlsx");
}

</script>

</body>
</html>
