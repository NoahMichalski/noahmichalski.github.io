<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Formatter v4.5</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:"Segoe UI"; background:#0d0d0d; color:#fff; }

.header {
    display:flex; justify-content:space-between; align-items:center;
    padding:15px 30px; background:#121212; border-bottom:1px solid #222;
}

.header-left { display:flex; align-items:center; gap:12px; }
.logo { height:32px; }

button {
    background:#fff; border:none; padding:8px 16px;
    border-radius:6px; font-weight:bold; cursor:pointer;
}

.main { display:flex; height:calc(100vh - 60px); }

.left { width:40%; padding:20px; overflow-y:auto; border-right:1px solid #222; }
.right { width:60%; padding:20px; }

.drop-zone {
    border:2px dashed #333; padding:20px; text-align:center;
    margin-bottom:15px; cursor:pointer;
}
.drop-zone.dragover { border-color:#4caf50; }

.file-info { color:#aaa; font-size:13px; }
.status { color:#4caf50; font-size:13px; }

/* ERROR */
.error-box {
    background:#2a1212; border:1px solid #ff5252;
    border-radius:8px; padding:10px; margin-bottom:15px;
}

/* TIME */
.time-box {
    background:#1a1a1a; border:1px solid #333;
    border-radius:8px; padding:10px; margin-bottom:15px;
}

/* PREVIEW */
.subdivision { background:#161616; margin-bottom:10px; padding:10px; border-radius:6px; }
.job.highlight { color:#ffd54f; font-weight:bold; }

/* OUTPUT */
textarea {
    width:100%; height:100%;
    background:#000; color:#0f0;
    border:none; padding:15px;
    font-family:monospace;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-left">
        <img src="/images/VIP-logo-white.png" class="logo">
        <div>Job Formatter v4.5</div>
    </div>
    <div>
        <button onclick="copyOutput()">Copy</button>
        <button onclick="clearAll()">Clear</button>
    </div>
</div>

<div class="main">

<div class="left">

<div class="drop-zone" id="dropZone">
    <div>Drop Excel File</div>
    <div class="file-info" id="fileName"></div>
    <div class="status" id="status"></div>
</div>

<div id="errorBox"></div>

<div class="time-box">
    <b>⏰ Time / Priority Tasks</b>
    <div id="timeContent"></div>
</div>

<div id="preview"></div>

</div>

<div class="right">
<textarea id="output"></textarea>
</div>

</div>

<input type="file" id="fileInput" hidden />

<script>
let file;
dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
    file = e.target.files[0];
    handleFile();
};

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add("dragover"); };
dropZone.ondrop = e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    file = e.dataTransfer.files[0];
    handleFile();
};

function handleFile() {
    fileName.innerText = file.name;
    status.innerText = "Processing...";
    setTimeout(processFile, 10);
}

function isTimeSensitive(t) {
    t = t.toLowerCase();
    return t.includes("am") || t.includes("pm") || /\d{1,2}:\d{2}/.test(t);
}

function processFile() {
    const reader = new FileReader();

    reader.onload = function(e) {
        try {
            const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1 });

            let grouped={}, errors=[], timeEntries=[], count=0;

            rows.forEach((r,i)=>{
                let sub=String(r[0]||"").trim();
                let lot=String(r[1]||"").trim();
                let job=String(r[2]||"").trim();
                let am=String(r[3]||"").trim();

                // ❌ only require subdivision + job now
                if (!sub || !job) {
                    if (sub || job) {
                        let missing=[];
                        if(!sub) missing.push("Subdivision");
                        if(!job) missing.push("Job");
                        errors.push(`Row ${i+1}: Missing ${missing.join(", ")}`);
                    }
                    return;
                }

                if(!grouped[sub]) grouped[sub]=[];

                let entry = lot ? `${lot}-${job}` : `${job}`;
                let highlight=false;

                if(am){
                    entry = `*${am} - ${entry}`;
                    highlight = isTimeSensitive(am);
                }

                if(highlight){
                    timeEntries.push(`${sub} → ${entry}`);
                }

                grouped[sub].push({text:entry, highlight});
                count++;
            });

            let out="", previewHTML="";

            for(let sub in grouped){
                out += `*${sub}\n`;
                previewHTML += `<div class="subdivision"><b>${sub}</b>`;

                grouped[sub].forEach(o=>{
                    out += o.text+"\n";
                    previewHTML += `<div class="job ${o.highlight?"highlight":""}">${o.text}</div>`;
                });

                previewHTML += `</div>`;
            }

            output.value = out.trim();
            preview.innerHTML = previewHTML;

            timeContent.innerHTML = timeEntries.length
                ? timeEntries.map(t=>`<div>${t}</div>`).join("")
                : "<div style='color:#777;'>No time-specific tasks</div>";

            errorBox.innerHTML = errors.length
                ? `<div class="error-box"><b>❌ Errors</b>${errors.map(e=>`<div>${e}</div>`).join("")}</div>`
                : "";

            status.innerText = `✔ ${count} jobs`;

        } catch(e){
            console.error(e);
            status.innerText="❌ Error";
        }
    };

    reader.readAsArrayBuffer(file);
}

function copyOutput(){ output.select(); document.execCommand("copy"); }

function clearAll(){
    file=null;
    output.value="";
    preview.innerHTML="";
    fileName.innerText="";
    status.innerText="";
    timeContent.innerHTML="";
    errorBox.innerHTML="";
}
</script>

</body>
</html>
