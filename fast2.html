<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Dashboard v8</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0e0e0e;
    color:#fff;
    font-family:system-ui;
    padding:20px;
}

.container { max-width:1500px; margin:auto; }

.card {
    background:#181818;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

table { width:100%; border-collapse:collapse; }
td,th { padding:8px; border-bottom:1px solid #333; }

.good { color:#4caf50; }
.bad { color:#ff5252; }
.click { cursor:pointer; }

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.85);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-box {
    background:#1c1c1c;
    width:90%;
    max-height:85%;
    overflow:auto;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>VIP Performance Dashboard</h1>

<input type="file" id="upload">

<div class="grid">

<div class="card">
<h3>🏆 Crew Efficiency (Click Crew)</h3>
<table id="crewTable"></table>
</div>

<div class="card">
<h3>📊 Floorplan Performance</h3>
<table id="floorTable"></table>
</div>

<div class="card">
<h3>📈 Crew Efficiency Chart</h3>
<canvas id="crewChart"></canvas>
</div>

<div class="card">
<h3>📊 Task Efficiency</h3>
<canvas id="taskChart"></canvas>
</div>

<div class="card">
<h3>📅 Efficiency Trend</h3>
<canvas id="trendChart"></canvas>
</div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span onclick="closeModal()" style="cursor:pointer;">✖</span>
<div id="modalContent"></div>
</div>
</div>

<script>

let data=[];

document.getElementById('upload').onchange=e=>{
    let r=new FileReader();
    r.onload=evt=>{
        let wb=XLSX.read(evt.target.result,{type:'binary'});
        let sheet=wb.Sheets[wb.SheetNames[0]];
        data=XLSX.utils.sheet_to_json(sheet);

        data.forEach(d=>{
            let b = d["Budgetted Hours"] || 0;
            d.eff = b ? d.Hours / b : null;
        });

        render();
    };
    r.readAsBinaryString(e.target.files[0]);
};

function avg(arr){
    let valid = arr.filter(x => x !== null && !isNaN(x));
    return valid.reduce((a,b)=>a+b,0)/valid.length;
}

function render(){
    renderCrew();
    renderFloor();
    renderCharts();
}

function renderCrew(){

    let map={};

    data.forEach(d=>{
        if(d.eff===null) return;
        if(!map[d.Employee]) map[d.Employee]=[];
        map[d.Employee].push(d.eff);
    });

    let rows = Object.entries(map).map(([crew,vals])=>{
        return { crew, eff: avg(vals) };
    });

    rows.sort((a,b)=>a.eff-b.eff);

    let html="<tr><th>#</th><th>Crew</th><th>Efficiency</th></tr>";

    rows.forEach((r,i)=>{
        html+=`
        <tr>
        <td>${i+1}</td>
        <td class="click" onclick="openCrew('${r.crew}')">${r.crew}</td>
        <td class="${r.eff<1?'good':'bad'}">${r.eff.toFixed(2)}</td>
        </tr>`;
    });

    document.getElementById("crewTable").innerHTML=html;
}

function openCrew(crew){

    let jobs = data.filter(d=>d.Employee===crew);

    let html = `<h2>${crew}</h2>`;

    // floorplan summary
    let fpMap = {};
    jobs.forEach(j=>{
        if(!fpMap[j.Floorplan]) fpMap[j.Floorplan]=[];
        fpMap[j.Floorplan].push(j.eff);
    });

    html += "<h3>Floorplans</h3><table><tr><th>Floorplan</th><th>Efficiency</th></tr>";

    for(let f in fpMap){
        html += `<tr>
        <td>${f}</td>
        <td class="${avg(fpMap[f])<1?'good':'bad'}">${avg(fpMap[f]).toFixed(2)}</td>
        </tr>`;
    }

    html += "</table>";

    // job history
    html += "<h3>Job History</h3>";
    html += "<table><tr><th>Date</th><th>Subdivision</th><th>Lot</th><th>Floorplan</th><th>Task</th><th>Hours</th><th>Budget</th><th>Eff</th></tr>";

    jobs.forEach(j=>{
        html+=`
        <tr>
        <td>${j.Date}</td>
        <td>${j.Subdivision}</td>
        <td>${j.Lot}</td>
        <td>${j.Floorplan}</td>
        <td>${j.Task}</td>
        <td>${j.Hours.toFixed(1)}</td>
        <td>${(j["Budgetted Hours"]||0).toFixed(1)}</td>
        <td class="${j.eff<1?'good':'bad'}">${j.eff.toFixed(2)}</td>
        </tr>`;
    });

    html+="</table>";

    document.getElementById("modalContent").innerHTML=html;
    document.getElementById("modal").style.display="flex";
}

function renderFloor(){

    let map={};

    data.forEach(d=>{
        if(!map[d.Floorplan]) map[d.Floorplan]=[];
        map[d.Floorplan].push(d);
    });

    let html="<tr><th>Floorplan</th><th>Avg Hours</th><th>Budget</th><th>Efficiency</th></tr>";

    for(let f in map){
        let jobs=map[f];

        let avgH = avg(jobs.map(j=>j.Hours));
        let avgB = avg(jobs.map(j=>j["Budgetted Hours"]||0));
        let eff = avg(jobs.map(j=>j.eff));

        html+=`
        <tr>
        <td>${f}</td>
        <td>${avgH.toFixed(1)}</td>
        <td>${avgB.toFixed(1)}</td>
        <td class="${eff<1?'good':'bad'}">${eff.toFixed(2)}</td>
        </tr>`;
    }

    document.getElementById("floorTable").innerHTML=html;
}

function renderCharts(){

    let crewMap={};
    data.forEach(d=>{
        if(d.eff===null) return;
        if(!crewMap[d.Employee]) crewMap[d.Employee]=[];
        crewMap[d.Employee].push(d.eff);
    });

    new Chart(document.getElementById("crewChart"),{
        type:'bar',
        data:{
            labels:Object.keys(crewMap),
            datasets:[{
                label:'Efficiency',
                data:Object.values(crewMap).map(avg),
                backgroundColor:Object.values(crewMap).map(v => avg(v)<1 ? '#4caf50' : '#ff5252')
            }]
        }
    });

    let taskMap={};
    data.forEach(d=>{
        if(!taskMap[d.Task]) taskMap[d.Task]=[];
        taskMap[d.Task].push(d.eff);
    });

    new Chart(document.getElementById("taskChart"),{
        type:'bar',
        data:{
            labels:Object.keys(taskMap),
            datasets:[{
                label:'Efficiency',
                data:Object.values(taskMap).map(avg)
            }]
        }
    });

    let dates=[...new Set(data.map(d=>d.Date))].sort();

    let trend=dates.map(dt=>{
        let day=data.filter(d=>d.Date===dt);
        return avg(day.map(d=>d.eff));
    });

    new Chart(document.getElementById("trendChart"),{
        type:'line',
        data:{
            labels:dates,
            datasets:[{label:'Efficiency',data:trend}]
        }
    });
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
